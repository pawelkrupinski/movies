# ── Application ───────────────────────────────────────────────────────────────
play.http.secret.key = "changeme-use-a-long-random-string-in-production"
play.http.secret.key = ${?APPLICATION_SECRET}

play.server.http.port = 9000
play.server.http.port = ${?PORT}

# Bind on every interface — Fly's edge proxy reaches the app on the container's
# private IP, so 127.0.0.1 alone would refuse the connection. Play 3.0 defaults
# to 0.0.0.0 but we set it explicitly so a future Play upgrade can't quietly
# flip it back to localhost.
play.server.http.address = "0.0.0.0"
play.server.http.address = ${?HTTP_ADDRESS}

play.filters.hosts {
  allowed = [
    ".onrender.com",
    ".fly.dev",
    "localhost",
    "172.19.26.106",
    "172.20.10.3",
    "192.168.2.104"
  ]
}

play.filters.cors {
  allowedOrigins    = null   # null = allow all; list specific origins in production
  allowedHttpMethods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allowedHttpHeaders = null
}

# ── MongoDB ────────────────────────────────────────────────────────────────────
mongodb {
  uri      = "mongodb://localhost:27017"
  uri      = ${?MONGODB_URI}           # override with env var in production
  database = "scala_play_db"
  database = ${?MONGODB_DATABASE}
}

# ── Compile-time DI ───────────────────────────────────────────────────────────
# Replaces Guice. The single wiring class lives in app/modules/AppLoader.scala.
play.application.loader = "modules.AppLoader"

# ── Logging ────────────────────────────────────────────────────────────────────
play.logger.includeConfigProperties = true
