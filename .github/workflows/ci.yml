name: CI

# The full build + test pipeline, factored out as a reusable workflow so it
# has exactly ONE definition. Two callers consume it:
#
#   - deploy.yml      — push to main: run this, then deploy to Fly.
#   - branch-ci.yml   — pull_request: run this alone (no deploy) so every
#                       branch (e.g. the Scala Steward dependency-bump PRs)
#                       is confirmed to compile + pass the same gates main does.
#
# Everything below is identical to what gated deploy before the split — the
# only thing that lives in deploy.yml now is the deploy job itself.
on:
    workflow_call:

# Pipeline shape:
#
#   test (unit + eslint + stage) ─┐
#   integration-test ─────────────┤
#   e2e × 4 shards ───────────────┤  (all independent; deploy.yml's deploy job
#   mobile-local-server (iOS+And) ┤   `needs` this whole workflow)
#   page-tests × 13 ──────────────┘
#
# Jobs are split to stay under the 20-runner cap WITHOUT any job queueing
# (currently 20: 1 test + 1 integration + 4 e2e + 1 mobile + 13 page-tests).
# eslint rides `test` (was its own job), and iOS + Android LocalServer share
# one `mobile-local-server` job (one FixtureServerMain boot for both). The
# original ~13-min long pole was the single `e2e` job (two serial whole-corpus
# determinism specs); it's now (a) fanned out across 4 parallel shards and
# (b) each heavy spec runs its replays CONCURRENTLY (see ParallelReplays), so
# e2e drops well under the page-tests tier. The WebKit phone page-tests are
# 2-way sharded (slow engine — the test run, not the boot, is the bulk); the
# Chromium phones stay un-sharded (fast engine, boot-dominated). See below.
#
# All gating legs run independently. The sbt-driven ones share the
# `actions/cache` keyed on hashed sources so later jobs find zinc state warm
# (the mobile job keeps a separate JDK-21 cache key). The test job also produces
# the Play universal-stage dist for deploy, uploaded as the `stage` artifact —
# deploy.yml's deploy job downloads it from this run.
#
# Lighthouse moved to lighthouse.yml — runs on `workflow_run` after
# the deploy workflow finishes (plus the every-6-h schedule).
#
# `page-tests` is the only job that needs a browser: PageJsBehaviourSpec
# drives a real headless Chrome over CDP to exercise the JS on the
# rendered pages. Kept out of `test` so the main unit job stays
# browser-free and the page checks get a discrete CI status row.
jobs:
    test:
        runs-on: ubuntu-latest
        # `checks: write` so action-junit-report can post the failure
        # check-run + summary.
        permissions:
            contents: read
            checks: write
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v5
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  # Scope the exact key to the sources this job compiles
                  # (unit = every module's main + test). restore-keys still
                  # falls back to any recent sbt-target cache so zinc stays
                  # warm on a miss.
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Every module's unit tests except `e2e` in one sbt run; `all` keeps
            # going so a failure in one module still runs the rest. The `e2e`
            # module (the whole-corpus staging specs) rides the integration-test
            # job instead — it doubled this step's wall-clock once staging ingest
            # went always-on, and this is the deploy-gating job, so keep it off
            # the critical path. See the `testUnitNoE2e` alias in build.sbt.
            - run: sbt testUnitNoE2e
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - name: Publish test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'target/test-reports/unit/**/*.xml'
                  check_name: unit tests
                  detailed_summary: true
                  include_passed: false

            # Produce BOTH apps' universal-stage distributions here so the
            # deploy job can ship them straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt testUnit` —
            # only linking + writing the dists costs anything. On a PR run
            # (branch-ci.yml) nothing downloads these; they just prove the
            # staged dist links, then expire after a day.
            - run: sbt "web/stage" "worker/stage"

            - uses: actions/upload-artifact@v6
              with:
                  name: stage-web
                  path: web/target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

            - uses: actions/upload-artifact@v6
              with:
                  name: stage-worker
                  path: worker/target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

            # ESLint over the production JS in `public/js/`. Folded into this job
            # (was a standalone `lint` job) to free a runner slot for the dedicated
            # `e2e` job, keeping CI at 20 jobs so nothing queues. Runs LAST: the
            # unit-test check is published above with `always()`, so a lint failure
            # never hides it, and the stage artifacts upload first. Cross-file
            # globals (constants from `_sharedJsConfig`, functions called from
            # inline `<script>` blocks) are listed in `eslint.config.js` so
            # `no-undef` stays meaningful.
            - uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint

    # Mobile LocalServer tests — iOS + Android share ONE FixtureServerMain boot.
    # Boots the fixture Play server (same FixtureServerMain + InMemoryMovieRepository
    # the Playwright suite uses) once, then runs both the iOS `LocalServer*` XCTest
    # cases and the Android `LocalServerApiTest` against it. KinowoCore's real
    # parsers (HTMLParser, FilmDetailParser) crawl the HTML the Twirl templates
    # rendered; Android's production KinowoApi + kotlinx models decode the live
    # /api/repertoire + /api/details JSON. The cross-cutting gate: a server-side
    # template / MovieController JSON drift that would break either mobile client
    # fails CI here, on the PR that introduces it.
    #
    # Was two separate jobs, each paying the SAME ~4-min FixtureServerMain boot to
    # run a <20s test. Merged so the boot is shared and one runner slot is freed —
    # keeps CI under the 20-runner cap without a job queueing. One JDK 21 serves
    # everything: the Scala build emits Java 21 (`--release 21`) and runs on 21,
    # Gradle 8.9 / AGP 8.6 run on 21, and Swift needs no JDK. Both junit publishes
    # keep their original `iOS LocalServer` / `Android LocalServer` check-names.
    mobile-local-server:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 21
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v5
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  # JDK-21 zinc cache, kept on its own key so cross-JDK class
                  # artifacts don't mix with the JDK-25 jobs' cache. Boots
                  # web/PageTest FixtureServerMain → page scope (every module's
                  # main + test + the web page sources).
                  key: sbt-target-android-ls-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', '**/src/page/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-android-ls-${{ runner.os }}-

            - uses: swift-actions/setup-swift@v2
              with:
                  swift-version: '5.10'

            - uses: actions/cache@v5
              with:
                  path: ios/.build
                  key: spm-build-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/Package.resolved') }}
                  restore-keys: |
                      spm-build-${{ runner.os }}-

            # `packages: platform-tools` instead of the action's default
            # `tools platform-tools`: the deprecated `tools` meta-package drags
            # in the Android Emulator, which this JVM-only `testDebugUnitTest` +
            # swift LocalServer job never uses and whose download flakily corrupts
            # ("Error on ZipFile unknown archive"), failing the whole job before a
            # single test runs. AGP auto-fetches platform-34 / build-tools.
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3
              with:
                  packages: platform-tools

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            # Boot the fixture server in the background ONCE for both mobile
            # suites. Binds a kernel-assigned free port, writes it to a file we
            # busy-wait for, then exports the URL both test steps read.
            - name: Boot FixtureServerMain
              run: |
                  set -euo pipefail
                  PORT_FILE=$(mktemp)
                  echo "PORT_FILE=$PORT_FILE" >> "$GITHUB_ENV"

                  nohup sbt "web/PageTest/runMain tools.FixtureServerMain $PORT_FILE" > fixture-server.log 2>&1 &
                  echo "SERVER_PID=$!" >> "$GITHUB_ENV"

                  # 300s ceiling: ~110s of CPU-bound bootStartup (the whole
                  # ~1000-film fixture corpus through scrape→enrich→fold against
                  # in-memory fixtures — processing cost, not retries) plus, on a
                  # cold sbt-target cache, a full recompile before bootStartup.
                  for _ in $(seq 1 150); do
                      if [ -s "$PORT_FILE" ]; then break; fi
                      sleep 2
                  done
                  if [ ! -s "$PORT_FILE" ]; then
                      echo "::error::FixtureServerMain never wrote a port file"
                      tail -100 fixture-server.log
                      exit 1
                  fi
                  PORT=$(cat "$PORT_FILE")
                  echo "KINOWO_LOCAL_URL=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
                  echo "fixture server listening on http://127.0.0.1:$PORT"

            # Both suites run against the one server; `set +e` + a combined exit
            # status so an iOS failure still lets the Android suite run (and vice
            # versa) — the always() publishes below then surface both. `--no-daemon`
            # so Gradle inherits KINOWO_LOCAL_URL for the forked test JVM.
            - name: Run LocalServer mobile tests (iOS + Android)
              run: |
                  set +e
                  swift test --package-path ios --filter LocalServer --xunit-output ios-localserver.xml
                  ios=$?
                  ( cd android && ./gradlew --no-daemon testDebugUnitTest --tests 'pl.kinowo.localserver.*' )
                  android=$?
                  echo "iOS exit=$ios  Android exit=$android"
                  [ $ios -eq 0 ] && [ $android -eq 0 ]

            - name: Publish iOS test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  # SwiftPM writes `<base>.xml` (XCTest) and
                  # `<base>-swift-testing.xml` (swift-testing); glob both.
                  report_paths: 'ios-localserver*.xml'
                  check_name: iOS LocalServer
                  detailed_summary: true
                  include_passed: false

            - name: Publish Android test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'android/app/build/test-results/testDebugUnitTest/*.xml'
                  check_name: Android LocalServer
                  detailed_summary: true
                  include_passed: false

            - name: Stop FixtureServerMain
              if: always()
              run: |
                  if [ -n "${SERVER_PID:-}" ]; then
                      kill "$SERVER_PID" 2>/dev/null || true
                  fi

            - name: Upload fixture-server log on failure
              if: failure()
              uses: actions/upload-artifact@v6
              with:
                  name: fixture-server-log-mobile
                  path: fixture-server.log
                  if-no-files-found: ignore


    integration-test:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
        # Throwaway Mongo for the run. The IT suites self-seed every doc they
        # assert on (MovieRepositoryIntegrationSpec, MongoTaskQueueIntegrationSpec,
        # UserRepositoryIntegrationSpec, …) and create their own collections/indexes
        # on first use, so a bare empty instance is all they need. Previously
        # this job wrote to the shared Atlas DB via `secrets.MONGODB_URI`; a run
        # cancelled mid-suite — the concurrency group kills superseded pushes
        # before `afterAll` — stranded sentinel fixtures there (the "Dotted
        # (1902)" rows). An ephemeral instance can't be polluted.
        #
        # NOT a `services:` block: MovieRepoIntegrationSpec's change-stream test
        # opens a `$changeStream`, which Mongo only supports on a replica set —
        # against a standalone the stream errors out and the test times out. We
        # need `mongod --replSet`, but GitHub `services:` can't override the
        # container command, so start Mongo by hand as a single-node RS instead.
        steps:
            - uses: actions/checkout@v5

            - name: Start MongoDB (single-node replica set, for change streams)
              run: |
                  docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
                  until docker exec mongo mongosh --quiet --eval 'db.runCommand({ping:1})' >/dev/null 2>&1; do sleep 1; done
                  docker exec mongo mongosh --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]})'
                  until docker exec mongo mongosh --quiet --eval 'rs.status().myState' 2>/dev/null | grep -q '^1$'; do sleep 1; done

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v5
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  # it scope (every module's main + test + it). restore-keys keeps zinc warm.
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', '**/src/it/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Both apps' integration suites in one run (web + worker each have an
            # `it` config); `all` keeps going across them. Still one GH job. The
            # `e2e` module runs in its own parallel job (below) — combining it here
            # made this the deploy gate; with a runner freed by merging the mobile
            # jobs there's now a slot to parallelise e2e off the critical path.
            - run: sbt itAll
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     mongodb://127.0.0.1:27017/kinowo?directConnection=true
                  MONGODB_DB:      kinowo

            - name: Publish test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'target/test-reports/it/**/*.xml'
                  check_name: integration tests
                  detailed_summary: true
                  include_passed: false


    # The `e2e` module (cross-app whole-corpus specs), FANNED OUT across four
    # parallel shards. On one runner the module was the ~13-min pipeline long
    # pole: each heavy spec boots the always-on staging pipeline (~110s) one or
    # more times, and they ran serially. The shards (see the
    # e2eScrape/e2eStaging/e2eReScrape/e2eRest aliases in build.sbt):
    #
    #   scrape   — ScrapeOrderDeterminismSpec  (run by name)
    #   staging  — StagingOrderDeterminismSpec (run by name)
    #   rescrape — ReScrapeIdempotencySpec     (run by name) — the heaviest
    #              single spec; pooled into `rest` it was the pipeline long pole
    #              (it boots the settled corpus, then runs identical re-scrape
    #              ticks against it). Its own shard now.
    #   rest     — every OTHER e2e spec, via `e2e/Test/test -- -l …CorpusReplay`
    #              (tag-EXCLUSION of the three @CorpusReplay specs), so a
    #              newly-added spec auto-rides this shard and can't be silently
    #              dropped. See the `@CorpusReplay` tag annotation in
    #              CorpusReplay.java.
    #
    # Same coverage as the old single job, a fraction of the wall-clock. Each
    # shard pays its own compile, but they run in parallel; the 4th shard's
    # runner slot comes from the page-tests tier staying at 13 (the freed slots
    # earlier came from un-sharding the boot-bound playwright phone jobs below).
    # Uses FixtureTestWiring (no Mongo); reports go to the root unit/ dir
    # (unitReportSettings) → a per-shard `e2e tests (<shard>)` check.
    e2e:
        name: e2e (${{ matrix.shard }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { shard: scrape,   cmd: e2eScrape }
                    - { shard: staging,  cmd: e2eStaging }
                    - { shard: rescrape, cmd: e2eReScrape }
                    - { shard: rest,     cmd: e2eRest }
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v5
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  # Dedicated key so these shards PERSIST the e2e/Test compile
                  # (the shared `sbt-target-` key is owned by `test`, which never
                  # compiles e2e — so on that key e2e recompiled cold every run,
                  # ~100s). All three shards share this one key: only the first to
                  # finish writes it; the rest read it warm. restore-keys falls
                  # back to the shared cache on a miss so web+worker main still
                  # come in warm on the first run.
                  key: sbt-target-e2e-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-e2e-${{ runner.os }}-
                      sbt-target-${{ runner.os }}-

            - run: sbt ${{ matrix.cmd }}
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - name: Publish e2e test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'target/test-reports/unit/**/*.xml'
                  check_name: e2e tests (${{ matrix.shard }})
                  detailed_summary: true
                  include_passed: false


    # Cross-browser page tests, split into one matrix job per engine
    # family so the CI checks list groups red rows by browser. Every
    # row delegates to the shared `run-page-test` composite action —
    # see `.github/actions/run-page-test/action.yml` for the step
    # body that's identical across all four jobs.
    #
    # `kind` (chrome | playwright) drives which steps execute:
    #
    # - `chrome`: install Chrome via browser-actions/setup-chrome,
    #   then `sbt PageTest/test` with `CDP_BROWSER_BIN` pointing at it.
    #
    # - `playwright`: install Node + the one engine binary specified
    #   by `browser`, boot `FixtureServerMain` over a free port, then
    #   `npx playwright test --project <project>`. The Playwright
    #   suite drives `page-tests-playwright/` against a Twirl-rendered
    #   fixture server (InMemoryMovieRepository + FakeHttpFetch — same
    #   wiring the Scala spec uses, exposed over HTTP). Mobile
    #   projects are split per-phone so each runner handles one
    #   phone's four variants (portrait, zoomed, landscape,
    #   zoomed-landscape) — ~4 projects × 20 specs ≈ under 2 min.
    #
    # Chrome version pick reflects real Android phone distribution as
    # of early 2026 (120+ ≈ 85% of devices, 113–120 the long tail);
    # 113 is the floor that chrome-for-testing publishes. `stable`
    # tracks whatever Google ships next. Specific versions catch
    # regressions like the touchstart-vs-click timing change that
    # bit the card-tap fix — see [[feedback-ci-chrome-version-drift]].
    #
    # axe-core gates itself to `chromium-desktop` (see
    # `tests/a11y.spec.ts` — `test.beforeEach` skips on every other
    # project), so only that row pays the audit cost. It's
    # `continue-on-error` because the site has known WCAG violations
    # (`color-contrast` on `.text-secondary` against the dark body
    # bg) that aren't worth blocking deploys over.

    page-tests-chrome:
        name: page tests (chrome / ${{ matrix.variant }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Playwright phone rows run UN-sharded (one runner per phone):
                    # each row is dominated by the ~3-min FixtureServerMain sbt
                    # boot, not the <2-min playwright run, so a 2-way shard paid
                    # the boot twice to save ~1 min — a poor trade. Un-sharded,
                    # the freed runner slots go to the parallel `e2e` shards above.
                    - { variant: stable,         kind: chrome,     version: stable }
                    - { variant: pw galaxy-s10,  kind: playwright, project: 'chromium-galaxy-s10*',  browser: chromium }
                    - { variant: pw galaxy-s25,  kind: playwright, project: 'chromium-galaxy-s25*',  browser: chromium }
                    # chromium pixel-9 (360 px) intentionally dropped — same width
                    # as galaxy-s10; redundant for catching layout breaks. The
                    # project stays in playwright.config.ts so a local
                    # `npx playwright test --project chromium-pixel-9` still runs.
                    - { variant: pw pixel-9-pro, kind: playwright, project: 'chromium-pixel-9-pro*', browser: chromium }
                    - { variant: pw desktop,     kind: playwright, project: chrome-desktop,          browser: chrome }
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
        steps:
            - uses: actions/checkout@v5
            - uses: ./.github/actions/run-page-test
              with:
                  kind:          ${{ matrix.kind }}
                  version:       ${{ matrix.version }}
                  project:       ${{ matrix.project }}
                  browser:       ${{ matrix.browser }}

    page-tests-safari:
        name: page tests (safari / ${{ matrix.variant }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    # The ~13 viewport-INDEPENDENT spec files (localStorage, URL
                    # round-trips, filter inclusion-sets, search, keyboard a11y —
                    # tagged `@agnostic`) assert byte-identically on all three
                    # portrait iPhone widths (375/390/440 all sit in one CSS
                    # bucket), so running them per-phone was a 3× re-run. They
                    # ride ONE `behaviour` job on iphone-13; each phone family runs
                    # only its viewport-SENSITIVE specs (navbar geometry, landscape,
                    # zoomed-gaps), 2-WAY SHARDED. Unlike the chromium phones below
                    # (un-sharded — Chromium is fast enough that the ~3-min boot
                    # dominates), WebKit is slow enough that the test run itself is
                    # the bulk: un-sharded these phones were ~600s and the build's
                    # long pole, so each is split across two runners (~400s). The
                    # slots come from the e2e shards now finishing fast (their
                    # replays run concurrently — see ParallelReplays). Coverage of
                    # every width is unchanged. Firefox stays dropped from CI (the
                    # firefox-desktop project remains in playwright.config.ts for
                    # local runs).
                    - { variant: pw iphone-se,         kind: playwright, project: 'webkit-iphone-se*',         browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '1/2' }
                    - { variant: pw iphone-se,         kind: playwright, project: 'webkit-iphone-se*',         browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '2/2' }
                    - { variant: pw iphone-13,         kind: playwright, project: 'webkit-iphone-13*',         browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '1/2' }
                    - { variant: pw iphone-13,         kind: playwright, project: 'webkit-iphone-13*',         browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '2/2' }
                    - { variant: pw iphone-17-pro-max, kind: playwright, project: 'webkit-iphone-17-pro-max*', browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '1/2' }
                    - { variant: pw iphone-17-pro-max, kind: playwright, project: 'webkit-iphone-17-pro-max*', browser: webkit, grepInvert: 'axe-core|@agnostic', shard: '2/2' }
                    # Viewport-independent specs once, on the representative 390px
                    # portrait (matches the `iPhone 13` base in webkitUse).
                    - { variant: pw behaviour,         kind: playwright, project: webkit-iphone-13,            browser: webkit, grep: '@agnostic', grepInvert: 'axe-core' }
                    - { variant: pw desktop,           kind: playwright, project: webkit-desktop,              browser: webkit, grepInvert: 'axe-core|@agnostic' }
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
        steps:
            - uses: actions/checkout@v5
            - uses: ./.github/actions/run-page-test
