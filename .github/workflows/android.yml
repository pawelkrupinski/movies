name: Android

on:
    pull_request:
        paths:
            - 'android/**'
            - '.github/workflows/android.yml'
    push:
        branches: [main]
        paths:
            - 'android/**'
            - '.github/workflows/android.yml'
    workflow_dispatch:

# Single lane: Linux runner, JDK 17 (AGP 8.6 needs 17+), the preinstalled
# Android SDK + Gradle wrapper (8.9). Runs the JVM unit suite and assembles the
# debug APK — the same two layers a local `./gradlew testDebugUnitTest
# assembleDebug` covers — and ships the APK as an artifact. No emulator job:
# the app has no instrumented (androidTest) suite yet, and an emulator lane is
# slow; add one here if/when Compose UI tests land.
jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: android
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            # Provisions cmdline-tools + accepts SDK licenses so AGP can
            # auto-fetch platform-34 / build-tools 34.0.0 if the runner image
            # doesn't already carry them.
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            # Caches ~/.gradle (wrapper dist + dependency + build caches),
            # keyed on the build scripts and wrapper version.
            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Unit tests
              run: ./gradlew --no-daemon testDebugUnitTest

            - name: Assemble debug APK
              run: ./gradlew --no-daemon assembleDebug

            - name: Upload debug APK
              uses: actions/upload-artifact@v4
              if: success()
              with:
                  name: kinowo-debug-apk
                  path: android/app/build/outputs/apk/debug/app-debug.apk
                  if-no-files-found: error

            - name: Upload test report
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: unit-test-report
                  path: android/app/build/reports/tests/testDebugUnitTest
                  if-no-files-found: ignore
