name: Android

on:
    pull_request:
        paths:
            - 'android/**'
            - '.github/workflows/android.yml'
    push:
        branches: [main]
        paths:
            - 'android/**'
            - '.github/workflows/android.yml'
    workflow_dispatch:

# A newer push to the same ref cancels the older run mid-flight instead of
# letting both build the APK/AAB in parallel.
concurrency:
    group: android-${{ github.ref }}
    cancel-in-progress: true

# Single lane: Linux runner, JDK 17 (AGP 9.1 needs 17+), the preinstalled
# Android SDK + Gradle wrapper (9.3.1). Runs the JVM unit suite, assembles the
# debug APK, then builds the R8-minified release APK + AAB and ships all three
# as (login-gated) workflow artifacts. On main pushes it ALSO publishes the
# signed release APK to a rolling `android-latest` GitHub Release, which has a
# stable anonymous download URL anyone can install from. The release build
# signs with the keystore decoded from repo secrets (see below); with no
# secrets it still builds, just unsigned (and the publish step then fails). No
# emulator job: the Compose UI tests we have (e.g. ShowtimeChipFitTest) render
# off-device via Robolectric and run inside `testDebugUnitTest`, so they need no
# emulator. Add an instrumented (androidTest) lane only if a test ever needs a
# real device/GPU that Robolectric can't fake.
#
# Release signing secrets (Settings ▸ Secrets and variables ▸ Actions):
#   KINOWO_RELEASE_KEYSTORE_BASE64 — `base64 -i kinowo-release.jks`
#   KINOWO_RELEASE_STORE_PASSWORD  — keystore password
#   KINOWO_RELEASE_KEY_ALIAS       — key alias (kinowo)
#   KINOWO_RELEASE_KEY_PASSWORD    — key password
jobs:
    build:
        runs-on: ubuntu-latest
        # `checks: write` so action-junit-report can post the failure
        # check-run + summary from the Gradle JUnit XML. `contents: write`
        # so the rolling-release step can create/update the public
        # `android-latest` GitHub Release + its tag.
        permissions:
            contents: write
            checks: write
        # Hoisted to job scope so the Play-publish step's `if:` can test whether
        # the service-account secret is set (secrets can't be read directly in
        # an `if:`, but a job-level env derived from one can).
        env:
            PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        defaults:
            run:
                working-directory: android
        steps:
            - uses: actions/checkout@v5

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: '17'

            # Provisions cmdline-tools + accepts SDK licenses so AGP can
            # auto-fetch platform-37 / build-tools 37.0.0 if the runner image
            # doesn't already carry them. `packages: platform-tools` pins the
            # install to a minimal set instead of the action's default
            # `tools platform-tools` — the deprecated `tools` meta-package drags
            # in the Android Emulator (~hundreds of MB), which this JVM-only
            # `testDebugUnitTest` lane never uses and whose download flakily
            # corrupts ("Error on ZipFile unknown archive"), failing the job.
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3
              with:
                  packages: platform-tools

            # Caches ~/.gradle (wrapper dist + dependency + build caches),
            # keyed on the build scripts and wrapper version.
            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Unit tests
              run: ./gradlew --no-daemon testDebugUnitTest

            # Surface the Gradle JUnit XML as a check-run + summary. The
            # HTML report is still uploaded on failure below for the full
            # stack traces. `report_paths` is repo-relative (the action
            # runs outside the `working-directory: android` default).
            - name: Publish test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'android/app/build/test-results/testDebugUnitTest/*.xml'
                  check_name: Android unit tests
                  detailed_summary: true
                  include_passed: false

            - name: Assemble debug APK
              run: ./gradlew --no-daemon assembleDebug

            - name: Upload debug APK
              uses: actions/upload-artifact@v6
              if: success()
              with:
                  name: kinowo-debug-apk
                  path: android/app/build/outputs/apk/debug/app-debug.apk
                  if-no-files-found: error

            # Decode the base64 keystore secret to a file the Gradle signing
            # config can read. Absent secret → no file, and the release build
            # falls back to unsigned (build.gradle.kts logs a warning).
            - name: Decode release keystore
              id: keystore
              env:
                  KEYSTORE_BASE64: ${{ secrets.KINOWO_RELEASE_KEYSTORE_BASE64 }}
              run: |
                  if [ -n "$KEYSTORE_BASE64" ]; then
                      echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kinowo-release.jks"
                      echo "store_file=$RUNNER_TEMP/kinowo-release.jks" >> "$GITHUB_OUTPUT"
                      echo "Release keystore decoded — release build will be signed."
                  else
                      echo "::warning::No KINOWO_RELEASE_KEYSTORE_BASE64 secret — release build will be UNSIGNED."
                  fi

            - name: Assemble release APK + AAB
              env:
                  KINOWO_RELEASE_STORE_FILE: ${{ steps.keystore.outputs.store_file }}
                  KINOWO_RELEASE_STORE_PASSWORD: ${{ secrets.KINOWO_RELEASE_STORE_PASSWORD }}
                  KINOWO_RELEASE_KEY_ALIAS: ${{ secrets.KINOWO_RELEASE_KEY_ALIAS }}
                  KINOWO_RELEASE_KEY_PASSWORD: ${{ secrets.KINOWO_RELEASE_KEY_PASSWORD }}
                  # Strictly-increasing versionCode for Play (see build.gradle.kts).
                  KINOWO_VERSION_CODE: ${{ github.run_number }}
              run: ./gradlew --no-daemon assembleRelease bundleRelease assembleTuneRelease

            - name: Upload release APK
              uses: actions/upload-artifact@v6
              if: success()
              with:
                  name: kinowo-release-apk
                  # Glob catches both the signed `app-release.apk` and the
                  # unsigned-fallback `app-release-unsigned.apk` (no secrets).
                  path: android/app/build/outputs/apk/release/app-release*.apk
                  if-no-files-found: error

            - name: Upload release AAB
              uses: actions/upload-artifact@v6
              if: success()
              with:
                  name: kinowo-release-aab
                  path: android/app/build/outputs/bundle/release/app-release.aab
                  if-no-files-found: error

            # Manually-triggered publish of the signed AAB to Google Play's
            # `internal` testing track. workflow_dispatch ONLY — a normal push/PR
            # never ships to Play; you click "Run workflow" in the Actions tab
            # when you want to release. Gated on PLAY_SERVICE_ACCOUNT_JSON: absent
            # → the step below is skipped and a notice explains how to enable it,
            # so the workflow still passes without the secret.
            #
            # Prerequisites (one-time, outside CI): the app `pl.kinowo` must
            # already exist in the Play Console with its FIRST AAB uploaded
            # manually once; a Google Cloud service account with the Play Android
            # Developer API enabled + release permission in the Console; its JSON
            # key stored as the PLAY_SERVICE_ACCOUNT_JSON repo secret. mappingFile
            # uploads the R8 deobfuscation map so Play can symbolicate crashes.
            - name: Publish to Google Play (internal)
              if: ${{ github.event_name == 'workflow_dispatch' && env.PLAY_JSON != '' }}
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
                  packageName: net.pawel.kinowo
                  releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
                  mappingFile: android/app/build/outputs/mapping/release/mapping.txt
                  track: internal
                  status: completed

            - name: Note skipped Play publish
              if: ${{ github.event_name == 'workflow_dispatch' && env.PLAY_JSON == '' }}
              run: echo "::notice::Play upload skipped — add the PLAY_SERVICE_ACCOUNT_JSON secret (service-account key with Play release permission) to enable it."

            - name: Upload tune APK
              uses: actions/upload-artifact@v6
              if: success()
              with:
                  name: kinowo-tune-apk
                  # Signed, minified build that exposes the tweak screen (the
                  # "Kinowo Tune" launcher icon). Glob catches the unsigned
                  # fallback too when no signing secrets are present.
                  path: android/app/build/outputs/apk/tuneRelease/app-tuneRelease*.apk
                  if-no-files-found: error

            # Publish the signed release APK + AAB to a rolling `android-latest`
            # GitHub Release so they have stable, anonymous download URLs that
            # don't require a GitHub login (unlike the upload-artifact above):
            #   https://github.com/${{ github.repository }}/releases/download/android-latest/kinowo.apk
            #   https://github.com/${{ github.repository }}/releases/download/android-latest/kinowo.aab
            # The APK is for sideloading; the AAB is the Play Console upload
            # artifact (Play requires an AAB, not an APK).
            #
            # Only on main pushes / manual runs — never on PRs. We delete +
            # recreate the release each time so its tag tracks the newest main
            # commit (a rolling "latest", not a versioned release). Marked
            # prerelease so it stays out of the repo's "Latest release" slot.
            # Requires the KINOWO_RELEASE_* signing secrets: an unsigned APK
            # won't install, so we fail loudly rather than publish a dud.
            - name: Publish rolling APK + AAB release
              if: success() && github.event_name != 'pull_request'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  apk=app/build/outputs/apk/release/app-release.apk
                  aab=app/build/outputs/bundle/release/app-release.aab
                  if [ ! -f "$apk" ]; then
                      echo "::error::Signed $apk not found — set KINOWO_RELEASE_KEYSTORE_BASE64 (+ store/key secrets); unsigned builds won't install."
                      exit 1
                  fi
                  if [ ! -f "$aab" ]; then
                      echo "::error::Signed $aab not found — the bundleRelease step should have produced it."
                      exit 1
                  fi
                  cp "$apk" "$RUNNER_TEMP/kinowo.apk"
                  cp "$aab" "$RUNNER_TEMP/kinowo.aab"
                  gh release delete android-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
                  gh release create android-latest \
                      --repo "$GITHUB_REPOSITORY" \
                      --target "$GITHUB_SHA" \
                      --prerelease \
                      --title "Kinowo Android (latest)" \
                      --notes "Signed build from the latest \`main\` commit (${GITHUB_SHA:0:7}). \`kinowo.apk\` to sideload on Android (enable installing from unknown sources); \`kinowo.aab\` to upload to the Google Play Console." \
                      "$RUNNER_TEMP/kinowo.apk" \
                      "$RUNNER_TEMP/kinowo.aab"

            # Same as above, for the tweak build: a signed, minified APK
            # (≈ the same size as kinowo.apk) that adds the "Kinowo Tune"
            # launcher icon → the on-device tweak screen. Published to its own
            # rolling release so the public android-latest stays clean:
            #   https://github.com/${{ github.repository }}/releases/download/android-tune-latest/kinowo-tune.apk
            - name: Publish rolling tune APK release
              if: success() && github.event_name != 'pull_request'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  apk=app/build/outputs/apk/tuneRelease/app-tuneRelease.apk
                  if [ ! -f "$apk" ]; then
                      echo "::error::Signed $apk not found — set KINOWO_RELEASE_KEYSTORE_BASE64 (+ store/key secrets); unsigned builds won't install."
                      exit 1
                  fi
                  cp "$apk" "$RUNNER_TEMP/kinowo-tune.apk"
                  gh release delete android-tune-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
                  gh release create android-tune-latest \
                      --repo "$GITHUB_REPOSITORY" \
                      --target "$GITHUB_SHA" \
                      --prerelease \
                      --title "Kinowo Android — tweak build (latest)" \
                      --notes "Signed APK from the latest \`main\` build (${GITHUB_SHA:0:7}) WITH the on-device tweak screen — tap the \"Kinowo Tune\" launcher icon to open it. Sideload \`kinowo-tune.apk\` on Android; enable installing from unknown sources." \
                      "$RUNNER_TEMP/kinowo-tune.apk"

            - name: Upload test report
              uses: actions/upload-artifact@v6
              if: failure()
              with:
                  name: unit-test-report
                  path: android/app/build/reports/tests/testDebugUnitTest
                  if-no-files-found: ignore
