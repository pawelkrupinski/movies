name: Sync title rules from prod

# Mirrors the live prod `titleRules` collection into the checked-in
# `GeneratedTitleRules.scala`, so the test suite always runs EXACTLY the rules
# prod runs — including ones an operator added through the /admin/title-rules UI
# that never made it back into `ExtraTitleRules`. Without this, those admin-only
# rules silently diverge: prod strips a banner the tests don't, and a rule that
# stops matching in prod is invisible to CI.
#
# This does NOT deploy and does NOT push to main — it only authors a branch + PR
# for a human to review. The dump is deterministic (record-grouped + escaped by
# scripts.DumpTitleRules), so a no-change run produces no PR; a diff means the
# prod rules genuinely moved.

on:
    # Manual trigger for an on-demand refresh.
    workflow_dispatch:

    # Daily at 04:17 UTC. Cheap (one Mongo read + a file write + a compile) and
    # only opens a PR when prod actually changed, so a daily cadence is just a
    # tight drift detector, not noise. GitHub cron is UTC-only.
    schedule:
        - cron: '17 4 * * *'

# Author/commit the regenerated mirror into the PR branch.
permissions:
    contents: write
    pull-requests: write

jobs:
    sync-title-rules:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4

            # Same Scala toolchain as every other sbt job (ci.yml / refresh-fixtures.yml):
            # Temurin JDK 25 + sbt dependency caching.
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Share the same zinc/sbt-target cache shape as ci.yml so a cold
            # compile is the exception.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', '**/src/it/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Read the prod `titleRules` collection and regenerate the mirror.
            # `secrets.MONGODB_URI` is the same prod connection ci.yml's
            # integration-test job uses (read-only here — the dump only queries).
            - name: Dump prod title rules to code
              env:
                  MONGODB_URI: ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:  ${{ secrets.MONGODB_DB }}
              run: sbt "worker/Test/runMain scripts.DumpTitleRules"

            # Fail the job (no PR) if the freshly-dumped file doesn't compile or
            # the live rules don't behave — better a red sync run than a broken
            # mirror landing in a PR.
            - name: Validate the regenerated mirror
              run: sbt "worker/testOnly scripts.DumpTitleRulesSpec services.movies.GeneratedTitleRulesSpec"

            # Open (or update) a PR with the refreshed mirror. A fixed branch means
            # a later run amends the open PR instead of stacking duplicates; if the
            # dump produced no diff, the action is a no-op and no PR is created.
            - name: Open sync PR
              uses: peter-evans/create-pull-request@v6
              with:
                  branch: chore/sync-title-rules
                  delete-branch: true
                  commit-message: 'chore: sync title rules from prod'
                  title: 'chore: sync title rules from prod'
                  body: |
                      Automated mirror of the live prod `titleRules` collection
                      into `worker/src/test/scala/scripts/GeneratedTitleRules.scala`,
                      so the test suite runs exactly the rules prod runs.

                      A diff here means the prod rules changed since the last sync —
                      typically a rule added/edited through `/admin/title-rules`.
                      **Review the diff**: if it's a rule you want to keep, also add
                      it to `ExtraTitleRules` (the curated, hand-reviewed source that
                      `ApplyExtraTitleRules` pushes) so the two don't drift; if it's
                      junk (e.g. a blank draft), delete it from prod instead.

                      Generated by `.github/workflows/sync-title-rules.yml`.
