name: iOS

on:
    pull_request:
        paths:
            - 'ios/**'
            - '.github/workflows/ios.yml'
    push:
        branches: [main]
        paths:
            - 'ios/**'
            - '.github/workflows/ios.yml'
    schedule:
        - cron: '0 4 * * *'
    workflow_dispatch:

# A newer push to the same ref cancels the older run mid-flight, freeing the
# slow macOS Simulator lane instead of queueing stale UI-test work behind it.
concurrency:
    group: ios-${{ github.ref }}
    cancel-in-progress: true

# `checks: write` so action-junit-report can post failure check-runs +
# summaries; `contents: read` for checkout. All jobs are same-repo.
permissions:
    contents: read
    checks: write

# Three jobs, two lanes:
#
#   unit-integration ─► Linux swift:5.10 container, fast.
#   ui-tests         ─► macOS runner + iOS Simulator, slow.
#   smoke            ─► Linux container, hits prod (kinowo.fly.dev).
#                       Gated on RUN_SMOKE_TESTS=1; scheduled nightly,
#                       skipped on PRs so kinowo.fly.dev doesn't soak
#                       every push.
jobs:
    unit-integration:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        container: swift:5.10
        steps:
            - uses: actions/checkout@v4

            - uses: actions/cache@v4
              with:
                  path: ios/.build
                  key: spm-build-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/Package.resolved') }}
                  restore-keys: |
                      spm-build-${{ runner.os }}-

            # RUN_SMOKE_TESTS unset → SmokeTestCase XCTSkips itself, so a
            # plain `swift test` covers Unit + Integration cleanly.
            - run: swift test --package-path ios --xunit-output ios-unit.xml

            - name: Publish test report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'ios-unit*.xml'
                  check_name: iOS unit/integration
                  detailed_summary: true
                  include_passed: false


    ui-tests:
        if: github.event_name != 'schedule'
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest-stable

            # KinowoUITests target + shared scheme are still being wired
            # by a parallel change. Don't block main until that lands.
            - name: Run XCUITest
              continue-on-error: true
              run: |
                  xcodebuild test \
                      -project ios/Kinowo.xcodeproj \
                      -scheme Kinowo \
                      -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
                      -resultBundlePath build/Kinowo.xcresult \
                      CODE_SIGNING_ALLOWED=NO

            # Turn the binary XCUITest result bundle into JUnit XML so a
            # failure is readable on the run page without Xcode. The
            # upload below keeps the full bundle for deep inspection.
            - name: Convert xcresult to JUnit
              if: always()
              run: |
                  brew install a7ex/homebrew-formulae/xcresultparser
                  xcresultparser --output-format junit build/Kinowo.xcresult > xcuitest.xml || true

            - name: Publish XCUITest report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'xcuitest.xml'
                  check_name: iOS XCUITest
                  detailed_summary: true
                  include_passed: false

            # XCUITest step is continue-on-error (target still being
            # wired), so leave a glance-able signal when it has failures.
            - name: Flag XCUITest failures
              if: always()
              run: '[ -s xcuitest.xml ] && grep -q "<failure" xcuitest.xml && echo "::warning::XCUITest reported failures — see the iOS XCUITest check" || true'

            # Parity check — catches Foundation/Darwin vs Linux drift in
            # the parser layer that Linux swift-corelibs-foundation
            # wouldn't surface.
            - name: Run SPM tests on macOS
              run: swift test --package-path ios --xunit-output ios-macos.xml

            - name: Publish SPM macOS report
              if: always()
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: 'ios-macos*.xml'
                  check_name: iOS SPM (macOS)
                  detailed_summary: true
                  include_passed: false

            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: Kinowo.xcresult
                  path: build/Kinowo.xcresult
                  if-no-files-found: ignore


    smoke:
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        runs-on: ubuntu-latest
        container: swift:5.10
        steps:
            - uses: actions/checkout@v4

            - uses: actions/cache@v4
              with:
                  path: ios/.build
                  key: spm-build-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/Package.resolved') }}
                  restore-keys: |
                      spm-build-${{ runner.os }}-

            - run: swift test --package-path ios --filter Smoke
              env:
                  RUN_SMOKE_TESTS: '1'

            - if: failure()
              run: echo "::warning::Smoke tests failed — kinowo.fly.dev response shape drifted; see test output above."

