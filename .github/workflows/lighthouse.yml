name: Lighthouse

on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:

# Periodic audit of the live site — catches score drift between
# deploys (e.g. third-party script changes, CDN shifts, Fly cold-start
# regressions). The post-deploy Lighthouse job in deploy.yml covers
# deploy-time; this one covers the gaps.
jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Lighthouse CI (desktop)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.json
                  uploadArtifacts: true
                  artifactName: lighthouse-results-desktop
                  temporaryPublicStorage: true

            - name: Lighthouse CI (mobile)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.mobile.json
                  uploadArtifacts: true
                  artifactName: lighthouse-results-mobile
                  temporaryPublicStorage: true
