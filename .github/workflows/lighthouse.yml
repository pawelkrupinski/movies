name: Lighthouse

on:
    push:
        branches: [main]
    schedule:
        - cron: '0 6 * * 1'
    workflow_dispatch:

# Informational only — does NOT gate deploy. Lighthouse runs against
# the live site (post-deploy on push, weekly on schedule), warns on
# score drops below threshold, and uploads the full HTML report to
# Lighthouse's temporary public storage so a single click from the
# workflow run opens the breakdown. Thresholds live in
# .lighthouserc.json — adjust there, not here.
jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Lighthouse CI
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.json
                  uploadArtifacts: true
                  temporaryPublicStorage: true
