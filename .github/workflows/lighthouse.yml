name: Lighthouse

on:
    push:
        branches: [main]
    schedule:
        - cron: '0 6 * * 1'
    workflow_dispatch:

# Runs against the live site (post-deploy on push, weekly on
# schedule) and uploads the full HTML report to Lighthouse's
# temporary public storage so a single click from the workflow run
# opens the breakdown.
#
# Does NOT gate deploy (the workflow runs AFTER deploy.yml has
# already shipped), but a score drop on accessibility / best-
# practices / seo now FAILS this workflow — those categories are
# stable run-to-run and a regression is real. Performance stays
# 'warn' because mobile-throttled scores flake by 0.1–0.2 on the
# free Fly tier. See `.lighthouserc.json` for thresholds.
#
# Both desktop AND mobile form factors run because the audit verdict
# differs: mobile applies CPU/network throttling (4× slowdown, slow
# 4G), which is closer to how most kinowo visitors actually load the
# site; desktop is the baseline for "what's possible on good
# hardware". Thresholds live in `.lighthouserc.json` (desktop) and
# `.lighthouserc.mobile.json` (mobile) — adjust there, not here.
jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Lighthouse CI (desktop)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.json
                  uploadArtifacts: true
                  artifactName: lighthouse-results-desktop
                  temporaryPublicStorage: true

            - name: Lighthouse CI (mobile)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.mobile.json
                  uploadArtifacts: true
                  # Distinct artifactName per step — both runs in the
                  # same job upload to the same workflow run, so the
                  # default `lighthouse-results` name collides with
                  # the desktop step's upload (409 Conflict).
                  artifactName: lighthouse-results-mobile
                  temporaryPublicStorage: true

            # Same wake-on-failure pattern as deploy.yml. Fires on
            # any step failure — including the assertion gates in
            # the .lighthouserc*.json files: a11y / best-practices /
            # seo regressions wake Claude here.
            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    lighthouse
