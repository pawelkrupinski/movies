name: Refresh test fixtures

# Periodically re-records the HTTP test-fixture corpus against the live
# upstreams and regenerates the checked-in expectation snapshots, then opens a
# PR with the result. This keeps the fixture tree fresh — the scraped cinema
# HTML, the TMDB/IMDb/Filmweb/RT/Metacritic enrichment responses, and the
# rendered-page snapshots all drift as upstreams change their markup/data — so a
# stale corpus silently stops catching real parser regressions. Running it on a
# schedule replaces the manual `RecordAllDataToFixture` + snapshot-regen toil.
#
# This workflow does NOT deploy and does NOT push to main: it only authors a
# branch + PR for a human to review and merge. The recorder hits live services,
# so its output is non-deterministic and must be eyeballed before it lands.
#
# ── The fixture capture date ────────────────────────────────────────────────
#
# The corpus lives under `test/resources/fixtures/<dd-MM-yyyy>/`, where the dir
# name IS the capture date. Two specs pin a matching `now = LocalDateTime.of(…)`
# so the rendered output is deterministic for that date:
#
#   - web/src/page/scala/views/PageSnapshotSpec.scala         (now + dir + wiring date)
#   - e2e/src/test/scala/services/movies/FilmScheduleEndToEndSpec.scala (same)
#
# As of authoring, that date (`17-05-2026`) is hard-coded in BOTH specs plus the
# recorder (`worker/src/test/scala/clients/tools/RecordAllDataToFixture.scala`)
# and FixtureServerMain / PageJsBehaviourSpec / MobileScreenshots — there is NOT
# yet a single shared "fixture capture date" constant to drive them all from.
#
# TODO(shared-date-constant): a parallel change is introducing one shared
# constant that the dir name and every spec's `now` pin derive from. Once it
# lands, replace the per-spec `sed` rewrites below with a single edit to that
# constant (and drop the recorder-date override). Until then, this workflow
# rewrites the date in every place it appears so the freshly-recorded dir and
# the specs that read it stay in lockstep. If you add a new file that hard-codes
# the capture date, add it to the `Re-pin capture date` step below.

on:
    # Manual trigger. `capture_date` lets a human override the dir/date (e.g. to
    # re-record under a specific day); it defaults to today (UTC) when omitted.
    workflow_dispatch:
        inputs:
            capture_date:
                description: 'Capture date for the new fixture dir + spec pins (dd-MM-yyyy). Defaults to today (UTC).'
                required: false
                default: ''

    # Monthly cadence: 03:00 UTC on the 1st of each month. Monthly (not daily)
    # because a full re-record is a heavy live-scrape pass and each run opens a
    # PR a human must review — daily PRs would be noise. GitHub cron is UTC-only
    # with no DST awareness; the exact wall-clock hour is irrelevant for an
    # unattended monthly job.
    schedule:
        - cron: '0 3 1 * *'

# Author/commit the regenerated corpus into the PR branch.
permissions:
    contents: write
    pull-requests: write

jobs:
    refresh-fixtures:
        runs-on: ubuntu-latest
        # The recorder runs the full production scrape + enrichment pipeline
        # once against every cinema in the catalogue and every rating source,
        # then both snapshot specs render the whole corpus. Give it plenty of
        # headroom over the default — a cold cache compiles every module first.
        timeout-minutes: 90
        steps:
            - uses: actions/checkout@v4

            # Mirror the repo's Scala CI toolchain (see ci.yml / filmweb-diff.yml):
            # Temurin JDK + sbt dependency caching. The build emits Java 21
            # bytecode (`--java-output-version 21`) but the toolchain itself is
            # JDK 25 across every sbt job in this repo, so we match that here
            # rather than the task's nominal "JDK 21" to stay consistent with
            # the rest of CI.
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across runs, same key shape as ci.yml's jobs so
            # this job shares their sbt-target cache and a cold compile is the
            # exception, not the rule.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', '**/src/page/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Resolve the capture date once: the workflow_dispatch input if
            # given, else today (UTC) as dd-MM-yyyy. `OLD_DATE` is the date
            # currently pinned in the specs (the existing fixture dir), which we
            # rewrite to `NEW_DATE` everywhere below.
            - name: Resolve capture dates
              id: dates
              run: |
                  set -euo pipefail
                  NEW_DATE="${{ github.event.inputs.capture_date }}"
                  if [ -z "$NEW_DATE" ]; then
                      NEW_DATE="$(date -u +%d-%m-%Y)"
                  fi
                  # The single dir currently under test/resources/fixtures that the
                  # specs read — discovered by the `now =`/`snapshotDir` pin, but
                  # simplest is to read it off the existing expected snapshot.
                  OLD_DATE="$(basename "$(dirname test/resources/fixtures/*/expected-index.html)")"
                  echo "new_date=$NEW_DATE" >> "$GITHUB_OUTPUT"
                  echo "old_date=$OLD_DATE" >> "$GITHUB_OUTPUT"
                  echo "Re-recording corpus: $OLD_DATE -> $NEW_DATE"

            # Record the whole corpus. `RecordAllDataToFixture` is a `runMain` in
            # the WORKER module's TEST scope (it extends the test-only TestWiring,
            # which wires the full city catalogue with an InMemoryMovieRepo). It
            # runs the real cinema scrape + the full enrichment cascade
            # (TMDB → IMDb → Metacritic → RT → Filmweb) against live upstreams,
            # writing one fixture file per unique URL under
            # `test/resources/fixtures/<date>/`.
            #
            # The recorder hard-codes its target dir as the OLD date string, so
            # before running we rewrite that one literal to NEW_DATE. (Captured in
            # the `Re-pin capture date` step's TODO — when the shared-date
            # constant lands, this `sed` goes away.)
            #
            # Secrets: the same two API keys ci.yml's test jobs export, which are
            # the only keyed upstreams the recorder hits — TMDB (TMDB_API_KEY) for
            # enrichment, and Zyte (ZYTE_API_KEY) for the cinema scrapes that
            # route through it (Multikino's API, biletyna venues). IMDb, Filmweb,
            # Rotten Tomatoes and Metacritic are keyless HTML/GraphQL-CDN scrapes
            # and need no secret. MONGODB_* are passed for parity with ci.yml even
            # though the recorder uses an in-memory repo (no Mongo writes).
            - name: Record fixtures into a fresh dir
              env:
                  ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
                  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:  ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:   ${{ secrets.MONGODB_DB }}
              run: |
                  set -euo pipefail
                  NEW_DATE="${{ steps.dates.outputs.new_date }}"
                  OLD_DATE="${{ steps.dates.outputs.old_date }}"

                  # Point the recorder at the new dir name for this run.
                  sed -i "s/${OLD_DATE}/${NEW_DATE}/g" \
                      worker/src/test/scala/clients/tools/RecordAllDataToFixture.scala

                  sbt "worker/Test/runMain clients.tools.RecordAllDataToFixture"

                  # Drop the previous corpus — the new dir fully supersedes it.
                  if [ "$OLD_DATE" != "$NEW_DATE" ]; then
                      git rm -r --quiet "test/resources/fixtures/${OLD_DATE}" || \
                          rm -rf "test/resources/fixtures/${OLD_DATE}"
                  fi

            # Re-pin the capture date in every spec/tool that hard-codes it so the
            # rendered snapshots are deterministic for the new corpus. This is the
            # set discovered by `grep -rl 17-05-2026 --include=*.scala`:
            #   - PageSnapshotSpec   (now + snapshotDir + FixtureTestWiring date)
            #   - FilmScheduleEndToEndSpec (now + FixtureTestWiring + snapshot path)
            #   - FixtureServerMain  (serves the corpus to the iOS/Android/Playwright jobs)
            #   - PageJsBehaviourSpec, MobileScreenshots (read the same dir)
            # The `LocalDateTime.of(2026, 5, 17, …)` form is rewritten too so the
            # `now` pin tracks the dir.
            #
            # TODO(shared-date-constant): collapse all of this to a single edit
            # once the shared "fixture capture date" constant exists.
            - name: Re-pin capture date in specs
              run: |
                  set -euo pipefail
                  NEW_DATE="${{ steps.dates.outputs.new_date }}"
                  OLD_DATE="${{ steps.dates.outputs.old_date }}"

                  # Rewrite the dd-MM-yyyy dir string wherever it appears.
                  grep -rl "$OLD_DATE" --include='*.scala' . | while read -r f; do
                      sed -i "s/${OLD_DATE}/${NEW_DATE}/g" "$f"
                  done

                  # Rewrite the LocalDateTime `now` pin (yyyy, M, d) to match the
                  # new dir. Split NEW_DATE (dd-MM-yyyy) into numeric parts and
                  # rewrite any `LocalDateTime.of(<y>, <m>, <d>, 0, 0)` whose date
                  # equals the OLD pin to the new one.
                  IFS='-' read -r ND NM NY <<< "$NEW_DATE"
                  IFS='-' read -r OD OM OY <<< "$OLD_DATE"
                  # Strip leading zeros so the numbers match the un-padded literals
                  # the specs use (LocalDateTime.of(2026, 5, 17, …)).
                  NDn=$((10#$ND)); NMn=$((10#$NM))
                  ODn=$((10#$OD)); OMn=$((10#$OM))
                  grep -rl "LocalDateTime.of(${OY}, ${OMn}, ${ODn}," --include='*.scala' . | while read -r f; do
                      sed -i "s/LocalDateTime.of(${OY}, ${OMn}, ${ODn},/LocalDateTime.of(${NY}, ${NMn}, ${NDn},/g" "$f"
                  done

            # Regenerate the 5 checked-in expectation snapshots. Deleting them
            # makes each spec write the fresh render on its FIRST run (and fail
            # with "Snapshot didn't exist — wrote …"); the SECOND run then diffs
            # the just-written file against itself and must pass. A second-run
            # failure means the render is non-deterministic — surfaced as a
            # failed job, not a silently-bad PR.
            #
            # The 5 snapshots:
            #   PageSnapshotSpec (web/PageTest) ->
            #     expected-index.html, expected-plan.html,
            #     expected-warszawa-index.html, expected-wroclaw-index.html
            #   FilmScheduleEndToEndSpec (e2e/Test) ->
            #     expected-schedules.txt
            - name: Regenerate expectation snapshots
              run: |
                  set -euo pipefail
                  NEW_DATE="${{ steps.dates.outputs.new_date }}"
                  DIR="test/resources/fixtures/${NEW_DATE}"

                  rm -f \
                      "$DIR/expected-index.html" \
                      "$DIR/expected-plan.html" \
                      "$DIR/expected-warszawa-index.html" \
                      "$DIR/expected-wroclaw-index.html" \
                      "$DIR/expected-schedules.txt"

                  # First pass: writes the missing snapshots, expected to FAIL.
                  # `|| true` so the job continues to the confirming pass — the
                  # "didn't exist — wrote" failure is the designed signal, not an
                  # error. The second pass below is the real gate.
                  sbt "web/PageTest/testOnly views.PageSnapshotSpec" || true
                  sbt "e2e/testOnly services.movies.FilmScheduleEndToEndSpec" || true

            # Confirming pass: with the snapshots now present, both specs must
            # PASS. If they don't, the render is non-deterministic for this corpus
            # and the job fails here rather than opening a bad PR.
            - name: Confirm snapshots are stable
              run: |
                  set -euo pipefail
                  sbt "web/PageTest/testOnly views.PageSnapshotSpec"
                  sbt "e2e/testOnly services.movies.FilmScheduleEndToEndSpec"

            # Open (or update) a PR with the refreshed corpus + re-pinned specs.
            # peter-evans/create-pull-request stages every change in the tree
            # (the new fixture dir, the deleted old dir, the spec date edits),
            # commits them on a fixed branch, and opens/updates the PR. Using a
            # fixed branch means a later run amends the existing open PR instead
            # of piling up duplicates.
            - name: Open refresh PR
              uses: peter-evans/create-pull-request@v6
              with:
                  branch: chore/refresh-fixtures
                  delete-branch: true
                  commit-message: 'chore: refresh test fixtures (${{ steps.dates.outputs.new_date }})'
                  title: 'chore: refresh test fixtures (${{ steps.dates.outputs.new_date }})'
                  body: |
                      Automated test-fixture corpus refresh.

                      Re-recorded the full HTTP fixture tree against the live
                      upstreams (cinema scrapes + TMDB/IMDb/Filmweb/RT/Metacritic
                      enrichment) into `test/resources/fixtures/${{ steps.dates.outputs.new_date }}/`,
                      replacing `${{ steps.dates.outputs.old_date }}`, and
                      regenerated the 5 expectation snapshots
                      (`expected-index.html`, `expected-plan.html`,
                      `expected-warszawa-index.html`, `expected-wroclaw-index.html`,
                      `expected-schedules.txt`). The capture-date pins in
                      `PageSnapshotSpec`, `FilmScheduleEndToEndSpec`,
                      `FixtureServerMain` and friends were re-pointed to the new
                      date.

                      This is a periodic sanity-check that our parsers still
                      handle current upstream markup/data. **Review the snapshot
                      diff before merging** — the recorder hits live services, so
                      the output is non-deterministic and a large/unexpected diff
                      may signal an upstream change worth investigating rather than
                      rubber-stamping.

                      Generated by `.github/workflows/refresh-fixtures.yml`.
