name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Pipeline shape:
#
#   test ────────────┬─►  deploy
#   integration-test ┤
#   page-tests ──────┘
#
# All three test legs run independently. Each does its own compile
# (sharing the `actions/cache` keyed on hashed sources so the second
# and third jobs in find zinc state warm). The test job also produces
# the Play universal-stage dist for deploy, uploaded as the `stage`
# artifact.
#
# `page-tests` is the only job that needs a browser: PageJsBehaviourSpec
# drives a real headless Chrome over CDP to exercise the JS on the
# rendered pages. Kept out of `test` so the main unit job stays
# browser-free and the page checks get a discrete CI status row.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # On any failure above (compile, test, stage), poke the local
            # Claude wake-up listener so a fresh Claude Code tab opens on
            # my Mac with the failure context. See
            # `scripts/ci-wakeup/server.py` for the listener and the
            # cloudflared tunnel that fronts it. The webhook secret +
            # URL are stored as repo secrets; an empty `||:` swallows
            # curl errors so a tunnel outage doesn't pile a second
            # failure on top of the first.
            - name: Wake local Claude on failure
              if: failure()
              run: |
                curl -sS --max-time 10 -X POST \
                  -H "Authorization: Bearer ${{ secrets.CLAUDE_WAKEUP_SECRET }}" \
                  -H "Content-Type: application/json" \
                  -d '{"run_id":"${{ github.run_id }}","sha":"${{ github.sha }}","branch":"${{ github.ref_name }}","job":"test","workflow":"${{ github.workflow }}"}' \
                  "${{ secrets.CLAUDE_WAKEUP_URL }}" ||:

            # Produce the Play universal-stage distribution here so the
            # deploy job can ship it straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt test` —
            # only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - name: Wake local Claude on failure
              if: failure()
              run: |
                curl -sS --max-time 10 -X POST \
                  -H "Authorization: Bearer ${{ secrets.CLAUDE_WAKEUP_SECRET }}" \
                  -H "Content-Type: application/json" \
                  -d '{"run_id":"${{ github.run_id }}","sha":"${{ github.sha }}","branch":"${{ github.ref_name }}","job":"integration-test","workflow":"${{ github.workflow }}"}' \
                  "${{ secrets.CLAUDE_WAKEUP_URL }}" ||:

    page-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Pin a Chrome version so a runner-image bump can't break the
            # CDP wire format under PageJsBehaviourSpec — the spec talks
            # raw DevTools Protocol over WebSocket, and major Chrome
            # versions occasionally rename / restructure messages.
            - uses: browser-actions/setup-chrome@v1
              id: setup-chrome
              with:
                  chrome-version: stable

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # `setup-chrome` writes the binary to a path the action exposes
            # via `chrome-path`. Symlink it into one of CdpDriver's
            # CandidatePaths so the spec's discovery logic finds it
            # without needing to know about runner-specific layouts.
            - run: sudo ln -sf "${{ steps.setup-chrome.outputs.chrome-path }}" /usr/bin/google-chrome

            # Page tests don't hit any external service — FixtureTestWiring
            # injects a stub TMDB key, FakeHttpFetch replays disk fixtures,
            # InMemoryMovieRepo replaces Mongo. So no secrets needed.
            - run: sbt PageTest/test

            - name: Wake local Claude on failure
              if: failure()
              run: |
                curl -sS --max-time 10 -X POST \
                  -H "Authorization: Bearer ${{ secrets.CLAUDE_WAKEUP_SECRET }}" \
                  -H "Content-Type: application/json" \
                  -d '{"run_id":"${{ github.run_id }}","sha":"${{ github.sha }}","branch":"${{ github.ref_name }}","job":"page-tests","workflow":"${{ github.workflow }}"}' \
                  "${{ secrets.CLAUDE_WAKEUP_URL }}" ||:

    deploy:
        needs: [test, integration-test, page-tests]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; the upload
            # artifact's `path` was the directory's contents, so this
            # download lands those contents directly at `./stage/`.
            # `.dockerignore` whitelists exactly `stage/`, so Fly's
            # builder receives the staged JARs but none of the
            # surrounding test artefacts.
            - uses: actions/download-artifact@v4
              with:
                  name: stage
                  path: stage

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
