name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Pipeline shape:
#
#   test ─┬─►  deploy
# integration-test ─┘
#
# Both test legs run independently. Each does its own compile (sharing the
# `actions/cache` keyed on hashed sources so the second job in finds zinc
# state warm). The test job also produces the Play universal-stage dist
# for deploy, uploaded as the `stage` artifact.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 26
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # Produce the Play universal-stage distribution here so the
            # deploy job can ship it straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt test` —
            # only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 26
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

    deploy:
        needs: [test, integration-test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; the upload
            # artifact's `path` was the directory's contents, so this
            # download lands those contents directly at `./stage/`.
            # `.dockerignore` whitelists exactly `stage/`, so Fly's
            # builder receives the staged JARs but none of the
            # surrounding test artefacts.
            - uses: actions/download-artifact@v4
              with:
                  name: stage
                  path: stage

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
