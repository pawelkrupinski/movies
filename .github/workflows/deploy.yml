name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Unit tests + integration tests run on two parallel runners. Each picks
# up the same target/ cache, so the second one to start usually finds
# zinc state warm. The deploy job fans in — it only fires after both
# test legs pass.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Cache compiled classes + zinc incremental state so a no-source-
            # change push (e.g. .yml-only tweaks) skips the ~30s cold compile.
            # Same key as `integration-test` so both jobs share the cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # Produce the Play universal-stage distribution here so the deploy
            # job can ship it straight to Fly's builder without recompiling.
            # Scala 3's default `-java-output-version 8` makes these JARs
            # JDK-agnostic, so the Java-25 build runs unchanged on the
            # Dockerfile's Java-21 JRE. Reuses the warm zinc state from
            # `sbt test` — only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

    deploy:
        needs: [test, integration-test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; placing it there
            # (rather than its native `target/universal/stage` path) keeps
            # `.dockerignore` to a single whitelist line and avoids Docker's
            # deep-path re-inclusion quirks. `.dockerignore` whitelists
            # exactly `stage/`, so Fly's builder receives the staged JARs
            # but none of the surrounding test artefacts.
            - uses: actions/download-artifact@v4
              with:
                  name: stage
                  path: stage

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
