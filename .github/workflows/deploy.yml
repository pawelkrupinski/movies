name: Deploy to Fly.io

on:
    push:
        branches: [main]
    # Manual escape hatch: redeploy the worker even when its inputs are unchanged
    # (a base-image refresh, a forced restart) — the worker deploy is otherwise
    # skipped when nothing in its artifact changed (see the guard below).
    workflow_dispatch:
        inputs:
            force_worker_deploy:
                description: "Redeploy kinowo-worker even if its inputs are unchanged"
                type: boolean
                default: false

# Workflow-level concurrency: a newer push cancels the older workflow
# mid-flight, freeing its ~28 worker slots so the latest commit's jobs
# don't queue behind stale work. (GitHub Actions exposes ~20 concurrent
# Linux slots per account; two overlapping pushes would otherwise fight
# for them.) The deploy JOB has its own `concurrency: fly-deploy` group
# below — that's the flyctl race guard, a separate concern, and it
# stays as-is.
concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

# Pipeline shape:
#
#   ci (reusable workflow — lint, test, integration, ios/android
#       local-server, page-tests) ──►  deploy
#
# The whole build+test pipeline lives in ci.yml as a `workflow_call`
# reusable workflow so it has exactly one definition; branch-ci.yml
# runs the same thing on every PR. Here on push-to-main we run it and,
# once green, deploy. `secrets: inherit` hands the called workflow the
# ZYTE / TMDB / MONGODB secrets its test jobs need. The `test` job in
# ci.yml uploads the `stage-web` / `stage-worker` dists; because the
# called workflow's jobs run in THIS run, the deploy job below downloads
# them straight from it.
jobs:
    ci:
        uses: ./.github/workflows/ci.yml
        secrets: inherit

    # Two apps from one Dockerfile, deployed as PARALLEL matrix legs — web
    # (kinowo) and worker (kinowo-worker) ship on their own runners at the same
    # time. `fail-fast: false` so a worker-deploy failure doesn't cancel web's
    # (and vice versa). Each leg downloads ITS app's staged dist into the fixed
    # `./stage/` path the Dockerfile COPYs, then `flyctl deploy --build-arg
    # BIN=<app>` selects the launcher. The cutover (web stops scraping) happens
    # when this branch merges to main; a brief simultaneous switchover is fine
    # per the project's "short prod downtime is fine" convention.
    deploy:
        needs: ci
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - app: kinowo
                      toml: fly.toml
                      bin: web
                      artifact: stage-web
                    # UK frontend — same `web` binary + build artifact as kinowo,
                    # its own fly config (KINOWO_COUNTRY=uk → the kinowo_uk db).
                    - app: showtimes-uk
                      toml: fly.uk.toml
                      bin: web
                      artifact: stage-web
                    # DE frontend — KINOWO_COUNTRY=de → the kinowo_de db, in fra.
                    - app: showtimes-de
                      toml: fly.de.toml
                      bin: web
                      artifact: stage-web
                    - app: kinowo-worker
                      toml: fly.worker.toml
                      bin: worker
                      artifact: stage-worker
                    # UK worker — same `worker` binary + artifact, split off
                    # kinowo-worker so the full-UK scrape load gets its own 2x
                    # machine (KINOWO_COUNTRIES=uk → the kinowo_uk db).
                    - app: kinowo-worker-uk
                      toml: fly.worker.uk.toml
                      bin: worker
                      artifact: stage-worker
                    # DE worker — split off kinowo-worker (KINOWO_COUNTRIES=de →
                    # the kinowo_de db); the German roster gets its own 2x machine.
                    - app: kinowo-worker-de
                      toml: fly.worker.de.toml
                      bin: worker
                      artifact: stage-worker
        # Serialize deploys PER TIER (all web apps in one lane, all workers in
        # another) rather than per app. Per-app groups let every web app restart
        # at the same moment, so a shared dependency that is merely SLOW takes
        # the whole fleet down at once instead of one app: on 2026-07-18 all
        # three web apps rolled simultaneously into an overloaded Mongo, none
        # finished its boot probe inside Fly's health-check window, and every
        # machine crash-looped. One lane per tier means the first app's failure
        # is visible before the next one restarts, and at most one app is
        # mid-restart when a dependency goes bad. Web and workers still deploy
        # in parallel with each other — they don't share a failure mode.
        # cancel-in-progress is false — a queued deploy still runs once the
        # active one finishes, then the guard below decides whether to ship it.
        concurrency:
            group: fly-deploy-${{ matrix.bin }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - uses: superfly/flyctl-actions/setup-flyctl@master

            # Decide whether this app actually needs a deploy. Two skip reasons,
            # both fail-open (any probe error → deploy):
            #
            #  (1) Roll-back guard (both apps): the running machine carries
            #      COMMIT_SHA from the Dockerfile build-arg; if this workflow's
            #      commit is an ANCESTOR of the live one, a newer build already
            #      shipped and re-deploying would roll it back. (First-ever deploy:
            #      no machine → empty probe → proceed.)
            #
            #  (2) No-op guard (WORKER only): every worker restart pays a cold
            #      freshness re-hydrate + scrape boot storm that drains the
            #      shared-CPU credit, so a push that doesn't change the worker's
            #      deployable artifact must NOT restart it. We hash the worker
            #      inputs — the bin's sources (worker/, common/), its build
            #      (build.sbt, project/), the image recipe (Dockerfile) and its fly
            #      config (fly.worker.toml), via each one's git object id — and bake
            #      that hash into the image (WORKER_INPUT_HASH). If the live machine
            #      already runs this exact hash, skip. Force a restart anyway (a
            #      config/secret/base-image change with no code delta) with
            #      `[deploy-worker]` in the commit message or the workflow_dispatch
            #      force input.
            - name: Decide whether to deploy
              id: guard
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
                  HEAD_MSG: ${{ github.event.head_commit.message }}
                  FORCE_WORKER: ${{ github.event.inputs.force_worker_deploy }}
              run: |
                  deployed=$(flyctl ssh console -a ${{ matrix.app }} -C 'printenv COMMIT_SHA' 2>/dev/null || echo "")
                  if [ -n "$deployed" ] && [ "$deployed" != "${{ github.sha }}" ]; then
                      if git merge-base --is-ancestor "${{ github.sha }}" "$deployed" 2>/dev/null; then
                          echo "::warning::Skipping ${{ matrix.app }} — commit $deployed (descendant of ${{ github.sha }}) is already live"
                          echo "skip=true" >> "$GITHUB_OUTPUT"
                          exit 0
                      fi
                  fi
                  # No-op guard for EVERY worker leg (kinowo-worker and kinowo-worker-uk):
                  # hash the shared worker inputs + THIS app's own toml, and skip the
                  # cold-boot redeploy when the live machine already runs that hash. Keyed
                  # on `bin=worker` + `matrix.app`/`matrix.toml` so each worker app tracks
                  # its own config independently (a fly.worker.uk.toml edit redeploys only
                  # the UK worker; a shared worker/ or Dockerfile edit redeploys both).
                  if [ "${{ matrix.bin }}" = "worker" ]; then
                      hash=""
                      for p in worker common build.sbt project Dockerfile ${{ matrix.toml }}; do
                          hash="$hash$(git rev-parse "HEAD:$p")"
                      done
                      hash=$(printf '%s' "$hash" | sha256sum | cut -d' ' -f1)
                      echo "worker_hash=$hash" >> "$GITHUB_OUTPUT"
                      forced=false
                      case "${HEAD_MSG:-}" in *"[deploy-worker]"*) forced=true ;; esac
                      [ "${FORCE_WORKER:-}" = "true" ] && forced=true
                      live_hash=$(flyctl ssh console -a ${{ matrix.app }} -C 'printenv WORKER_INPUT_HASH' 2>/dev/null | tr -d '[:space:]' || echo "")
                      if [ "$forced" != "true" ] && [ -n "$live_hash" ] && [ "$live_hash" = "$hash" ]; then
                          echo "::warning::Skipping ${{ matrix.app }} — inputs unchanged (hash ${hash:0:8}… already live). Force with [deploy-worker] or the workflow_dispatch input."
                          echo "skip=true" >> "$GITHUB_OUTPUT"
                          exit 0
                      fi
                  fi

            - uses: actions/download-artifact@v7
              if: steps.guard.outputs.skip != 'true'
              with:
                  name: ${{ matrix.artifact }}
                  path: stage

            # WORKER_INPUT_HASH is set only for the worker leg (empty → Dockerfile
            # default `unknown` for web); it bakes the no-op guard's hash into the
            # image so the next push can read it back and skip a redundant restart.
            - run: flyctl deploy --remote-only -c ${{ matrix.toml }} -a ${{ matrix.app }} --build-arg BIN=${{ matrix.bin }} --build-arg COMMIT_SHA=${{ github.sha }} --build-arg WORKER_INPUT_HASH=${{ steps.guard.outputs.worker_hash }}
              if: steps.guard.outputs.skip != 'true'
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    # Drop a vertical marker on the self-hosted Grafana carrying this commit's
    # SHA + subject, so a metric regression on the dashboard lines up visually
    # with the release that caused it — the "I deploy X and a service degrades"
    # loop, made legible. Runs once after BOTH app legs finish. No-ops (doesn't
    # fail the deploy) until the Grafana secrets are set, so it's safe to land
    # before kinowo-grafana exists.
    annotate:
        needs: deploy
        if: ${{ !cancelled() && needs.deploy.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Mark deploy in Grafana
              env:
                  GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
                  GRAFANA_ANNOTATION_TOKEN: ${{ secrets.GRAFANA_ANNOTATION_TOKEN }}
                  SHA: ${{ github.sha }}
                  MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [ -z "${GRAFANA_URL:-}" ] || [ -z "${GRAFANA_ANNOTATION_TOKEN:-}" ]; then
                      echo "Grafana annotation secrets unset — skipping deploy marker."
                      exit 0
                  fi
                  short="${SHA:0:7}"
                  subject="$(printf '%s' "$MSG" | head -1)"
                  now="$(( $(date +%s) * 1000 ))"
                  body="$(jq -n --argjson time "$now" \
                      --arg text "deploy ${short} — ${subject} (${SHA})" \
                      '{time: $time, tags: ["deploy", "main"], text: $text}')"
                  curl -fsS -X POST "${GRAFANA_URL%/}/api/annotations" \
                      -H "Authorization: Bearer ${GRAFANA_ANNOTATION_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "$body"
                  echo "Posted deploy marker for ${short}."
