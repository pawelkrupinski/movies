name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Pipeline shape:
#
#   test ────────────┬─►  deploy
#   integration-test ┤
#   page-tests ──────┘
#
# All three test legs run independently. Each does its own compile
# (sharing the `actions/cache` keyed on hashed sources so the second
# and third jobs in find zinc state warm). The test job also produces
# the Play universal-stage dist for deploy, uploaded as the `stage`
# artifact.
#
# `page-tests` is the only job that needs a browser: PageJsBehaviourSpec
# drives a real headless Chrome over CDP to exercise the JS on the
# rendered pages. Kept out of `test` so the main unit job stays
# browser-free and the page checks get a discrete CI status row.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # On any failure above (compile, test, stage), poke the local
            # Claude wake-up listener so a fresh Claude Code tab opens on
            # my Mac with the failure context. See
            # `.github/actions/wake-on-failure/` for the action and
            # `scripts/ci-wakeup/server.py` for the listener.
            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    test

            # Produce the Play universal-stage distribution here so the
            # deploy job can ship it straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt test` —
            # only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    integration-test

    # Chrome version matrix. Each matrix instance is its own GH runner,
    # so all versions run in parallel and any one going red doesn't
    # mask the others (`fail-fast: false`).
    #
    # Version pick is grounded in real phone distribution as of early
    # 2026: Chrome 120+ is ~85% of Android devices, 113–120 covers
    # most of the long tail. 113 is the floor we can actually exercise
    # — chrome-for-testing (what `browser-actions/setup-chrome` resolves
    # numeric versions from) doesn't publish builds below 113, so older
    # Android versions aren't reachable from CI at all. `stable` keeps
    # tracking whatever Google ships next. Specific versions catch
    # regressions like the touchstart-vs-click timing change between
    # Chrome ~113 and 148 that bit the card-tap fix — see
    # [[feedback-ci-chrome-version-drift]].
    page-tests-chrome:
        name: page tests (chrome ${{ matrix.chrome }})
        strategy:
            fail-fast: false
            matrix:
                chrome: ['stable', '128', '120', '113']
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: browser-actions/setup-chrome@v1
              id: setup-chrome
              with:
                  chrome-version: ${{ matrix.chrome }}

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Point CdpDriver at the matrix-installed Chrome via env
            # var. The driver also prints the resolved browser version
            # to stderr at boot, so a matrix failure has the version
            # diff in its log without extra plumbing.
            - run: sbt PageTest/test
              env:
                  CDP_BROWSER_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    page-tests-chrome-${{ matrix.chrome }}

    # Microsoft Edge: Chromium-based, same CDP wire format. Sanity
    # check that Edge's slightly-different defaults (smart-screen,
    # tracking-prevention) don't break the page JS. Mobile Edge on
    # Android tracks the engine version closely with desktop Edge, so
    # one stable run is enough — broader version coverage on the
    # Chrome side already exercises older engine code paths.
    page-tests-edge:
        name: page tests (edge stable)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: browser-actions/setup-edge@v1
              id: setup-edge
              with:
                  edge-version: stable

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt PageTest/test
              env:
                  CDP_BROWSER_BIN: ${{ steps.setup-edge.outputs.edge-path }}

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    page-tests-edge

    # WebKit (Mobile Safari approximation) — Playwright's bundled
    # WebKit build is the closest CI proxy for iOS Safari without
    # paid device-cloud services. Not a perfect Mobile-Safari fake
    # (no iOS-specific sticky-hover, no exact touch quirks) but
    # catches generic WebKit-engine regressions in the same JS we
    # ship to real iPhone users.
    # Playwright cross-engine job. Drives Chromium / WebKit / Firefox
    # against a `FixtureServerMain`-backed instance of the Twirl
    # templates (InMemoryMovieRepo + FakeHttpFetch — same fixture
    # wiring the Scala spec uses, just exposed over HTTP for an
    # out-of-process runner). Fully deterministic, no network.
    #
    # Split: smoke + behaviour specs gate the deploy; the axe-core
    # a11y audit runs as an informational layer (continue-on-error)
    # because the site has known WCAG violations (`color-contrast`
    # on `.text-secondary` against the dark body bg) that aren't
    # worth blocking deploys over while they're being fixed. The
    # a11y step shows red in the UI; the workflow proceeds.
    page-tests-playwright:
        name: page tests (playwright cross-browser)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Same sbt cache key as the Chrome-matrix jobs so they
            # all warm the same zinc state.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: page-tests-playwright/package-lock.json

            # Cache the Playwright browser binaries (~250 MB across
            # Chromium + Firefox + WebKit). Keyed on the package-lock
            # so a Playwright version bump pulls fresh.
            - uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('page-tests-playwright/package-lock.json') }}

            - name: Install npm deps
              run: cd page-tests-playwright && npm ci

            - name: Install Playwright browsers
              run: cd page-tests-playwright && npx playwright install --with-deps

            # Start the fixture server in the background. Writes the
            # chosen free port to a file so we can read it from the
            # next step without parsing sbt's chatty stdout. The PID
            # is captured for the always-run kill step further below.
            - name: Start FixtureServerMain
              run: |
                  rm -f /tmp/kinowo-port.txt
                  sbt 'PageTest/runMain tools.FixtureServerMain /tmp/kinowo-port.txt' > /tmp/sbt-fixture.log 2>&1 &
                  echo "FIXTURE_PID=$!" >> $GITHUB_ENV
                  for _ in $(seq 1 60); do
                      [ -f /tmp/kinowo-port.txt ] && break
                      sleep 2
                  done
                  if [ ! -f /tmp/kinowo-port.txt ]; then
                      echo "FixtureServerMain didn't write port within 120s; sbt log:"
                      cat /tmp/sbt-fixture.log
                      exit 1
                  fi
                  echo "KINOWO_BASE_URL=http://127.0.0.1:$(cat /tmp/kinowo-port.txt)" >> $GITHUB_ENV

            - name: Run Playwright behaviour specs (blocking)
              run: cd page-tests-playwright && npx playwright test --grep-invert "axe-core"

            - name: Run Playwright axe-core a11y audit (informational)
              continue-on-error: true
              run: cd page-tests-playwright && npx playwright test --grep "axe-core"

            - name: Stop FixtureServerMain
              if: always()
              run: |
                  if [ -n "$FIXTURE_PID" ]; then
                      kill $FIXTURE_PID 2>/dev/null || true
                  fi

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    page-tests-playwright

    deploy:
        needs: [test, integration-test, page-tests-chrome, page-tests-edge, page-tests-playwright]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; the upload
            # artifact's `path` was the directory's contents, so this
            # download lands those contents directly at `./stage/`.
            # `.dockerignore` whitelists exactly `stage/`, so Fly's
            # builder receives the staged JARs but none of the
            # surrounding test artefacts.
            - uses: actions/download-artifact@v4
              with:
                  name: stage
                  path: stage

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
