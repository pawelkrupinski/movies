name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Workflow-level concurrency: a newer push cancels the older workflow
# mid-flight, freeing its ~28 worker slots so the latest commit's jobs
# don't queue behind stale work. (GitHub Actions exposes ~20 concurrent
# Linux slots per account; two overlapping pushes would otherwise fight
# for them.) The deploy JOB has its own `concurrency: fly-deploy` group
# below — that's the flyctl race guard, a separate concern, and it
# stays as-is.
concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

# Pipeline shape:
#
#   ci (reusable workflow — lint, test, integration, ios/android
#       local-server, page-tests) ──►  deploy
#
# The whole build+test pipeline lives in ci.yml as a `workflow_call`
# reusable workflow so it has exactly one definition; branch-ci.yml
# runs the same thing on every PR. Here on push-to-main we run it and,
# once green, deploy. `secrets: inherit` hands the called workflow the
# ZYTE / TMDB / MONGODB secrets its test jobs need. The `test` job in
# ci.yml uploads the `stage-web` / `stage-worker` dists; because the
# called workflow's jobs run in THIS run, the deploy job below downloads
# them straight from it.
jobs:
    ci:
        uses: ./.github/workflows/ci.yml
        secrets: inherit

    # Two apps from one Dockerfile, deployed as PARALLEL matrix legs — web
    # (kinowo) and worker (kinowo-worker) ship on their own runners at the same
    # time. `fail-fast: false` so a worker-deploy failure doesn't cancel web's
    # (and vice versa). Each leg downloads ITS app's staged dist into the fixed
    # `./stage/` path the Dockerfile COPYs, then `flyctl deploy --build-arg
    # BIN=<app>` selects the launcher. The cutover (web stops scraping) happens
    # when this branch merges to main; a brief simultaneous switchover is fine
    # per the project's "short prod downtime is fine" convention.
    deploy:
        needs: ci
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - app: kinowo
                      toml: fly.toml
                      bin: web
                      artifact: stage-web
                    - app: kinowo-worker
                      toml: fly.worker.toml
                      bin: worker
                      artifact: stage-worker
        # Serialize deploys PER APP (so two passing builds can't race flyctl on
        # the same app) while letting web + worker deploy in parallel.
        # cancel-in-progress is false — a queued deploy still runs once the
        # active one finishes, then the guard below decides whether to ship it.
        concurrency:
            group: fly-deploy-${{ matrix.app }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: superfly/flyctl-actions/setup-flyctl@master

            # Skip if a newer commit is already live on THIS app. The running
            # machine carries COMMIT_SHA from the Dockerfile build-arg; if this
            # workflow's commit is an ancestor of that SHA, a newer build
            # already deployed successfully and re-deploying would roll back.
            # (On the worker's first-ever deploy the app has no machine yet, so
            # the ssh probe returns empty and we proceed.)
            - name: Check deployed commit
              id: guard
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
              run: |
                  deployed=$(flyctl ssh console -a ${{ matrix.app }} -C 'printenv COMMIT_SHA' 2>/dev/null || echo "")
                  if [ -n "$deployed" ] && [ "$deployed" != "${{ github.sha }}" ]; then
                      if git merge-base --is-ancestor "${{ github.sha }}" "$deployed" 2>/dev/null; then
                          echo "::warning::Skipping ${{ matrix.app }} — commit $deployed (descendant of ${{ github.sha }}) is already live"
                          echo "skip=true" >> "$GITHUB_OUTPUT"
                      fi
                  fi

            - uses: actions/download-artifact@v4
              if: steps.guard.outputs.skip != 'true'
              with:
                  name: ${{ matrix.artifact }}
                  path: stage

            - run: flyctl deploy --remote-only -c ${{ matrix.toml }} -a ${{ matrix.app }} --build-arg BIN=${{ matrix.bin }} --build-arg COMMIT_SHA=${{ github.sha }}
              if: steps.guard.outputs.skip != 'true'
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
