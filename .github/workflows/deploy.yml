name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Pipeline shape:
#
#   test ────────────┬─►  deploy
#   integration-test ┤
#   page-tests ──────┘
#
# All three test legs run independently. Each does its own compile
# (sharing the `actions/cache` keyed on hashed sources so the second
# and third jobs in find zinc state warm). The test job also produces
# the Play universal-stage dist for deploy, uploaded as the `stage`
# artifact.
#
# `page-tests` is the only job that needs a browser: PageJsBehaviourSpec
# drives a real headless Chrome over CDP to exercise the JS on the
# rendered pages. Kept out of `test` so the main unit job stays
# browser-free and the page checks get a discrete CI status row.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # On any failure above (compile, test, stage), poke the local
            # Claude wake-up listener so a fresh Claude Code tab opens on
            # my Mac with the failure context. See
            # `.github/actions/wake-on-failure/` for the action and
            # `scripts/ci-wakeup/server.py` for the listener.
            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    test

            # Produce the Play universal-stage distribution here so the
            # deploy job can ship it straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt test` —
            # only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    integration-test

    # All cross-browser page tests in one matrix. Each row is its own
    # GH runner so they all parallelise, and `fail-fast: false` keeps
    # one red row from masking the others.
    #
    # Three families:
    #
    # - `chrome` / `edge` rows run the Scala PageTest spec against an
    #   installed browser via CDP. Chrome version pick reflects real
    #   Android phone distribution as of early 2026 (120+ ≈ 85% of
    #   devices, 113–120 the long tail); 113 is the floor that
    #   chrome-for-testing publishes. `stable` tracks whatever Google
    #   ships next. Specific versions catch regressions like the
    #   touchstart-vs-click timing change that bit the card-tap fix
    #   — see [[feedback-ci-chrome-version-drift]]. Edge runs one
    #   stable row; mobile Edge tracks desktop Edge closely.
    #
    # - `playwright` rows drive `page-tests-playwright/` against a
    #   `FixtureServerMain`-backed instance of the Twirl templates
    #   (InMemoryMovieRepo + FakeHttpFetch — same fixture wiring the
    #   Scala spec uses, exposed over HTTP). One row per Playwright
    #   project (see `playwright.config.ts`). Splitting per-project
    #   was a wall-clock win: the unified single-job version ran
    #   224 tests with `workers: 1` and took ~5m; per-project rows
    #   parallelise across runners and each finishes in ~2m.
    #
    #   Each `playwright` row needs only its one engine binary —
    #   `matrix.browser` is `chromium` / `firefox` / `webkit` /
    #   `msedge`, fed straight to `playwright install`.
    #
    #   axe-core gates itself to `chromium-desktop` (see
    #   `tests/a11y.spec.ts` — `test.beforeEach` skips on every
    #   other project), so only that row pays the audit cost.
    #   It's `continue-on-error` because the site has known WCAG
    #   violations (`color-contrast` on `.text-secondary` against
    #   the dark body bg) that aren't worth blocking deploys over.
    page-tests:
        name: page tests (${{ matrix.label }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { label: chrome stable, kind: chrome, version: stable }
                    - { label: chrome 128,    kind: chrome, version: '128' }
                    - { label: chrome 120,    kind: chrome, version: '120' }
                    - { label: chrome 113,    kind: chrome, version: '113' }
                    - { label: edge stable,   kind: edge,   version: stable }
                    - { label: playwright chromium,         kind: playwright, project: chromium,         browser: chromium }
                    - { label: playwright webkit,           kind: playwright, project: webkit,           browser: webkit }
                    - { label: playwright firefox,          kind: playwright, project: firefox,          browser: firefox }
                    - { label: playwright chromium-desktop, kind: playwright, project: chromium-desktop, browser: chromium }
                    - { label: playwright webkit-desktop,   kind: playwright, project: webkit-desktop,   browser: webkit }
                    - { label: playwright firefox-desktop,  kind: playwright, project: firefox-desktop,  browser: firefox }
                    - { label: playwright msedge-desktop,   kind: playwright, project: msedge-desktop,   browser: msedge }
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: browser-actions/setup-chrome@v1
              if: matrix.kind == 'chrome'
              id: setup-chrome
              with:
                  chrome-version: ${{ matrix.version }}

            - uses: browser-actions/setup-edge@v1
              if: matrix.kind == 'edge'
              id: setup-edge
              with:
                  edge-version: ${{ matrix.version }}

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - uses: actions/setup-node@v4
              if: matrix.kind == 'playwright'
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: page-tests-playwright/package-lock.json

            # Cache the Playwright browser binary for this row. Keyed
            # on the package-lock + the row's browser so a Playwright
            # bump pulls fresh and rows don't share each other's tarball.
            - uses: actions/cache@v4
              if: matrix.kind == 'playwright'
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('page-tests-playwright/package-lock.json') }}

            - name: Install npm deps
              if: matrix.kind == 'playwright'
              run: cd page-tests-playwright && npm ci

            - name: Install Playwright browser
              if: matrix.kind == 'playwright'
              run: cd page-tests-playwright && npx playwright install --with-deps ${{ matrix.browser }}

            # Start the fixture server in the background. Writes the
            # chosen free port to a file so we can read it from the
            # next step without parsing sbt's chatty stdout. The PID
            # is captured for the always-run kill step further below.
            - name: Start FixtureServerMain
              if: matrix.kind == 'playwright'
              run: |
                  rm -f /tmp/kinowo-port.txt
                  sbt 'PageTest/runMain tools.FixtureServerMain /tmp/kinowo-port.txt' > /tmp/sbt-fixture.log 2>&1 &
                  echo "FIXTURE_PID=$!" >> $GITHUB_ENV
                  for _ in $(seq 1 60); do
                      [ -f /tmp/kinowo-port.txt ] && break
                      sleep 2
                  done
                  if [ ! -f /tmp/kinowo-port.txt ]; then
                      echo "FixtureServerMain didn't write port within 120s; sbt log:"
                      cat /tmp/sbt-fixture.log
                      exit 1
                  fi
                  echo "KINOWO_BASE_URL=http://127.0.0.1:$(cat /tmp/kinowo-port.txt)" >> $GITHUB_ENV

            # Point CdpDriver at the matrix-installed browser via env
            # var. The driver also prints the resolved browser version
            # to stderr at boot, so a matrix failure has the version
            # diff in its log without extra plumbing.
            - name: Run Scala PageTest
              if: matrix.kind == 'chrome' || matrix.kind == 'edge'
              run: sbt PageTest/test
              env:
                  CDP_BROWSER_BIN: ${{ matrix.kind == 'chrome' && steps.setup-chrome.outputs.chrome-path || steps.setup-edge.outputs.edge-path }}

            - name: Run Playwright behaviour specs (blocking)
              if: matrix.kind == 'playwright'
              run: cd page-tests-playwright && npx playwright test --project ${{ matrix.project }} --grep-invert "axe-core"

            - name: Run Playwright axe-core a11y audit (informational)
              if: matrix.kind == 'playwright' && matrix.project == 'chromium-desktop'
              continue-on-error: true
              run: cd page-tests-playwright && npx playwright test --project ${{ matrix.project }} --grep "axe-core"

            - name: Stop FixtureServerMain
              if: always() && matrix.kind == 'playwright'
              run: |
                  if [ -n "$FIXTURE_PID" ]; then
                      kill $FIXTURE_PID 2>/dev/null || true
                  fi

            - if: failure()
              uses: ./.github/actions/wake-on-failure
              with:
                  url:    ${{ secrets.CLAUDE_WAKEUP_URL }}
                  secret: ${{ secrets.CLAUDE_WAKEUP_SECRET }}
                  job:    page-tests (${{ matrix.label }})

    deploy:
        needs: [test, integration-test, page-tests]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; the upload
            # artifact's `path` was the directory's contents, so this
            # download lands those contents directly at `./stage/`.
            # `.dockerignore` whitelists exactly `stage/`, so Fly's
            # builder receives the staged JARs but none of the
            # surrounding test artefacts.
            - uses: actions/download-artifact@v4
              with:
                  name: stage
                  path: stage

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
