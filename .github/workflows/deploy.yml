name: Deploy to Fly.io

on:
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Cache compiled classes + zinc incremental state so a no-source-
            # change push (e.g. .yml-only tweaks) skips the ~30s cold compile.
            # Key is the hash of every input that can affect the build output;
            # any of them changing produces a fresh cache miss + fresh compile.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: superfly/flyctl-actions/setup-flyctl@master

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}