name: Deploy to Fly.io

on:
    push:
        branches: [main]

# Pipeline shape:
#
#   lint ────────────┬─►  deploy ──► lighthouse
#   test ────────────┤
#   integration-test ┤
#   ios-local-server ┤
#   page-tests ──────┘
#   coverage  (independent — does NOT gate deploy)
#
# All four gating legs run independently. The sbt-driven ones share
# the `actions/cache` keyed on hashed sources so the second and third
# jobs find zinc state warm. The test job also produces the Play
# universal-stage dist for deploy, uploaded as the `stage` artifact.
#
# `page-tests` is the only job that needs a browser: PageJsBehaviourSpec
# drives a real headless Chrome over CDP to exercise the JS on the
# rendered pages. Kept out of `test` so the main unit job stays
# browser-free and the page checks get a discrete CI status row.
#
# `coverage` re-runs the unit suite under sbt-scoverage's instrumented
# bytecode and uploads an HTML report. It's slow (instrumentation) and
# decoupled from `deploy` because coverage fluctuation isn't a deploy
# blocker — `continue-on-error: true` + no `deploy` dependency.
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Warm zinc state across pushes so an unchanged push is near-
            # instant. Same key as `integration-test` so both jobs share the
            # cache.
            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            # Produce the Play universal-stage distribution here so the
            # deploy job can ship it straight to Fly's builder without
            # recompiling. Reuses the warm zinc state from `sbt test` —
            # only linking + writing the dist costs anything.
            - run: sbt stage

            - uses: actions/upload-artifact@v4
              with:
                  name: stage
                  path: target/universal/stage
                  retention-days: 1
                  if-no-files-found: error

    # ESLint over the production JS in `public/js/`. Quick — a Node
    # install + one npm run is on the order of 15s; way under the
    # cost of the sbt jobs and a much faster signal for the typos
    # the bundlerless deploy can ship straight to the browser.
    # Cross-file globals (constants from `_sharedJsConfig`, functions
    # called from inline `<script>` blocks) are listed in
    # `eslint.config.js` so `no-undef` stays meaningful.
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint

    # iOS LocalServer tests. Boots `FixtureServerMain` (the same Play
    # server FixtureServerMain + InMemoryMovieRepo combo the
    # Playwright suite uses) in the background and runs the
    # `LocalServer*` XCTest cases against it — `KinowoCore`'s real
    # parsers (HTMLParser, FilmDetailParser) crawl HTML the Twirl
    # templates just rendered.
    #
    # This is the cross-cutting gate: a server-side template change
    # that would break the iOS parser fails CI here, on the PR that
    # introduces it. Previously the catch was nightly smoke tests
    # against kinowo.fly.dev, i.e. only POST-deploy.
    #
    # `continue-on-error: false` (default) — deploy depends on this.
    ios-local-server:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - uses: swift-actions/setup-swift@v2
              with:
                  swift-version: '5.10'

            - uses: actions/cache@v4
              with:
                  path: ios/.build
                  key: spm-build-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/Package.resolved') }}
                  restore-keys: |
                      spm-build-${{ runner.os }}-

            # Boot the server in the background. It binds to a
            # kernel-assigned free port and writes that port to the
            # file we pass; we busy-wait for the file (60s ceiling)
            # then export the resulting URL for the swift test step.
            - name: Boot FixtureServerMain
              run: |
                  set -euo pipefail
                  PORT_FILE=$(mktemp)
                  echo "PORT_FILE=$PORT_FILE" >> "$GITHUB_ENV"

                  nohup sbt "PageTest/runMain tools.FixtureServerMain $PORT_FILE" > fixture-server.log 2>&1 &
                  echo "SERVER_PID=$!" >> "$GITHUB_ENV"

                  for _ in $(seq 1 60); do
                      if [ -s "$PORT_FILE" ]; then break; fi
                      sleep 2
                  done
                  if [ ! -s "$PORT_FILE" ]; then
                      echo "::error::FixtureServerMain never wrote a port file"
                      tail -100 fixture-server.log
                      exit 1
                  fi
                  PORT=$(cat "$PORT_FILE")
                  echo "KINOWO_LOCAL_URL=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
                  echo "fixture server listening on http://127.0.0.1:$PORT"

            - name: Run LocalServer iOS tests
              run: swift test --package-path ios --filter LocalServer

            - name: Stop FixtureServerMain
              if: always()
              run: |
                  if [ -n "${SERVER_PID:-}" ]; then
                      kill "$SERVER_PID" 2>/dev/null || true
                  fi

            - name: Upload fixture-server log on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: fixture-server-log
                  path: fixture-server.log
                  if-no-files-found: ignore


    integration-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt IntegrationTest/test
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}


    # Test-coverage job. Runs the unit suite under sbt-scoverage's
    # instrumented bytecode and uploads the HTML report as an artifact
    # so a regression in covered statements is one click away from the
    # workflow run. Doesn't gate deploy — coverage fluctuates with
    # refactors and instrumentation is too slow to belong on the hot
    # path. The build.sbt thresholds are off (`coverageFailOnMinimum :=
    # false`) until the actual baseline settles.
    coverage:
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            - uses: actions/cache@v4
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'it/**/*.scala', 'page/**/*.scala', 'conf/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            - run: sbt clean coverage test coverageReport
              env:
                  ZYTE_API_KEY:    ${{ secrets.ZYTE_API_KEY }}
                  SCRAPINGANT_KEY: ${{ secrets.SCRAPINGANT_KEY }}
                  TMDB_API_KEY:    ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:     ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:      ${{ secrets.MONGODB_DB }}

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: scoverage-report
                  path: target/scala-*/scoverage-report/
                  if-no-files-found: ignore

    # Cross-browser page tests, split into one matrix job per engine
    # family so the CI checks list groups red rows by browser. Every
    # row delegates to the shared `run-page-test` composite action —
    # see `.github/actions/run-page-test/action.yml` for the step
    # body that's identical across all four jobs.
    #
    # `kind` (chrome | edge | playwright) drives which steps execute:
    #
    # - `chrome` / `edge`: install the matching browser, then
    #   `sbt PageTest/test` with `CDP_BROWSER_BIN` pointing at it.
    #
    # - `playwright`: install Node + the one engine binary specified
    #   by `browser`, boot `FixtureServerMain` over a free port, then
    #   `npx playwright test --project <project>`. The Playwright
    #   suite drives `page-tests-playwright/` against a Twirl-rendered
    #   fixture server (InMemoryMovieRepo + FakeHttpFetch — same
    #   wiring the Scala spec uses, exposed over HTTP). Mobile
    #   projects are split per-phone so each runner handles one
    #   phone's four variants (portrait, zoomed, landscape,
    #   zoomed-landscape) — ~4 projects × 20 specs ≈ under 2 min.
    #
    # Chrome version pick reflects real Android phone distribution as
    # of early 2026 (120+ ≈ 85% of devices, 113–120 the long tail);
    # 113 is the floor that chrome-for-testing publishes. `stable`
    # tracks whatever Google ships next. Specific versions catch
    # regressions like the touchstart-vs-click timing change that
    # bit the card-tap fix — see [[feedback-ci-chrome-version-drift]].
    #
    # axe-core gates itself to `chromium-desktop` (see
    # `tests/a11y.spec.ts` — `test.beforeEach` skips on every other
    # project), so only that row pays the audit cost. It's
    # `continue-on-error` because the site has known WCAG violations
    # (`color-contrast` on `.text-secondary` against the dark body
    # bg) that aren't worth blocking deploys over.

    page-tests-chrome:
        name: page tests (chrome / ${{ matrix.variant }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { variant: stable,         kind: chrome,     version: stable }
                    - { variant: pw galaxy-s10,  kind: playwright, project: 'chromium-galaxy-s10*',  browser: chromium, shard: '1/2' }
                    - { variant: pw galaxy-s10,  kind: playwright, project: 'chromium-galaxy-s10*',  browser: chromium, shard: '2/2' }
                    - { variant: pw galaxy-s25,  kind: playwright, project: 'chromium-galaxy-s25*',  browser: chromium, shard: '1/2' }
                    - { variant: pw galaxy-s25,  kind: playwright, project: 'chromium-galaxy-s25*',  browser: chromium, shard: '2/2' }
                    - { variant: pw pixel-9,     kind: playwright, project: 'chromium-pixel-9,chromium-pixel-9-zoomed,chromium-pixel-9-landscape,chromium-pixel-9-zoomed-landscape', browser: chromium, shard: '1/2' }
                    - { variant: pw pixel-9,     kind: playwright, project: 'chromium-pixel-9,chromium-pixel-9-zoomed,chromium-pixel-9-landscape,chromium-pixel-9-zoomed-landscape', browser: chromium, shard: '2/2' }
                    - { variant: pw pixel-9-pro, kind: playwright, project: 'chromium-pixel-9-pro*', browser: chromium, shard: '1/2' }
                    - { variant: pw pixel-9-pro, kind: playwright, project: 'chromium-pixel-9-pro*', browser: chromium, shard: '2/2' }
                    - { variant: pw desktop,     kind: playwright, project: chrome-desktop,          browser: chrome }
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/run-page-test
              with:
                  kind:          ${{ matrix.kind }}
                  version:       ${{ matrix.version }}
                  project:       ${{ matrix.project }}
                  browser:       ${{ matrix.browser }}
                  shard:         ${{ matrix.shard }}

    page-tests-safari:
        name: page tests (safari / ${{ matrix.variant }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { variant: pw iphone-se,         kind: playwright, project: 'webkit-iphone-se*',         browser: webkit, shard: '1/2' }
                    - { variant: pw iphone-se,         kind: playwright, project: 'webkit-iphone-se*',         browser: webkit, shard: '2/2' }
                    - { variant: pw iphone-13,         kind: playwright, project: 'webkit-iphone-13*',         browser: webkit, shard: '1/2' }
                    - { variant: pw iphone-13,         kind: playwright, project: 'webkit-iphone-13*',         browser: webkit, shard: '2/2' }
                    - { variant: pw iphone-17-pro-max, kind: playwright, project: 'webkit-iphone-17-pro-max*', browser: webkit, shard: '1/2' }
                    - { variant: pw iphone-17-pro-max, kind: playwright, project: 'webkit-iphone-17-pro-max*', browser: webkit, shard: '2/2' }
                    - { variant: pw desktop,           kind: playwright, project: webkit-desktop,              browser: webkit }
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/run-page-test
              with:
                  kind:          ${{ matrix.kind }}
                  project:       ${{ matrix.project }}
                  browser:       ${{ matrix.browser }}
                  shard:         ${{ matrix.shard }}

    page-tests-edge:
        name: page tests (edge / ${{ matrix.variant }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { variant: stable,             kind: edge,       version: stable }
                    - { variant: pw desktop,         kind: playwright, project: msedge-desktop, browser: msedge }
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/run-page-test
              with:
                  kind:          ${{ matrix.kind }}
                  version:       ${{ matrix.version }}
                  project:       ${{ matrix.project }}
                  browser:       ${{ matrix.browser }}

    page-tests-firefox:
        name: page tests (firefox / ${{ matrix.variant }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { variant: pw galaxy-s10,       kind: playwright, project: 'firefox-galaxy-s10*',       browser: firefox, shard: '1/2' }
                    - { variant: pw galaxy-s10,       kind: playwright, project: 'firefox-galaxy-s10*',       browser: firefox, shard: '2/2' }
                    - { variant: pw galaxy-s25-ultra, kind: playwright, project: 'firefox-galaxy-s25-ultra*', browser: firefox, shard: '1/2' }
                    - { variant: pw galaxy-s25-ultra, kind: playwright, project: 'firefox-galaxy-s25-ultra*', browser: firefox, shard: '2/2' }
                    - { variant: pw pixel-9-pro,      kind: playwright, project: 'firefox-pixel-9-pro*',      browser: firefox, shard: '1/2' }
                    - { variant: pw pixel-9-pro,      kind: playwright, project: 'firefox-pixel-9-pro*',      browser: firefox, shard: '2/2' }
                    - { variant: pw desktop,          kind: playwright, project: firefox-desktop,             browser: firefox }
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/run-page-test
              with:
                  kind:          ${{ matrix.kind }}
                  project:       ${{ matrix.project }}
                  browser:       ${{ matrix.browser }}
                  shard:         ${{ matrix.shard }}

    deploy:
        needs: [lint, test, integration-test, ios-local-server, page-tests-chrome, page-tests-safari, page-tests-edge, page-tests-firefox]
        runs-on: ubuntu-latest
        # Serialize deploys so two passing builds can't race flyctl.
        # cancel-in-progress is false — a queued deploy still runs once
        # the active one finishes, then the guard below decides whether
        # to actually ship it.
        concurrency:
            group: fly-deploy
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: superfly/flyctl-actions/setup-flyctl@master

            # Skip if a newer commit is already live on Fly. The running
            # machine carries COMMIT_SHA from the Dockerfile build-arg;
            # if this workflow's commit is an ancestor of that SHA, a
            # newer build already deployed successfully and re-deploying
            # this one would roll back.
            - name: Check deployed commit
              id: guard
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
              run: |
                  deployed=$(flyctl ssh console -a kinowo -C 'printenv COMMIT_SHA' 2>/dev/null || echo "")
                  if [ -n "$deployed" ] && [ "$deployed" != "${{ github.sha }}" ]; then
                      if git merge-base --is-ancestor "${{ github.sha }}" "$deployed" 2>/dev/null; then
                          echo "::warning::Skipping deploy — commit $deployed (descendant of ${{ github.sha }}) is already live"
                          echo "skip=true" >> "$GITHUB_OUTPUT"
                      fi
                  fi

            # Pull the staged distribution built by the `test` job. The
            # Dockerfile expects it at top-level `stage/`; the upload
            # artifact's `path` was the directory's contents, so this
            # download lands those contents directly at `./stage/`.
            # `.dockerignore` whitelists exactly `stage/`, so Fly's
            # builder receives the staged JARs but none of the
            # surrounding test artefacts.
            - uses: actions/download-artifact@v4
              if: steps.guard.outputs.skip != 'true'
              with:
                  name: stage
                  path: stage

            - run: flyctl deploy --remote-only -a kinowo --build-arg COMMIT_SHA=${{ github.sha }}
              if: steps.guard.outputs.skip != 'true'
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    # Lighthouse audit against the freshly deployed site. Runs after
    # deploy so the scores reflect the code that just shipped. Does NOT
    # gate anything — `continue-on-error: true` and nothing lists it in
    # `needs:`. Desktop + mobile form factors run because the audit
    # verdict differs: mobile applies CPU/network throttling (4× slowdown,
    # slow 4G). Thresholds live in `.lighthouserc.json` (desktop) and
    # `.lighthouserc.mobile.json` (mobile).
    lighthouse:
        needs: [deploy]
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4

            - name: Lighthouse CI (desktop)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.json
                  uploadArtifacts: true
                  artifactName: lighthouse-results-desktop
                  temporaryPublicStorage: true

            - name: Lighthouse CI (mobile)
              uses: treosh/lighthouse-ci-action@v12
              with:
                  configPath: ./.lighthouserc.mobile.json
                  uploadArtifacts: true
                  artifactName: lighthouse-results-mobile
                  temporaryPublicStorage: true

