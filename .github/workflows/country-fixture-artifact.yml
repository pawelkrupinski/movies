name: Daily country fixture artifact

# Records the WHOLE country's fixture corpus once a day and uploads it as a
# downloadable build artifact. This job lands nothing in git —
# it just captures the live scrape + enrichment of every cinema/city and parks
# the result as the artifact `country-fixture`, kept for one day so only the
# latest run's capture is ever available.
#
# ── Scheduling: once a day, after midnight Warsaw, year-round ────────────────
#
# All that matters is the run lands after midnight Warsaw so it captures the new
# day. GitHub cron is UTC-only and DST-unaware, and Warsaw is UTC+1 in winter
# (CET) / UTC+2 in summer (CEST), so a single fixed UTC time maps to two
# different local times across the year. 23:01 UTC is the latest-firing instant
# that is still 00:0x Warsaw in winter:
#
#   • winter (CET, UTC+1): 00:01 Warsaw
#   • summer (CEST, UTC+2): 01:01 Warsaw
#
# Both are after midnight, so one plain cron covers the whole year — no DST gate,
# no second cron. (An earlier version registered two crons + a wall-clock-hour
# gate to hit 00:01 exactly; GitHub's 30–70 min scheduling delay pushed every run
# past the gated hour and it recorded nothing. Dropping the exact-minute goal
# removes the gate entirely — a delayed run is still after midnight.)

on:
    schedule:
        - cron: '1 23 * * *'   # 00:01 Warsaw (CET) / 01:01 Warsaw (CEST)
    workflow_dispatch:

jobs:
    record-country-fixture:
        runs-on: ubuntu-latest
        # A full live re-record of every cinema + the whole enrichment cascade is
        # heavy and a cold cache compiles every module first; give it plenty of
        # headroom over the default.
        timeout-minutes: 90
        steps:
            - uses: actions/checkout@v5

            # Same Scala toolchain as every other sbt job in this repo
            # (ci.yml / filmweb-diff.yml): Temurin JDK 25
            # with sbt dependency caching.
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: sbt

            - uses: sbt/setup-sbt@v1

            # Share the same zinc/target cache shape as ci.yml so a cold compile
            # is the exception, not the rule.
            - uses: actions/cache@v5
              with:
                  path: |
                      target
                      project/target
                      project/project/target
                  key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '**/src/main/**/*.scala', '**/src/test/**/*.scala', '**/src/page/**/*.scala', 'web/src/main/resources/**') }}
                  restore-keys: |
                      sbt-target-${{ runner.os }}-

            # Record + verify + zip the corpus via the shared script, so a local
            # `.github/scripts/record-country-fixture.sh` run does exactly what CI
            # does. The script runs `RecordAllDataToFixture` (a worker TEST-scope
            # runMain — the real cinema scrape + full TMDB → IMDb → Metacritic →
            # RT → Filmweb cascade against live upstreams, one fixture file per
            # unique URL under test/resources/fixtures/today/), refuses an empty
            # capture, and — given a zip path — wraps the tree in one colon-free
            # zip for upload.
            #
            # Secrets are the two keyed upstreams the recorder hits — TMDB
            # (enrichment) and Zyte (the Multikino/biletyna scrapes that route
            # through it). IMDb/Filmweb/RT/Metacritic are keyless. MONGODB_* are
            # passed for parity with ci.yml even though the recorder uses an
            # in-memory repo and writes no Mongo.
            - name: Record the country's fixture corpus
              id: record
              env:
                  ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
                  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
                  MONGODB_URI:  ${{ secrets.MONGODB_URI }}
                  MONGODB_DB:   ${{ secrets.MONGODB_DB }}
              run: |
                  set -euo pipefail
                  ZIP="${GITHUB_WORKSPACE}/country-fixture.zip"
                  bash .github/scripts/record-country-fixture.sh "$ZIP"
                  echo "zip_path=$ZIP" >> "$GITHUB_OUTPUT"

            # Upload the single zip under a FIXED artifact name so the "latest" is
            # always fetchable by the same name, with a one-day retention so
            # yesterday's run has expired by the time this one finishes — i.e.
            # only the last run's capture is ever kept. The downloaded artifact is
            # itself a zip wrapping `country-fixture.zip` (the actual corpus).
            - name: Upload country fixture artifact
              uses: actions/upload-artifact@v6
              with:
                  name: country-fixture
                  path: ${{ steps.record.outputs.zip_path }}
                  retention-days: 1
                  overwrite: true
                  if-no-files-found: error
