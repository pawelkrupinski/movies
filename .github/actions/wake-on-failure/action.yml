name: Wake local Claude on failure
description: |
  Curls the local-Claude wake-up webhook (ngrok-fronted listener on my Mac,
  see scripts/ci-wakeup/) with the current run's failure context so a
  Terminal tab pops with `claude <prompt>` already running.

  Add to any job's last step with `if: failure()`; the bearer secret /
  URL come from repo secrets `CLAUDE_WAKEUP_SECRET` / `CLAUDE_WAKEUP_URL`.

inputs:
  url:
    description: Webhook URL, normally secrets.CLAUDE_WAKEUP_URL.
    required: true
  secret:
    description: Bearer token, normally secrets.CLAUDE_WAKEUP_SECRET.
    required: true
  job:
    description: Job name (free-form), used as failure context in the prompt.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CLAUDE_WAKEUP_URL: ${{ inputs.url }}
        CLAUDE_WAKEUP_SECRET: ${{ inputs.secret }}
        WAKEUP_JOB: ${{ inputs.job }}
        WAKEUP_RUN_ID: ${{ github.run_id }}
        WAKEUP_SHA: ${{ github.sha }}
        WAKEUP_BRANCH: ${{ github.ref_name }}
        WAKEUP_WORKFLOW: ${{ github.workflow }}
      run: |
        # Linux Docker job containers (e.g. swift:5.10) may not ship
        # curl. Try the common package managers in turn; silent-skip if
        # none work — a tunnel-poke that can't fire should not cascade
        # a second failure on top of the one we're trying to report.
        if ! command -v curl >/dev/null 2>&1; then
          (apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates) >/dev/null 2>&1 \
            || apk add --no-cache curl ca-certificates >/dev/null 2>&1 \
            || { echo "wake-on-failure: curl unavailable, skipping"; exit 0; }
        fi
        curl -sS --max-time 10 -X POST \
          -H "Authorization: Bearer ${CLAUDE_WAKEUP_SECRET}" \
          -H "Content-Type: application/json" \
          -d "{\"run_id\":\"${WAKEUP_RUN_ID}\",\"sha\":\"${WAKEUP_SHA}\",\"branch\":\"${WAKEUP_BRANCH}\",\"job\":\"${WAKEUP_JOB}\",\"workflow\":\"${WAKEUP_WORKFLOW}\"}" \
          "${CLAUDE_WAKEUP_URL}" || :
