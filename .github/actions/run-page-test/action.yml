name: Run page-test row
description: |
  Shared step body for the `page-tests-*` matrix jobs.

  Two execution kinds:

  - `chrome`: install Chrome via `browser-actions/setup-chrome`,
    then `sbt PageTest/test` with `CDP_BROWSER_BIN` pointing at it.

  - `playwright`: install Node + the one engine binary specified
    by `browser`, boot `FixtureServerMain` over a kernel-assigned
    port, then `npx playwright test --project <project>`. axe-core
    runs only on `project: chrome-desktop` (informational).

inputs:
  kind:
    description: chrome | playwright
    required: true
  version:
    description: Browser version when kind=chrome (e.g. `stable`).
    required: false
  project:
    description: Playwright project name when kind=playwright.
    required: false
  browser:
    description: Engine binary to install when kind=playwright (chromium|chrome|firefox|webkit).
    required: false
  shard:
    description: Playwright shard when kind=playwright (e.g. `1/2`).
    required: false
  prebaked_browser:
    description: |
      Set "true" when the job runs inside the official Playwright container
      (browsers + OS deps already baked in). Skips the ~90s
      `npx playwright install --with-deps` apt step and the browser cache.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 25
        cache: sbt

    # The Playwright container (prebaked_browser=true) is minimal and omits
    # `unzip`, which sbt/setup-sbt needs to extract the sbt launcher. Installing
    # just unzip is a ~5s apt — still far below the ~90s `--with-deps` webkit
    # apt the container lets us skip. No-op on the bare runner (has unzip).
    - name: Ensure unzip (Playwright container omits it)
      if: inputs.prebaked_browser == 'true'
      shell: bash
      run: apt-get update && apt-get install -y --no-install-recommends unzip

    - uses: sbt/setup-sbt@v1

    - uses: browser-actions/setup-chrome@v1
      if: inputs.kind == 'chrome'
      id: setup-chrome
      with:
        chrome-version: ${{ inputs.version }}



    - uses: actions/cache@v4
      with:
        path: |
          target
          project/target
          project/project/target
        # PageTest/test + FixtureServerMain → page scope (app + test +
        # page). restore-keys falls back to any recent sbt-target cache.
        key: sbt-target-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'app/**/*.scala', 'test/**/*.scala', 'page/**/*.scala', 'conf/**') }}
        restore-keys: |
          sbt-target-${{ runner.os }}-

    - uses: actions/setup-node@v4
      if: inputs.kind == 'playwright'
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: page-tests-playwright/package-lock.json

    # Cache the Playwright browser binary for this row. Keyed on
    # package-lock + the row's browser so a Playwright bump pulls
    # fresh and rows don't share each other's tarball.
    - uses: actions/cache@v4
      if: inputs.kind == 'playwright' && inputs.prebaked_browser != 'true'
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ inputs.browser }}-${{ hashFiles('page-tests-playwright/package-lock.json') }}
        # Fall back to any prior cache for this engine so a package-lock bump
        # restores the old binary instead of a cold re-download.
        restore-keys: |
          playwright-${{ runner.os }}-${{ inputs.browser }}-

    - name: Install npm deps
      if: inputs.kind == 'playwright'
      shell: bash
      run: cd page-tests-playwright && npm ci

    # Skipped inside the Playwright container (browsers + deps prebaked) —
    # that avoids the ~90s `--with-deps` apt-get the bare runner pays per shard.
    - name: Install Playwright browser
      if: inputs.kind == 'playwright' && inputs.prebaked_browser != 'true'
      shell: bash
      run: cd page-tests-playwright && npx playwright install --with-deps ${{ inputs.browser }}

    # Start the fixture server in the background. Writes the chosen
    # free port to a file so we can read it from the next step without
    # parsing sbt's chatty stdout. The PID is captured for the
    # always-run kill step further below.
    - name: Start FixtureServerMain
      if: inputs.kind == 'playwright'
      shell: bash
      run: |
        rm -f /tmp/kinowo-port.txt
        sbt 'PageTest/runMain tools.FixtureServerMain /tmp/kinowo-port.txt' > /tmp/sbt-fixture.log 2>&1 &
        echo "FIXTURE_PID=$!" >> $GITHUB_ENV
        for _ in $(seq 1 60); do
            [ -f /tmp/kinowo-port.txt ] && break
            sleep 2
        done
        if [ ! -f /tmp/kinowo-port.txt ]; then
            echo "FixtureServerMain didn't write port within 120s; sbt log:"
            cat /tmp/sbt-fixture.log
            exit 1
        fi
        echo "KINOWO_BASE_URL=http://127.0.0.1:$(cat /tmp/kinowo-port.txt)" >> $GITHUB_ENV

    # Point CdpDriver at the matrix-installed browser via env var.
    # The driver also prints the resolved browser version to stderr
    # at boot, so a failure has the version diff in its log without
    # extra plumbing.
    - name: Run Scala PageTest
      if: inputs.kind == 'chrome'
      shell: bash
      env:
        CDP_BROWSER_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
      run: sbt PageTest/test

    - name: Publish PageTest report
      if: always() && inputs.kind == 'chrome'
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: 'target/test-reports/page/**/*.xml'
        check_name: page tests (chrome)
        detailed_summary: true
        include_passed: false

    - name: Run Playwright behaviour specs (blocking)
      if: inputs.kind == 'playwright'
      shell: bash
      env:
        PW_PROJECT: ${{ inputs.project }}
        PW_SHARD: ${{ inputs.shard }}
      run: |
        cd page-tests-playwright
        set -f
        PROJECT_FLAGS=""
        IFS=',' read -ra PROJS <<< "$PW_PROJECT"
        for p in "${PROJS[@]}"; do PROJECT_FLAGS+=" --project \"$p\""; done
        SHARD_FLAG=""
        [ -n "$PW_SHARD" ] && SHARD_FLAG="--shard $PW_SHARD"
        eval npx playwright test $PROJECT_FLAGS --grep-invert "axe-core" $SHARD_FLAG

    - name: Run Playwright axe-core a11y audit (informational)
      if: inputs.kind == 'playwright' && inputs.project == 'chrome-desktop'
      continue-on-error: true
      shell: bash
      run: cd page-tests-playwright && npx playwright test --project "${{ inputs.project }}" --grep "axe-core"

    # Sanitise project+shard into an artifact-safe suffix (slashes and
    # spaces are invalid in v4 artifact names: `1/2` → `1-2`). Used to
    # keep each matrix row's report/trace upload uniquely named.
    - name: Compute artifact suffix
      if: always() && inputs.kind == 'playwright'
      id: suffix
      shell: bash
      run: echo "name=$(echo '${{ inputs.project }}-${{ inputs.shard }}' | tr '/ ,' '---')" >> "$GITHUB_OUTPUT"

    - name: Publish Playwright report
      if: always() && inputs.kind == 'playwright'
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: 'page-tests-playwright/test-results/junit.xml'
        check_name: page tests (${{ inputs.project }})
        detailed_summary: true
        include_passed: false

    - name: Upload Playwright report + traces on failure
      if: failure() && inputs.kind == 'playwright'
      uses: actions/upload-artifact@v4
      with:
        name: playwright-${{ steps.suffix.outputs.name }}
        path: |
          page-tests-playwright/playwright-report
          page-tests-playwright/test-results
        if-no-files-found: ignore
        retention-days: 7

    - name: Stop FixtureServerMain
      if: always() && inputs.kind == 'playwright'
      shell: bash
      run: |
        if [ -n "$FIXTURE_PID" ]; then
            kill $FIXTURE_PID 2>/dev/null || true
        fi

