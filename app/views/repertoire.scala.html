@import controllers.FilmSchedule
@(films: Seq[FilmSchedule], allCinemas: Seq[String])
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repertuar kinowy Poznań</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@@5.3.3/dist/css/bootstrap.min.css">
  @_sharedStyles()
  <style>
    .cinema-label { font-size: .65rem; color: #66aadd; margin-bottom: .1rem; margin-top: .3rem; }
    .cinema-label-link { color: #66aadd; text-decoration: none; }
    .cinema-label-link:hover { color: #aad4ff; text-decoration: underline; }
  </style>
</head>
<body>

@_navbar("films")

<div class="container-fluid py-4 px-4">
  <p id="film-counter" class="text-secondary mb-4" style="display:none"></p>
  <div id="no-films" class="text-center py-5 text-secondary" style="display:none">Brak repertuaru.</div>
  <div class="row g-3 row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 row-cols-xl-6" id="film-grid">
    @_filmCards(films)
  </div>
</div>

@_sharedJs(allCinemas)
<script>
  // ── DOM index ─────────────────────────────────────────────────────────────

  let INDEX = null;

  function buildIndex() {
    const grid = document.getElementById('film-grid');
    INDEX = [...grid.querySelectorAll('.col[data-title]')].map(col => ({
      el:       col,
      title:    col.dataset.title.toLowerCase(),
      rawTitle: col.dataset.title,
      visible:  true,  // remembered so we only write style.display on changes
      groups:   [...col.querySelectorAll('.date-group[data-date]')].map(group => ({
        el:           group,
        date:         group.dataset.date,
        visible:      true,
        cinemaGroups: [...group.querySelectorAll('.cinema-group[data-cinema]')].map(cg => ({
          el:      cg,
          cinema:  cg.dataset.cinema,
          visible: true,
          // Pre-parse each badge's format tokens into a Set. Re-reading
          // dataset.format on every filter pass adds up — these never change.
          badges:  [...cg.querySelectorAll('.badge-time')].map(b => ({
            el:      b,
            time:    (b.firstChild ? b.firstChild.textContent : '').trim(),
            formats: new Set((b.dataset.format || '').split(' ').filter(Boolean)),
            visible: true
          }))
        }))
      }))
    }));
  }

  // ── Master filter ─────────────────────────────────────────────────────────

  // Helper: only write style.display when the visibility actually changed —
  // avoids triggering layout when nothing moved.
  function setVisible(node, want) {
    if (node.visible !== want) {
      node.el.style.display = want ? '' : 'none';
      node.visible = want;
    }
  }

  let _prevOrderKey = '';

  function applyFilters() {
    if (!INDEX) return;
    const filter    = document.getElementById('date-filter').value;
    const query     = (document.getElementById('search-input').value || '').trim().toLowerCase();
    const hidden    = new Set(getHidden());
    const disabled  = new Set(getDisabledCinemas());
    const fmtTokens = getFormatFilter();
    const hasFmt    = fmtTokens.length > 0;
    const { today, tomorrow, in7Days } = dateBounds();

    const isSpecific = /^\d{4}-\d{2}-\d{2}$/.test(filter);
    const dateOk = filter === 'today'    ? d => d === today :
                   filter === 'tomorrow' ? d => d === tomorrow :
                   filter === 'week'     ? d => d >= today && d <= in7Days :
                   isSpecific            ? d => d === filter :
                                           _  => true;

    let visibleCount = 0, showtimeCount = 0;
    const earlyMap = new Array(INDEX.length);

    for (let i = 0; i < INDEX.length; i++) {
      const col = INDEX[i];
      if (hidden.has(col.rawTitle) || (query && !col.title.includes(query))) {
        setVisible(col, false);
        earlyMap[i] = null;
        continue;
      }

      let colVisible = false, colEarliest = null;

      for (const group of col.groups) {
        if (!dateOk(group.date)) { setVisible(group, false); continue; }

        let groupVisible = false;
        for (const cg of group.cinemaGroups) {
          if (disabled.has(cg.cinema)) { setVisible(cg, false); continue; }

          let cgVisibleCount = 0, cgFirstTime = null;
          if (hasFmt) {
            for (const badge of cg.badges) {
              const ok = badgeFormatMatch(badge.formats, fmtTokens);
              setVisible(badge, ok);
              if (ok) {
                cgVisibleCount++;
                if (!cgFirstTime) cgFirstTime = group.date + 'T' + badge.time;
              }
            }
          } else {
            // Fast-path: no format constraint, every badge in this cinema-group is on.
            for (const badge of cg.badges) setVisible(badge, true);
            cgVisibleCount = cg.badges.length;
            if (cg.badges.length > 0) cgFirstTime = group.date + 'T' + cg.badges[0].time;
          }

          if (cgVisibleCount > 0) {
            setVisible(cg, true);
            groupVisible = true;
            showtimeCount += cgVisibleCount;
            if (cgFirstTime && (!colEarliest || cgFirstTime < colEarliest))
              colEarliest = cgFirstTime;
          } else {
            setVisible(cg, false);
          }
        }

        setVisible(group, groupVisible);
        if (groupVisible) colVisible = true;
      }

      if (colVisible) {
        setVisible(col, true);
        visibleCount++;
        earlyMap[i] = colEarliest;
      } else {
        setVisible(col, false);
        earlyMap[i] = null;
      }
    }

    sortByEarliestVisible(earlyMap);
    updateCounter(visibleCount, showtimeCount);
  }

  function sortByEarliestVisible(earlyMap) {
    // Build a stable, comparable signature for the desired order; if it matches
    // the previously-applied order, skip the DOM moves entirely.
    const indexed = earlyMap.map((t, i) => i);
    indexed.sort((a, b) => {
      const ta = earlyMap[a], tb = earlyMap[b];
      if (!ta && !tb) return a - b;
      if (!ta) return 1;
      if (!tb) return -1;
      return ta < tb ? -1 : ta > tb ? 1 : (a - b);
    });
    const key = indexed.join(',');
    if (key === _prevOrderKey) return;
    _prevOrderKey = key;

    // Batch the moves via a DocumentFragment — a single layout flush instead of
    // one per appendChild.
    const grid = document.getElementById('film-grid');
    const frag = document.createDocumentFragment();
    for (const i of indexed) frag.appendChild(INDEX[i].el);
    grid.appendChild(frag);
  }
</script>
</body>
</html>
