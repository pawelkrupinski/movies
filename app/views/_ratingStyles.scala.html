@()
<style>
  .ratings { display: flex; gap: .25rem; align-items: center; flex-wrap: wrap; margin-top: .25rem; }
  /* Vertical centring: the pill height comes from the spans' top/bottom padding,
     NOT from line-height leading. With line-height 1.3 the extra leading landed
     entirely below the glyphs, so the text sat high in the coloured box. We pull
     line-height in to ~1.1 and add symmetric-ish vertical padding in `em` (so it
     scales with the font through the mobile media query). The top padding is a
     touch larger than the bottom because the face is intrinsically bottom-heavy
     — that lands the ink on the box's centre line. */
  .rating-imdb { display: inline-flex; align-items: stretch; border-radius: 3px; overflow: hidden; font-size: .68rem; line-height: 1.1; text-decoration: none; }
  .rating-imdb-label { background: #f5c518; color: #000; font-weight: 700; padding: .2em .3rem .12em; letter-spacing: .02em; }
  .rating-imdb-value { background: #2a2a3e; color: #f5c518; padding: .2em .35rem .12em; font-weight: 600; }
  .rating-imdb:hover .rating-imdb-value { background: #3a3a6e; }
  .rating-meta { background: #66cc66; color: #002200; font-size: .68rem; font-weight: 700; line-height: 1.1; padding: .2em .35rem .12em; border-radius: 3px; text-decoration: none; }
  a.rating-meta:hover { background: #88dd88; }
  .rating-fw { display: inline-flex; align-items: stretch; border-radius: 3px; overflow: hidden; font-size: .68rem; line-height: 1.1; text-decoration: none; }
  .rating-fw-label { background: #ff6c00; color: #fff; font-weight: 700; padding: .2em .3rem .12em; letter-spacing: .02em; }
  .rating-fw-value { background: #2a2a3e; color: #ff9c4a; padding: .2em .35rem .12em; font-weight: 600; }
  .rating-fw:hover .rating-fw-value { background: #3a3a6e; }
  /* Rotten Tomatoes. Red label for fresh (≥60%), green for rotten — matches
     RT's own tomato vs splat visual cue. */
  .rating-rt { display: inline-flex; align-items: stretch; border-radius: 3px; overflow: hidden; font-size: .68rem; line-height: 1.1; text-decoration: none; }
  .rating-rt-label { color: #fff; font-weight: 700; padding: .2em .3rem .12em; letter-spacing: .02em; }
  .rating-rt-value { background: #2a2a3e; padding: .2em .35rem .12em; font-weight: 600; }
  .rating-rt.fresh  .rating-rt-label { background: #fa320a; }
  .rating-rt.fresh  .rating-rt-value { color: #ff7c5a; }
  .rating-rt.rotten .rating-rt-label { background: #1a8f1a; }
  .rating-rt.rotten .rating-rt-value { color: #6cd06c; }
  .rating-rt:hover  .rating-rt-value { background: #3a3a6e; }

  @@media (max-width: 575px),
         (max-height: 500px) and (orientation: landscape) {
    .rating-imdb, .rating-meta, .rating-fw, .rating-rt {
      font-size: calc(.68 * var(--mobile-scale));
    }
    .rating-imdb-label, .rating-fw-label, .rating-rt-label,
    .rating-imdb-value, .rating-fw-value, .rating-rt-value, .rating-meta {
      padding-left:  calc(.35 * var(--mobile-scale));
      padding-right: calc(.35 * var(--mobile-scale));
    }
  }
</style>
