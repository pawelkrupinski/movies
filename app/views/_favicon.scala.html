@*
   Favicon <link> for every page. Single source for the icon href so it
   can't drift across templates. Declaring an icon also stops the browser
   from auto-requesting the default `/favicon.ico` (which 404s — the app
   serves no `.ico`), which Lighthouse otherwise flags as a console error.
*@
<link rel="icon" type="image/svg+xml" href="@routes.Assets.versioned("img/favicon.svg")">
