@import controllers.CinemaSchedule
@(cinemas: Seq[CinemaSchedule], allCinemas: Seq[String], devMode: Boolean)
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repertuar kinowy Poznań – Kina</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@@5.3.3/dist/css/bootstrap.min.css">
  @_sharedStyles()
  <style>
    .cinema-section-title { color: #aad4ff; font-size: 1rem; font-weight: 600; border-bottom: 1px solid #3a3a6e; padding-bottom: .4rem; }
  </style>
</head>
<body>

@_navbar("kina", devMode)

<div class="container-fluid py-4 px-4">
  <p id="film-counter" class="text-secondary mb-4" style="display:none"></p>
  <div id="no-films" class="text-center py-5 text-secondary" style="display:none">Brak repertuaru.</div>
  <div id="film-grid">
    @_cinemaCards(cinemas)
  </div>
</div>

@_sharedJs(allCinemas)
<script>
  // ── DOM index ─────────────────────────────────────────────────────────────

  let INDEX = null;

  function buildIndex() {
    INDEX = [...document.querySelectorAll('[data-cinema]')].map(section => ({
      el:      section,
      cinema:  section.dataset.cinema,
      row:     section.querySelector('.row'),
      visible: true,
      prevOrderKey: '',
      cols:    [...section.querySelectorAll('.col[data-title]')].map(col => ({
        el:       col,
        title:    col.dataset.title.toLowerCase(),
        rawTitle: col.dataset.title,
        visible:  true,
        groups:   [...col.querySelectorAll('.date-group[data-date]')].map(group => ({
          el:      group,
          date:    group.dataset.date,
          visible: true,
          // Pre-parse each badge's format Set + numeric minutes-since-midnight
          // for the from-hour filter; never re-read dataset on filter.
          badges:  [...group.querySelectorAll('.badge-time')].map(b => {
            const t = (b.firstChild ? b.firstChild.textContent : '').trim();
            const colon = t.indexOf(':');
            const timeMin = colon > 0
              ? parseInt(t.slice(0, colon), 10) * 60 + parseInt(t.slice(colon + 1), 10)
              : -1;
            return {
              el:      b,
              time:    t,
              timeMin: timeMin,
              formats: new Set((b.dataset.format || '').split(' ').filter(Boolean)),
              visible: true
            };
          })
        }))
      }))
    }));
  }

  // ── Master filter ─────────────────────────────────────────────────────────

  function setVisible(node, want) {
    if (node.visible !== want) {
      node.el.style.display = want ? '' : 'none';
      node.visible = want;
    }
  }

  function applyFilters() {
    if (!INDEX) return;
    const filter    = document.getElementById('date-filter').value;
    const query     = (document.getElementById('search-input').value || '').trim().toLowerCase();
    const hidden    = new Set(getHidden());
    const disabled  = new Set(getDisabledCinemas());
    const fmtTokens = getFormatFilter();
    const hasFmt    = fmtTokens.length > 0;
    const fromMin   = getFromMinutes();
    const hasFrom   = fromMin !== null;
    const { today, tomorrow, in7Days } = dateBounds();

    const isSpecific = /^\d{4}-\d{2}-\d{2}$/.test(filter);
    const dateOk = filter === 'today'    ? d => d === today :
                   filter === 'tomorrow' ? d => d === tomorrow :
                   filter === 'week'     ? d => d >= today && d <= in7Days :
                   isSpecific            ? d => d === filter :
                                           _  => true;

    let visibleCount = 0, showtimeCount = 0;

    for (const section of INDEX) {
      if (disabled.has(section.cinema)) { setVisible(section, false); continue; }

      let sectionVisible = false;
      const earlyMap = new Array(section.cols.length);

      for (let i = 0; i < section.cols.length; i++) {
        const col = section.cols[i];
        if (hidden.has(col.rawTitle) || (query && !col.title.includes(query))) {
          setVisible(col, false);
          earlyMap[i] = null;
          continue;
        }

        let colVisible = false, colEarliest = null, colShowtimes = 0;

        for (const group of col.groups) {
          if (!dateOk(group.date)) { setVisible(group, false); continue; }

          let groupVisibleCount = 0, groupFirstBadge = null;
          if (hasFmt || hasFrom) {
            for (const badge of group.badges) {
              const fmtOk  = !hasFmt  || badgeFormatMatch(badge.formats, fmtTokens);
              const timeOk = !hasFrom || badge.timeMin < 0 || badge.timeMin >= fromMin;
              const ok = fmtOk && timeOk;
              setVisible(badge, ok);
              if (ok) {
                groupVisibleCount++;
                if (!groupFirstBadge) groupFirstBadge = group.date + 'T' + badge.time;
              }
            }
          } else {
            for (const badge of group.badges) setVisible(badge, true);
            groupVisibleCount = group.badges.length;
            if (group.badges.length > 0) groupFirstBadge = group.date + 'T' + group.badges[0].time;
          }

          if (groupVisibleCount > 0) {
            setVisible(group, true);
            colVisible = true;
            colShowtimes += groupVisibleCount;
            if (groupFirstBadge && (!colEarliest || groupFirstBadge < colEarliest))
              colEarliest = groupFirstBadge;
          } else {
            setVisible(group, false);
          }
        }

        if (colVisible) {
          setVisible(col, true);
          sectionVisible = true;
          visibleCount++;
          showtimeCount += colShowtimes;
          earlyMap[i] = colEarliest;
        } else {
          setVisible(col, false);
          earlyMap[i] = null;
        }
      }

      setVisible(section, sectionVisible);
      if (sectionVisible && section.row) sortSection(section, earlyMap);
    }

    updateCounter(visibleCount, showtimeCount);
  }

  function sortSection(section, earlyMap) {
    const indexed = earlyMap.map((_, i) => i);
    indexed.sort((a, b) => {
      const ta = earlyMap[a], tb = earlyMap[b];
      if (!ta && !tb) return a - b;
      if (!ta) return 1;
      if (!tb) return -1;
      return ta < tb ? -1 : ta > tb ? 1 : (a - b);
    });
    const key = indexed.join(',');
    if (key === section.prevOrderKey) return;
    section.prevOrderKey = key;
    const frag = document.createDocumentFragment();
    for (const i of indexed) frag.appendChild(section.cols[i].el);
    section.row.appendChild(frag);
  }
</script>
</body>
</html>
