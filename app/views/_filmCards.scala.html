@import controllers.FilmSchedule
@(films: Seq[FilmSchedule])
@for(film <- films) {
<div class="col" data-title="@film.movie.title" data-countries="@film.movie.countries.mkString("|")"@film.director.map { d => data-director="@d" }@film.cast.map { c => data-cast="@c" }>
  @_movieCard(film.movie, film.posterUrl, film.enrichment) {
    @_filmShowings(film)
  }
</div>
}
