@(devMode: Boolean = false)
@_minified(devMode) {
<style>
  /* touch-action: manipulation suppresses iOS Safari's double-tap-to-zoom on
     every tap target on the page (rapid presses on time badges, date arrows,
     the Filtry reset, etc. register as separate clicks) while leaving
     pinch-zoom intact. */
  html { touch-action: manipulation; }
  body { background: #111; color: #eee; overflow-x: hidden; }

  /* The single `--mobile-scale` variable that every per-mobile size on
     every page reads off is defined in `_pillStyles` (which is loaded
     universally — by `_sharedStyles` on the listing/kina/ulubione
     pages, and directly on `/film`). Linearly interpolates 0.85 → 1.0
     between 320 px viewport and 575 px (the @@media breakpoint top,
     where mobile overrides hand back to the desktop defaults).
     Replaces ~15 per-property `clamp(min, vw-formula, max)` rules that
     each capped at a different viewport — Samsung S10 (360) and
     iPhone 17 Pro Max (~430) ended up with different navbar↔grid
     ratios under that scheme. One variable = uniform ratios. */
  /* Sticky so the filter bar stays on-screen as the user scrolls
     through a long film grid (200+ cards on /). Was `position:
     relative` — scrolling past the first viewport hid the navbar
     and the only way back to the date / search controls was to
     scroll all the way up. `z-index: 10` keeps it above film cards
     and modal backdrops. The /kina-only second row (`.cinema-nav-row`)
     opts back out of sticky so the two rows don't both jam against
     the top edge. */
  .navbar { background: #1a1a2e; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  .card {
    background: #1e1e2e;
    border: none;
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
    transition: transform .2s;
  }
  .card:hover { transform: translateY(-4px); }
  .poster-wrap {
    position: relative;
    padding-top: 148%;
    background: #2a2a3e;
    overflow: hidden;
  }
  .poster-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .no-poster {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    color: #99a;
    font-style: italic;
    letter-spacing: .03em;
  }
  .card-body { padding: 1rem; }
  .card-title { min-height: 2.5rem; display: flex; flex-wrap: wrap; align-items: baseline; column-gap: .3rem; }
  .card-title a { font-size: .95rem; font-weight: 600; color: #fff; text-decoration: none; }
  .card-title a:hover { color: #aad4ff; }
  .pill { background: #252540; border: 1px solid #3a3a6e; border-radius: 3px; padding: 0 5px; font-size: .72rem; color: #99b; white-space: nowrap; }
  .runtime { font-size: .75rem; color: #888; }
  .date-label { font-size: .7rem; color: #888; margin-bottom: .2rem; margin-top: .5rem; }
  #room-tooltip {
    position: fixed;
    background: #0e0e1e;
    color: #ccc;
    font-size: .68rem;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid #3a3a6e;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  /* Unified 35 px height across every navbar tappable: nav-tabs,
     refresh-btn (Filtry / hidden-films flyout), date-nav-btn arrows,
     filter-select, search-input, login pill, auth menu. Tall enough
     to tap reliably on touch (35 is a comfortable middle ground
     between Apple HIG's 44 and the visually-compact 29 the page used
     to ship), short enough to keep the navbar from feeling chunky
     on desktop. `inline-flex + align-items: center` is what vertically
     centres the content inside the box — particularly the dynamic
     "X ukrytych" label on the hidden-films flyout, which used to
     sit at the top of the button. */
  /* `.refresh-btn` (Filtry) + `.filter-select` (date dropdown) sit
     shoulder-to-shoulder on every page — the date select on row 2 of
     the mobile navbar, the Wyczyść/Filtry pair in the desktop cluster.
     A native `<select>` carries OS-painted chrome (the dropdown
     caret, a 1-2 px top/bottom inset on iOS Safari) that pushed it a
     hair taller than a sibling `<button class="refresh-btn">` with
     just `min-height: 35px`. Pin both to a concrete `height` +
     `box-sizing: border-box` so the row is uniform regardless of UA. */
  .refresh-btn { background: #3a3a6e; border: none; color: #aad4ff; white-space: nowrap; flex-shrink: 0; height: 35px; box-sizing: border-box; display: inline-flex; align-items: center; justify-content: center; }
  .refresh-btn:hover { background: #5a5a9e; color: #fff; }
  .date-nav-btn { padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; touch-action: manipulation; height: 35px; box-sizing: border-box; min-width: 35px; }
  .filter-select {
    background: #3a3a6e;
    color: #aad4ff;
    border: none;
    border-radius: 6px;
    padding: .25rem .5rem;
    font-size: .875rem;
    cursor: pointer;
    flex-shrink: 0;
    height: 35px;
    box-sizing: border-box;
  }
  .filter-select:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; }
  .search-input {
    background: #3a3a6e;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: .25rem .6rem;
    font-size: .875rem;
    width: 160px;
    min-height: 35px;
  }
  .search-input::placeholder { color: #778; }
  .search-input:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; width: 220px; }
  @@media (max-width: 575px) { .search-input, .search-input:focus { width: 90px; } }
  /* Sub-iPhone-SE widths can't fit [logo+tabs] [search] [auth] on one
     row without shrinking the input further. Drop to 70 px so the
     intended two-row layout (search adjacent to auth on row 1)
     survives down to ~360 px viewports. */
  @@media (max-width: 379px) { .search-input, .search-input:focus { width: 70px; } }
  .hide-btn {
    position: absolute;
    top: 6px; right: 6px;
    z-index: 10;
    background: rgba(0,0,0,.55);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: .75rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .card:hover .hide-btn,
  .card.previewed .hide-btn { opacity: 1; }
  /* Favourite-the-whole-movie button: mirror of .hide-btn (top-left, larger
     star). Hidden by default and revealed on card hover; once a movie is
     marked favourite, the star turns yellow and stays visible permanently. */
  .fav-poster-btn {
    position: absolute;
    top: 6px; left: 6px;
    z-index: 10;
    background: rgba(0,0,0,.55);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, color .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .card:hover .fav-poster-btn,
  .card.previewed .fav-poster-btn { opacity: 1; }
  .fav-poster-btn.is-fav { opacity: 1; color: #ffd24a; }
  .dropdown-panel {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-radius: 8px;
    padding: 8px;
    z-index: 1000;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    min-width: 220px;
    max-width: calc(100vw - 1rem);
    max-height: 70vh;
    overflow-y: auto;
  }
  .panel-item {
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: .8rem;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .panel-item:hover { background: #3a3a6e; }
  .panel-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: .8rem;
    color: #eee;
    border-radius: 4px;
  }
  .panel-label:hover { background: #3a3a6e; }
  .panel-divider { border-top: 1px solid #3a3a6e; margin: 6px 0; padding-top: 2px; }
  /* Scrollbars inside dark popups (the Filtry dropdown and the hidden-films
     modal list). Default OS scrollbars render light-grey-on-dark and stick
     out against the navy palette; this re-skins them to match the existing
     border / hover accents (`#3a3a6e` → `#5a5a9e`). Transparent track so
     the rule works regardless of the host's bg (`#1e1e2e` for the dropdown,
     `#1a1a2e` for the modal). `scrollbar-color` covers Firefox, the
     `::-webkit-scrollbar*` block covers Chromium + WebKit. */
  .dropdown-panel,
  .hidden-modal-list { scrollbar-width: thin; scrollbar-color: #3a3a6e transparent; }
  .dropdown-panel::-webkit-scrollbar,
  .hidden-modal-list::-webkit-scrollbar { width: 8px; height: 8px; }
  .dropdown-panel::-webkit-scrollbar-track,
  .hidden-modal-list::-webkit-scrollbar-track { background: transparent; }
  .dropdown-panel::-webkit-scrollbar-thumb,
  .hidden-modal-list::-webkit-scrollbar-thumb { background: #3a3a6e; border-radius: 4px; }
  .dropdown-panel::-webkit-scrollbar-thumb:hover,
  .hidden-modal-list::-webkit-scrollbar-thumb:hover { background: #5a5a9e; }
  .panel-section-label {
    font-size: .65rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 8px 2px;
  }
  .nav-tab {
    color: #aad4ff;
    text-decoration: none;
    font-size: .875rem;
    padding: .25rem .6rem;
    border-radius: 6px;
    /* iOS Safari otherwise pops up the text-selection / link-context
       sheet on long-press, even on `<a>` tabs that should activate
       on tap-release. Disabling user-select + touch-callout makes
       the tap unambiguous. Doesn't affect keyboard focus / a11y.
       `-webkit-user-select` is for iOS ≤ 16. */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    /* 35 px tap target with the label vertically centred. */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 35px;
  }
  .nav-tab:hover { background: #3a3a6e; color: #fff; }
  .nav-tab.active { background: #3a3a6e; color: #fff; }
  /* Favourites tab renders as a yellow star instead of text — matches the
     fav-star colour used on listing-card and film-page poster buttons so
     the whole "favourite" idea is visually consistent. Slightly larger
     than the text tabs so the glyph reads cleanly at the navbar height. */
  /* inline-flex + align-items: center so the ★ glyph sits in the optical
     centre of the pill — the surrounding flex row stretches every tab to
     the tallest sibling's height, and without explicit centering the
     short-line-height star floats to the top of that stretched box. */
  .nav-tab-fav { color: #ffd24a; font-size: 1.05rem; line-height: 1; padding: .2rem .55rem; display: inline-flex; align-items: center; justify-content: center; min-width: 35px; }
  .nav-tab-fav:hover { color: #ffd24a; background: #3a3a6e; }
  .nav-tab-fav.active { color: #ffd24a; background: #3a3a6e; }

  /* ── Auth pill / dropdown / login modal ──────────────────────────────── */
  .nav-tab-login {
    cursor: pointer;
    border: none;
    font: inherit;
    background: #3a3a6e;
    color: #aad4ff;
    padding: .2rem .7rem;
    /* `.nav-tab` already sets min-height: 35px + inline-flex centering;
       login pill picks both up via the shared class. The slightly
       wider horizontal padding (.7 vs .6 rem) keeps "Zaloguj się" /
       "Wyloguj się" balanced inside the 35 px box without crowding
       the text against the pill edges. */
  }
  .nav-tab-login:hover { background: #5a5a9e; color: #fff; }

  /* The "logged in" pill — avatar + first name, click toggles a dropdown
     anchored below it. Position:relative so the absolute-positioned
     dropdown has the right anchor. */
  .auth-menu {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    background: #3a3a6e;
    color: #aad4ff;
    border-radius: 6px;
    padding: .15rem .55rem .15rem .25rem;
    font-size: .875rem;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    min-height: 35px;
  }
  .auth-menu:hover { background: #5a5a9e; color: #fff; }
  .auth-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; display: block; }
  .auth-avatar-fallback {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #1a1a2e; color: #ffd24a;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 600;
  }
  .auth-name { font-size: .875rem; }
  .auth-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-radius: 8px;
    padding: 6px;
    min-width: 160px;
    display: none;
    z-index: 50;
  }
  .auth-menu.open .auth-dropdown { display: block; }
  .auth-logout-form { margin: 0; }
  .auth-logout-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: #eee;
    text-align: left;
    padding: .4rem .6rem;
    cursor: pointer;
    border-radius: 6px;
    font-size: .875rem;
    min-height: 35px;
    display: flex;
    align-items: center;
  }
  .auth-logout-btn:hover { background: #3a3a6e; color: #fff; }

  /* Login modal — full-viewport dimmed backdrop, centred card. The backdrop
     is the click-outside-to-close handler; the card has stopPropagation on
     its own click so the bubbling doesn't fire-close. */
  .login-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  .login-modal-backdrop.open { display: flex; }
  .login-modal {
    background: #1a1a2e;
    border: 1px solid #3a3a6e;
    border-radius: 12px;
    padding: 1.5rem 1.6rem 1.4rem;
    max-width: 360px;
    width: 92%;
    position: relative;
  }
  .login-modal-title { font-size: 1.2rem; font-weight: 600; margin-bottom: .5rem; }
  .login-modal-sub   { font-size: .85rem; color: #aab; margin-bottom: 1.1rem; }
  .login-modal-close {
    position: absolute;
    top: .4rem; right: .55rem;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
  }
  .login-modal-close:hover { color: #fff; }
  .login-modal-buttons { display: flex; flex-direction: column; gap: .55rem; }

  /* Hidden-films modal — same backdrop/card structure as login, but the
     body is a scrollable list of titles. Reuses `.login-modal-close`
     and `.login-modal-title`; the card-level styling needs its own
     class because the layout adds a list container + a footer button. */
  .hidden-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  .hidden-modal-backdrop.open { display: flex; }
  .hidden-modal {
    background: #1a1a2e;
    border: 1px solid #3a3a6e;
    border-radius: 12px;
    padding: 1.4rem 1.4rem 1.1rem;
    max-width: 420px;
    width: 92%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Search box pinned above the list (flex-column, only the list
     scrolls). Mirrors the navbar `.search-input` palette so the two
     search affordances feel like the same thing. */
  .hidden-modal-search {
    background: #3a3a6e;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: .25rem .6rem;
    font-size: .875rem;
    width: 100%;
    margin-top: .6rem;
    min-height: 35px;
    flex-shrink: 0;
  }
  .hidden-modal-search::placeholder { color: #778; }
  .hidden-modal-search:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; }
  /* List body scrolls when there are more titles than fit; the bottom
     "Wyczyść" stays pinned because the card is a flex column. */
  .hidden-modal-list {
    overflow-y: auto;
    margin: .35rem -.4rem .9rem;
    padding: 0 .4rem;
  }
  .hidden-modal-list .panel-item {
    /* Inside the modal the item can use the full available width
       (vs. the original dropdown which capped at 280 px). */
    max-width: none;
  }
  .hidden-modal-actions { display: flex; gap: .55rem; }

  /* Small count badge on the "Ukryte filmy" row inside Filtry. */
  .hidden-row-count {
    font-size: .7rem;
    color: #aab;
    background: #3a3a6e;
    border-radius: 10px;
    padding: 1px 8px;
    min-width: 22px;
    text-align: center;
  }
  .login-btn {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .65rem .9rem;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: filter .12s;
  }
  .login-btn:hover { filter: brightness(1.1); }
  .login-btn-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 1rem;
  }
  .login-btn-google   { background: #fff; color: #222; }
  .login-btn-google .login-btn-icon   { background: #4285F4; color: #fff; }
  .login-btn-facebook { background: #1877F2; color: #fff; }
  .login-btn-facebook .login-btn-icon { background: #fff;     color: #1877F2; }

  /* Anonymous nag toast — shown at most once per 24h when an anonymous
     user adds their first favourite/hide of the day. Click body → opens
     the login modal. Self-dismisses after 8s. Pinned to the viewport's
     bottom-right so it doesn't compete with the navbar above. */
  .anon-nag-toast {
    position: fixed;
    bottom: 16px; right: 16px;
    max-width: 380px;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-left: 3px solid #ffd24a;
    border-radius: 8px;
    padding: .65rem .9rem .65rem .8rem;
    color: #eee;
    font-size: .85rem;
    line-height: 1.35;
    display: none;
    z-index: 150;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    cursor: pointer;
  }
  .anon-nag-toast.open { display: block; }
  .anon-nag-toast strong { color: #ffd24a; }
  .anon-nag-toast .anon-nag-close {
    position: absolute;
    top: 2px; right: 6px;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 6px;
  }
  .anon-nag-toast .anon-nag-close:hover { color: #fff; }
  /* Desktop layout: tabs on the left; search-date / Filtry / auth as one
     right-aligned cluster. `margin-left: auto` on the leftmost member
     of the right cluster (search) absorbs the empty space between
     tabs and the cluster. Search + date stay visually adjacent on
     desktop (consecutive orders, date with no left margin).
     The hidden-films entry point used to be its own navbar pill —
     it now lives inside Filtry as a top row, so there's no
     `.navbar-hidden` slot anymore. */
  .navbar-search    { order: 1; margin-left: auto; }
  .navbar-date      { order: 2; }
  .navbar-filtry    { order: 3; }
  .navbar-auth      { order: 4; }
  .navbar-row-break { display: none; }

  @@media (max-width: 575px) {
    /* Every text-bearing navbar control rides `--mobile-scale` — fonts
       and horizontal paddings shrink with the viewport so the row
       never overflows on iPhone-mini-class widths, then climb back to
       the desktop ceiling at the breakpoint top. Single scale knob =
       uniform ratios between the navbar and the grid beneath it. */
    .navbar {
      padding: calc(.5rem * var(--mobile-scale)) calc(.75rem * var(--mobile-scale)) !important;
      gap: calc(.4rem * var(--mobile-scale));
      --navbar-fs: calc(.875rem * var(--mobile-scale));
      --navbar-px: calc(.6rem  * var(--mobile-scale));
    }
    .navbar .nav-tab,
    .navbar .nav-tab-login,
    .navbar .refresh-btn,
    .navbar .auth-name {
      font-size: var(--navbar-fs);
      padding-left:  var(--navbar-px);
      padding-right: var(--navbar-px);
    }
    /* Icon-only controls scale on glyph cap height — ★, < and >. */
    .navbar .nav-tab-fav  { font-size: calc(1.05rem * var(--mobile-scale)); }
    .navbar .date-nav-btn { font-size: calc(1.1rem  * var(--mobile-scale)); }
    /* Inputs/selects keep the 16px floor (iOS auto-zoom guard set in
       the rule below) — only their horizontal padding shrinks with
       the viewport so the focused search pill doesn't eat the row. */
    .navbar .search-input, .navbar .filter-select {
      padding-left:  var(--navbar-px);
      padding-right: var(--navbar-px);
    }
    .navbar-title { display: none; }
    /* Mobile row-1: [logo+tabs] … [search] [auth] flush right.
       Mobile row-2: [date]            …    [filtry] flush right.
       The 100%-wide zero-height `.navbar-row-break` between auth
       (order 3) and date (order 5) forces a hard wrap regardless of
       how much horizontal slack row 1 ended up with — without it,
       date would slide back onto row 1 on any phone wide enough.
       Row-2 has date flush left (no margin) and filtry flush right
       (margin-left: auto), with the slack between them.
       The Filtry button text grows with active filters (e.g.
       "Filtry (kina 9/10, 2D, NAP, od 18:00)") — capped at a
       fraction of the row so a long label can't push past the
       row edge and force the whole button onto a third row. */
    .navbar-search    { order: 2; margin-left: auto; }
    .navbar-auth      { order: 3; }
    .navbar-row-break { display: block; order: 4; width: 100%; flex-shrink: 0; height: 0; margin: 0; padding: 0; }
    .navbar-date      { order: 5; margin-left: 0; }
    /* Capped at 40% of the row so the date cluster (two arrows + a
       `<select>` whose widest option "Następne 7 dni" is ~14 chars)
       still fits alongside on the 500 px CI viewport, where Linux
       headless Chrome renders the select ~3 % wider than macOS and
       a 50 % cap tipped the row over and wrapped Filtry. */
    .navbar-filtry    { order: 6; margin-left: auto; max-width: 40%; min-width: 0; }
    #format-filter-btn {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      /* `display: block` overrides the `inline-flex` from `.refresh-btn`
         so the text-overflow-ellipsis kicks in (ellipsis needs a block-
         level container with overflow:hidden and a constrained width). */
      display: block;
    }

    /* iOS Safari auto-zooms the viewport when focus lands on an
       input / select with font-size < 16 px and stays zoomed in
       until the user manually pinches back out. Bumping these to
       16 px on mobile breakpoints alone (desktop stays at .875rem)
       keeps the page at its intended scale on every search-input
       focus and every native-picker open. */
    .search-input, .filter-select, input, select { font-size: 16px; }

    /* Card text rides `--mobile-scale` too. The grid is 2 columns
       below 576 px (Bootstrap's `row-cols-2`), so each card is roughly
       viewport/2 wide — what felt right at the desktop defaults
       (.95rem title, .72rem pills, .68rem ratings) reads cramped on a
       ~150 px iPhone-SE card. Scaling card text by the same factor
       as the navbar keeps the two visual zones in proportion at every
       mobile width. */
    .card-body         { padding: calc(1rem * var(--mobile-scale)); }
    .card-title a      { font-size: calc(.95rem * var(--mobile-scale)); }
    /* Runtime + the year/format pills that appear next to the title. */
    .pill              { font-size: calc(.72rem * var(--mobile-scale)); padding: 0 calc(5px * var(--mobile-scale)); }
    /* "Czwartek 21 maja" per-day labels. */
    .date-label        { font-size: calc(.7rem * var(--mobile-scale)); }
    /* Showtime pills (`.badge-time` / `.badge-fmt`) + rating pills
       (`.rating-imdb` / `.rating-meta` / `.rating-fw` / `.rating-rt`)
       are scaled inside their own partials (`_pillStyles`,
       `_ratingStyles`) so the `/film` page — which loads those
       partials directly without `_sharedStyles` — gets the same
       shrinking as the listing pages. */

    /* Pop-over chrome — Filtry dropdown, login + hidden-films modals,
       auth menu, the anonymous-user nag toast, the showtime-pill room
       tooltip. None of these are visible at first paint, but they all
       open on tap and should read at the same visual scale as the
       navbar / grid that's already on screen. Same `--mobile-scale`
       factor → consistent typography across every layer of UI. */
    .login-modal-title  { font-size: calc(1.2rem  * var(--mobile-scale)); }
    .login-modal-sub    { font-size: calc(.85rem  * var(--mobile-scale)); }
    .login-btn          {
      font-size: calc(.95rem * var(--mobile-scale));
      padding:   calc(.65rem * var(--mobile-scale)) calc(.9rem * var(--mobile-scale));
    }
    .panel-item         { font-size: calc(.8rem   * var(--mobile-scale)); }
    .panel-label        { font-size: calc(.8rem   * var(--mobile-scale)); }
    .panel-section-label{ font-size: calc(.65rem  * var(--mobile-scale)); }
    .auth-logout-btn    { font-size: calc(.875rem * var(--mobile-scale)); }
    .anon-nag-toast     { font-size: calc(.85rem  * var(--mobile-scale)); }
    /* Card-poster fallback ("Brak plakatu") + the hover-on-pill room
       tooltip (`#room-tooltip`) — small text, but still readable at
       the floor (0.85 × .85rem = ~11.6 px). */
    .no-poster          { font-size: calc(.85rem  * var(--mobile-scale)); }
    #room-tooltip       { font-size: calc(.68rem  * var(--mobile-scale)); }

    /* The 35 px min-height / 35 px min-width on nav-tab / nav-tab-fav /
       refresh-btn / date-nav-btn / filter-select / search-input /
       nav-tab-login / auth-menu lives on the base rules above so
       desktop and mobile share a consistent navbar height. */
  }
</style>
@_pillStyles()
@_ratingStyles()
