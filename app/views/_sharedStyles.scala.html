@()
<style>
  /* touch-action: manipulation suppresses iOS Safari's double-tap-to-zoom on
     every tap target on the page (rapid presses on time badges, date arrows,
     the Filtry reset, etc. register as separate clicks) while leaving
     pinch-zoom intact. */
  html { touch-action: manipulation; }
  body { background: #111; color: #eee; overflow-x: hidden; }
  .navbar { background: #1a1a2e; flex-wrap: wrap; }
  .card {
    background: #1e1e2e;
    border: none;
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
    transition: transform .2s;
  }
  .card:hover { transform: translateY(-4px); }
  .poster-wrap {
    position: relative;
    padding-top: 148%;
    background: #2a2a3e;
    overflow: hidden;
  }
  .poster-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .no-poster {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    color: #99a;
    font-style: italic;
    letter-spacing: .03em;
  }
  .card-body { padding: 1rem; }
  .card-title { min-height: 2.5rem; display: flex; flex-wrap: wrap; align-items: baseline; column-gap: .3rem; }
  .card-title a { font-size: .95rem; font-weight: 600; color: #fff; text-decoration: none; }
  .card-title a:hover { color: #aad4ff; }
  .pill { background: #252540; border: 1px solid #3a3a6e; border-radius: 3px; padding: 0 5px; font-size: .72rem; color: #99b; white-space: nowrap; }
  .runtime { font-size: .75rem; color: #888; }
  .date-label { font-size: .7rem; color: #888; margin-bottom: .2rem; margin-top: .5rem; }
  .badge-time {
    background: #3a3a6e;
    color: #aad4ff;
    font-size: .72rem;
    padding: .25em .5em;
    border-radius: 6px;
    margin: 1px 2px 1px 0;
    display: inline-block;
    text-decoration: none;
  }
  a.badge-time:hover { background: #5a5a9e; color: #fff; }
  .badge-fmt { font-size: .62rem; opacity: .7; margin-left: 2px; }
  #room-tooltip {
    position: fixed;
    background: #0e0e1e;
    color: #ccc;
    font-size: .68rem;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid #3a3a6e;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  .refresh-btn { background: #3a3a6e; border: none; color: #aad4ff; white-space: nowrap; flex-shrink: 0; }
  .refresh-btn:hover { background: #5a5a9e; color: #fff; }
  .date-nav-btn { padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; touch-action: manipulation; }
  .filter-select {
    background: #3a3a6e;
    color: #aad4ff;
    border: none;
    border-radius: 6px;
    padding: .25rem .5rem;
    font-size: .875rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  .filter-select:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; }
  .search-input {
    background: #3a3a6e;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: .25rem .6rem;
    font-size: .875rem;
    width: 160px;
  }
  .search-input::placeholder { color: #778; }
  .search-input:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; width: 220px; }
  @@media (max-width: 575px) { .search-input, .search-input:focus { width: 100px; } }
  .hide-btn {
    position: absolute;
    top: 6px; right: 6px;
    z-index: 10;
    background: rgba(0,0,0,.55);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: .75rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .card:hover .hide-btn { opacity: 1; }
  .dropdown-panel {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-radius: 8px;
    padding: 8px;
    z-index: 1000;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    min-width: 220px;
    max-width: calc(100vw - 1rem);
    max-height: 70vh;
    overflow-y: auto;
  }
  .panel-item {
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: .8rem;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .panel-item:hover { background: #3a3a6e; }
  .panel-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: .8rem;
    color: #eee;
    border-radius: 4px;
  }
  .panel-label:hover { background: #3a3a6e; }
  .panel-divider { border-top: 1px solid #3a3a6e; margin: 6px 0; padding-top: 2px; }
  .panel-section-label {
    font-size: .65rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 8px 2px;
  }
  .nav-tab {
    color: #aad4ff;
    text-decoration: none;
    font-size: .875rem;
    padding: .25rem .6rem;
    border-radius: 6px;
  }
  .nav-tab:hover { background: #3a3a6e; color: #fff; }
  .nav-tab.active { background: #3a3a6e; color: #fff; }
  .navbar-search-date { margin-left: auto; order: 2; }
  .navbar-cinema-controls { order: 3; }
  /* Desktop: Filtry follows Kina (cinema-controls) at the far right. */
  .navbar-filtry { order: 4; }
  @@media (max-width: 575px) {
    .navbar { padding: .5rem .75rem !important; gap: .4rem; }
    .navbar-title { display: none; }
    .navbar-cinema-controls { margin-left: auto; order: 2; }
    /* Mobile: Filtry always sits to the right of the day selector. If row 2
       has room it shares the row with search/date; if the long
       "Filtry (2D NAP IMAX)" label can't fit, flex-wrap pushes it onto its
       own row and margin-left:auto keeps it stuck to the right edge. */
    .navbar-search-date { order: 3; flex-basis: 0; flex-grow: 1; margin-left: 0; justify-content: space-between; }
    .navbar-filtry { order: 4; margin-left: auto; }
  }
</style>
