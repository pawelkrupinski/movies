# Self-hosted Mongo for the kinowo app. Reachable only on Fly's private
# network at `kinowo-mongo.flycast:27017` from kinowo's machine — no public
# services, no exposed ports. Root credentials come from `flyctl secrets`
# (MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD); the app-level
# user is created out-of-band via `flyctl ssh console` + `mongosh` once
# the cluster is up.
app = "kinowo-mongo"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "mongo_data"
  destination = "/data/db"

[[vm]]
  # Bumped shared-cpu-1x → 2x on 2026-07-18: wiring the full German Filmstarts
  # roster stepped Mongo's load up at 07:15 UTC and it never came back down.
  # One core couldn't keep up (loadavg 2.46), so mongod spent tens of SECONDS
  # just planning cheap indexed queries and burned the whole 50k CPU-credit
  # balance in ~4h. Two cores both raise the credit cap and refill it faster.
  size = "shared-cpu-2x"
  # Bumped 512mb → 1gb after a 2026-06-06 OOM-kill (exit 137, oom_killed=true)
  # took Mongo down and cascaded into a kinowo web outage. 512mb left no
  # headroom over WiredTiger's cache + mongod baseline + the ~50 live
  # connections. The Dockerfile now also pins the WT cache
  # (--wiredTigerCacheSizeGB), so steady-state RSS is bounded well under this.
  memory = "1gb"

# TCP liveness check on the mongod port. Mongo has no [[services]] (it stays on
# the private network), so this app-level check is what makes a dead or hung
# mongod visible in `fly status` / `fly checks list` instead of silently
# wedging until it OOMs. TCP-accepting ≠ replica-set-healthy, but it catches the
# process being gone — the failure mode that took the cluster down with no signal.
[checks]
  [checks.tcp]
    type = "tcp"
    port = 27017
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

# No `[[services]]` block — Mongo stays on the .internal/.flycast network.
