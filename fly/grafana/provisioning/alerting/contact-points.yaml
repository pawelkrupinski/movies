apiVersion: 1

# Telegram delivery into the "Kinowo Monitoring" group — the single channel for
# ALL of our alerts. The bot token is injected as a Fly secret; it must be the
# bot that belongs to that group (the same one the worker posts its app alerts
# with):
#   fly secrets set TELEGRAM_BOT_TOKEN=...
contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-primary
        type: telegram
        settings:
          # bottoken is the real secret: injected from `fly secrets` and read via
          # Grafana's ${VAR} expansion (it's non-numeric, so expansion keeps it a
          # string).
          bottoken: '${TELEGRAM_BOT_TOKEN}'
          # chatid is NOT a secret (a chat id is useless without the bot token).
          # It must be a quoted LITERAL here, not ${VAR}: Grafana's provisioning
          # env-expansion re-types a numeric chatid as a number regardless of
          # quote style, which fails its string schema ("cannot unmarshal number
          # into ... string"). A quoted literal in the file is parsed as a string.
          # This is the "Kinowo Monitoring" group; Grafana's infra alerts land in
          # its General topic (no message_thread_id), while the worker posts app
          # alerts to dedicated topics in the same group. KEEP the quotes.
          chatid: "-1003950886618"
          # Send a follow-up when an alert clears, so a silent channel means
          # "all good" rather than "did it recover?".
        disableResolveMessage: false

  # NOT a notification — a control channel. The worker-credit-low rule posts here,
  # and this webhook drives the worker's reaper backoff: Grafana POSTs the alert
  # payload (status=firing on trip, status=resolved on recovery) to the worker's
  # /throttle endpoint over the private network, which ExternalThrottleGate.parse
  # turns into on/off. disableResolveMessage MUST stay false or the worker would
  # never be told to resume. Reachable because the worker's :9000 health server is
  # answered over the 6PN (verified 2026-06-20).
  - orgId: 1
    name: WorkerThrottle
    receivers:
      - uid: worker-throttle-webhook
        type: webhook
        settings:
          url: 'http://kinowo-worker.internal:9000/throttle'
          httpMethod: POST
        disableResolveMessage: false
