apiVersion: 1

# Telegram delivery into the "Kinowo Monitoring" group — the single channel for
# ALL of our alerts. The bot token is injected as a Fly secret; it must be the
# bot that belongs to that group (the same one the worker posts its app alerts
# with):
#   fly secrets set TELEGRAM_BOT_TOKEN=...
contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-primary
        type: telegram
        settings:
          # bottoken is the real secret: injected from `fly secrets` and read via
          # Grafana's ${VAR} expansion (it's non-numeric, so expansion keeps it a
          # string).
          bottoken: '${TELEGRAM_BOT_TOKEN}'
          # chatid is NOT a secret (a chat id is useless without the bot token).
          # It must be a quoted LITERAL here, not ${VAR}: Grafana's provisioning
          # env-expansion re-types a numeric chatid as a number regardless of
          # quote style, which fails its string schema ("cannot unmarshal number
          # into ... string"). A quoted literal in the file is parsed as a string.
          # This is the "Kinowo Monitoring" group; Grafana's infra alerts land in
          # its General topic (no message_thread_id), while the worker posts app
          # alerts to dedicated topics in the same group. KEEP the quotes.
          chatid: "-1003950886618"
          # Send a follow-up when an alert clears, so a silent channel means
          # "all good" rather than "did it recover?".
        disableResolveMessage: false

  # NOT notifications — a control channel, ONE PER WORKER APP. The
  # worker-credit-low rule posts here, and these webhooks drive the worker's
  # reaper backoff: Grafana POSTs the alert payload (status=firing on trip,
  # status=resolved on recovery) to that worker's /throttle endpoint over the
  # private network, which ExternalThrottleGate.parse turns into on/off.
  # disableResolveMessage MUST stay false or the worker would never be told to
  # resume. Reachable because the worker's :9000 health server is answered over
  # the 6PN (verified 2026-06-20).
  #
  # WHY ONE PER APP rather than a single templated webhook: Grafana's webhook
  # integration does NOT support notification templates in the `url` field (only
  # `title`/`message`), so the target app cannot be derived from `$labels.app` at
  # send time. The URL is therefore the ONLY routing mechanism, which forces one
  # contact point per worker + a per-app route in notification-policies.yaml.
  # ExternalThrottleGate reads only the top-level `status` and ignores labels, so
  # a webhook delivered to the wrong worker would silently throttle the wrong
  # fleet — the per-app pairing is load-bearing, not cosmetic.
  #
  # Onboarding a country adds a block here AND a route; GrafanaWorkerThrottleCoverageSpec
  # fails CI if a `fly.worker.<cc>.toml` exists without both.
  - orgId: 1
    name: WorkerThrottle
    receivers:
      - uid: worker-throttle-webhook
        type: webhook
        settings:
          url: 'http://kinowo-worker.internal:9000/throttle'
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: WorkerThrottleUk
    receivers:
      - uid: worker-throttle-webhook-uk
        type: webhook
        settings:
          url: 'http://kinowo-worker-uk.internal:9000/throttle'
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: WorkerThrottleDe
    receivers:
      - uid: worker-throttle-webhook-de
        type: webhook
        settings:
          url: 'http://kinowo-worker-de.internal:9000/throttle'
          httpMethod: POST
        disableResolveMessage: false
