# Scrape config for the VictoriaMetrics sidecar baked into the grafana machine
# (see ../Dockerfile + ../start.sh). It pulls the app-emitted Prometheus metrics
# DIRECTLY, every 15s, instead of reading them back from Fly's managed
# Prometheus — which runs ~15-25 min behind real time and occasionally stalls.
#
# Targets are Fly 6PN private hostnames (`<app>.internal`), reachable because
# kinowo-grafana sits in the same org/private network as the apps it scrapes.
# Port 9000 is where BOTH apps expose Prometheus exposition: the web app's whole
# Play server binds 9000 and serves `/metrics` (root fly.toml), and the worker's
# JDK health server binds 9000 likewise (fly.worker.toml [[metrics]]).
#
# Only the kinowo_* / kinowo_worker_* app series live here. Host metrics
# (fly_instance_* / fly_edge_*) are produced solely by Fly's host agent and are
# NOT scrapeable from us — they stay on the `fly-prometheus` datasource.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: kinowo-web
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo.internal:9000']
        labels:
          app: kinowo
  - job_name: kinowo-worker
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo-worker.internal:9000']
        labels:
          app: kinowo-worker

  # UK worker — the UK (kinowo_uk) scrape/enrich pipeline was SPLIT off kinowo-worker
  # onto its own 2x machine (2026-07-17, see fly.worker.uk.toml). Its own Fly app, so
  # its own 6PN target + app label. Its kinowo_worker_* series still carry country="uk"
  # (one WorkerWiring, country-labelled), so they land under the shared $country var.
  - job_name: kinowo-worker-uk
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo-worker-uk.internal:9000']
        labels:
          app: kinowo-worker-uk

  # DE worker — the German (kinowo_de) scrape/enrich pipeline, split onto its own
  # 2x machine (2026-07-17). Its kinowo_worker_* series carry country="de".
  - job_name: kinowo-worker-de
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo-worker-de.internal:9000']
        labels:
          app: kinowo-worker-de

  # filmowo (the recommend app) is a separate Fly app in the SAME org, so its
  # 6PN hostname resolves from here too. Its Node server binds 9002 (not 9000
  # like the kinowo apps) and serves /metrics there. Unlike the kinowo targets,
  # filmowo's /metrics already self-labels app="filmowo" (prom-client default
  # label), so we DON'T add an app label here — doing so would collide and force
  # the metric's own into exported_app. Feeds the "filmowo — Fly health" dashboard.
  - job_name: filmowo
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['filmowo.internal:9002']

  # Multi-country workers: pl+de share the kinowo-worker target above, and uk has
  # its own kinowo-worker-uk target (split 2026-07-17). Each worker tags its
  # kinowo_worker_* series with the `country` label, so per-country dashboard views
  # work regardless of which Fly app produced them. A WEB deployment, by contrast,
  # serves exactly ONE country per Fly app
  # (KINOWO_COUNTRY), so each country is a separate web app + a separate scrape
  # target here. Its /metrics already self-labels `country=…` (see
  # controllers.MetricsController / WebMovieMetrics), and the app label
  # distinguishes the Fly app. showtimes-uk is the UK web app (KINOWO_COUNTRY=uk,
  # London) — it self-labels country="uk", so its kinowo_web_* / kinowo_uptime_*
  # series land alongside the Polish ones under the shared `$country` dashboard var.
  - job_name: showtimes-uk-web
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['showtimes-uk.internal:9000']
        labels:
          app: showtimes-uk

  # DE web app (KINOWO_COUNTRY=de, Frankfurt) — self-labels country="de", so its
  # kinowo_web_* / kinowo_uptime_* series land under the shared $country var.
  - job_name: showtimes-de-web
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['showtimes-de.internal:9000']
        labels:
          app: showtimes-de
