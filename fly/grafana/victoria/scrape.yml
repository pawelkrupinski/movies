# Scrape config for the VictoriaMetrics sidecar baked into the grafana machine
# (see ../Dockerfile + ../start.sh). It pulls the app-emitted Prometheus metrics
# DIRECTLY, every 15s, instead of reading them back from Fly's managed
# Prometheus — which runs ~15-25 min behind real time and occasionally stalls.
#
# Targets are Fly 6PN private hostnames (`<app>.internal`), reachable because
# kinowo-grafana sits in the same org/private network as the apps it scrapes.
# Port 9000 is where BOTH apps expose Prometheus exposition: the web app's whole
# Play server binds 9000 and serves `/metrics` (root fly.toml), and the worker's
# JDK health server binds 9000 likewise (fly.worker.toml [[metrics]]).
#
# Only the kinowo_* / kinowo_worker_* app series live here. Host metrics
# (fly_instance_* / fly_edge_*) are produced solely by Fly's host agent and are
# NOT scrapeable from us — they stay on the `fly-prometheus` datasource.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: kinowo-web
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo.internal:9000']
        labels:
          app: kinowo
  - job_name: kinowo-worker
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['kinowo-worker.internal:9000']
        labels:
          app: kinowo-worker

  # Multi-country: the ONE worker process serves every country and tags each
  # kinowo_worker_* series with a `country` label, so the single kinowo-worker
  # target above already carries all countries — no per-country worker target is
  # needed. A WEB deployment, by contrast, serves exactly ONE country per Fly app
  # (KINOWO_COUNTRY), so a second country means a second web app + a second scrape
  # target here. Its /metrics already self-labels `country=…` (see
  # controllers.MetricsController / WebMovieMetrics), and the app label
  # distinguishes the Fly app. Uncomment + rename when the second web app exists:
  #
  # - job_name: showtimes-uk-web
  #   metrics_path: /metrics
  #   scheme: http
  #   static_configs:
  #     - targets: ['showtimes-uk.internal:9000']
  #       labels:
  #         app: showtimes-uk
