# Residential-proxy egress (Decodo static ISP) for the cinema sites that
# Cloudflare-block our Fly datacenter IP (Multikino, biletyna). NON-SECRET config,
# committed on purpose — the host is public and the ports are just IP selectors.
#
# The credentials are NOT here: KINOWO_PROXY_USER / KINOWO_PROXY_PASS come from
# tools.Env (env var -> -D system property -> .env.local). The proxy stays
# disabled (worker falls back to Zyte/direct) wherever those secrets aren't set.
# See the reference_decodo_isp_proxy memory.
host=isp.decodo.com
ports=10001,10002,10003,10004,10005,10006,10007
