app = 'kinowo'
primary_region = 'waw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # Back to 1gb. 768mb wasn't enough breathing room on Semeru once the
  # full workload (Mongo + Pekko + cinema scrapers + enrichment cycle)
  # was active; 1gb is the comfortable headroom from the Temurin era.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
