app = 'kinowo'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # ALPN over Fly's edge TLS. `h3` advertises HTTP/3 via the `Alt-Svc`
  # header the browser caches on first response; subsequent loads use
  # QUIC, saving a full RTT on cellular handshakes (~50-100 ms on iOS
  # Safari). `h2` + `http/1.1` keep fallback paths intact. Before this
  # change the response had no `Alt-Svc` and the iPhone-Safari beacons
  # showed TTFB ~280 ms on / vs ~85 ms desktop — almost all of that
  # delta is RTT-bound and HTTP/3 0/1-RTT handshakes are the only
  # ALPN-level lever we have here.
  [http_service.tls_options]
    alpn = ['h3', 'h2', 'http/1.1']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # 1 GB on Temurin 25. With the larger heap (Xmx=384m, see Dockerfile)
  # and the pre-allocated Xms=Xmx layout (no GC-grow events under load)
  # the JVM's committed footprint hovers around 600-700 MB at steady
  # state; 1 GB gives the cgroup ~300 MB headroom for kernel + page
  # cache + native allocations during scrape bursts. Was 768 MB,
  # bumped to take pressure off G1 mixed-collection pauses that were
  # spiking page TTFB to ~1.3 s under steady load.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
