app = 'kinowo'
# Stockholm — colocated with the self-hosted Mongo on Fly (also `arn`,
# see `fly/mongo/fly.toml`), so cache rehydrate runs on Fly's private
# network with ~1 ms RTT instead of the cross-region hop we'd see if
# kinowo and kinowo-mongo were in different regions. Fly's nearest region
# to Polish users; no `waw` exists.
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'
  # Per-app JVM sizing (the Dockerfile no longer hardcodes it). web is
  # serving-only — its live heap is dominated by the in-memory MovieCache,
  # which now holds 5 cities' worth of repertoire. A brief pass ran this at a
  # 192m heap inside a 512 MB VM; it OOM-crash-looped there once the corpus
  # grew — anon-RSS ~408 MB tipped the 512 MB cgroup roughly every ~34 min, and
  # the repeated JVM cold-starts pegged the single shared vCPU (that was the
  # "high load"). Heap is back to the known-good 384m (measured RSS ~615 MB,
  # ~231 MB of it non-heap: Play metaspace ~110 MB + code cache ~75 MB + direct
  # + threads/native) inside the 1 GB VM below. Metaspace lifted 128m→160m to
  # match the worker and leave margin as code grows. Xms==Xmx keeps the
  # no-resize-pause layout; G1 50ms + string-dedup carried over (the / page is a
  # ~2 MB HTML string).
  JAVA_OPTS = '-Xms384m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:+UseStringDeduplication -XX:ReservedCodeCacheSize=96m -XX:MaxMetaspaceSize=160m -XX:MaxDirectMemorySize=64m'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # ALPN over Fly's edge TLS. Only `h2` and `http/1.1` are valid here —
  # the field controls TCP TLS handshake protocol negotiation, and HTTP/3
  # runs over QUIC/UDP (separate listener). Fly's edge advertises h3 via
  # the `Alt-Svc` response header when the org/app has HTTP/3 enabled at
  # the proxy level; that's the configuration knob for "HTTP/3 on iOS
  # Safari," not this `alpn` array.
  [http_service.tls_options]
    alpn = ['h2', 'http/1.1']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # 1 GB / 1 shared vCPU (shared-cpu-1x). Briefly ran at 512 MB after
  # scraping/enrichment moved to kinowo-worker, but the serving JVM OOM-crash-
  # looped there once the MovieCache grew to 5 cities (anon-RSS ~408 MB vs the
  # 512 MB cgroup, ~every 34 min) — the repeated cold-starts pegged the single
  # vCPU and spiked load. Back to 1 GB; the 384m-heap JVM commits ~615 MB RSS
  # with real headroom. NOTE: a previous pass ran this at 2 vCPUs because web's
  # MovieCache consumes the Mongo change stream and the worker's continuous
  # scrape write stream could peg a single shared vCPU; if that unresponsiveness
  # returns, the 2nd vCPU is the lever. cpu_kind stays shared.
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'

# Fly's managed Prometheus scrapes this over the private network and ships the
# series to api.fly.io/prometheus/personal — the same datasource the self-hosted
# Grafana (fly/grafana) already reads. MetricsController serves it on the app's
# own internal port (9000), exposing the in-app /uptime health (Mongo, invisible
# to Fly's host-only metrics) so Grafana can alert on a service failing silently
# behind a fallback — the residential-proxy → Zyte case.
[[metrics]]
  port = 9000
  path = '/metrics'
