app = 'kinowo'
primary_region = 'waw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # Bumped from 512mb → 1gb on 2026-05-19. JVM RSS settled at ~400 MB
  # working-set after the auth feature (Phases A-D) added the User /
  # UserState repos + OAuth + REST. With the kernel slab + Fly's runtime
  # overhead the 512mb cgroup was OOM-killing the JVM every ~5 min in a
  # restart loop; the architectural fix (shared MongoClient + JVM caps)
  # dropped total-vm by 1.1 GB but couldn't shrink the actual working
  # set below the cgroup ceiling. 1gb gives ~600 MB headroom and stops
  # the cycle.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
