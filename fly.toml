app = 'kinowo'
primary_region = 'waw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # Back to 512mb after switching the prod JVM to IBM Semeru (OpenJ9).
  # OpenJ9 typically uses 20-40% less RSS than HotSpot/Temurin for the
  # same Play/Pekko workload — more compact class metadata, smaller
  # default JIT code cache reservation, gencon GC ergonomics. The 1gb
  # bump that fixed the OOM cycle on Temurin is no longer load-bearing;
  # if RSS stays comfortably under 400 MB on Semeru we can run on the
  # smaller machine. Roll back to 1gb here if Semeru turns out not to
  # save enough.
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
