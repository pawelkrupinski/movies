app = 'kinowo'
# Stockholm — colocated with the self-hosted Mongo on Fly (also `arn`,
# see `fly/mongo/fly.toml`), so cache rehydrate runs on Fly's private
# network with ~1 ms RTT instead of the cross-region hop we'd see if
# kinowo and kinowo-mongo were in different regions. Fly's nearest region
# to Polish users; no `waw` exists.
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'
  # Per-app JVM sizing (the Dockerfile no longer hardcodes it). web is
  # serving-only now — no scrapers/enrichment/clients — so its live heap is
  # dominated by the small in-memory MovieCache. Measured RSS at the old 384m
  # heap was ~615 MB (~231 MB of that is non-heap: Play metaspace ~110 MB +
  # code cache ~75 MB + direct + threads/native). Halving the heap to 192m
  # lands RSS ~420 MB, comfortably inside the 512 MB VM below. Xms==Xmx keeps
  # the no-resize-pause layout; G1 50ms + string-dedup carried over (the / page
  # is a ~2 MB HTML string).
  JAVA_OPTS = '-Xms192m -Xmx192m -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:+UseStringDeduplication -XX:ReservedCodeCacheSize=96m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=64m'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # ALPN over Fly's edge TLS. Only `h2` and `http/1.1` are valid here —
  # the field controls TCP TLS handshake protocol negotiation, and HTTP/3
  # runs over QUIC/UDP (separate listener). Fly's edge advertises h3 via
  # the `Alt-Svc` response header when the org/app has HTTP/3 enabled at
  # the proxy level; that's the configuration knob for "HTTP/3 on iOS
  # Safari," not this `alpn` array.
  [http_service.tls_options]
    alpn = ['h2', 'http/1.1']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # 512 MB — halved from 1 GB once scraping/enrichment moved to kinowo-worker.
  # The serving JVM (192m heap, see JAVA_OPTS) commits ~420 MB RSS, leaving
  # ~90 MB for kernel + page cache. cpu_kind/cpus stay at the shared-1 minimum
  # (web is near-idle: load avg ~0). Bump back up if a Playwright/load pass or
  # a traffic spike shows GC thrash or OOM.
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
