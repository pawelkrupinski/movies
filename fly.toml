app = 'kinowo'
# Frankfurt — Fly has no Dublin region, so colocation with the Atlas
# cluster (aws/eu-west-1, Dublin) lands on the closest substitute: ~20 ms
# Mongo RTT instead of the ~30 ms arn → Dublin hop. Frankfurt is also
# closer to PL users than Stockholm (~25 ms vs ~30–40 ms), so the move
# wins on both axes — anonymous + logged-in pageviews alike.
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '9000'

[http_service]
  internal_port = 9000
  force_https = true
  # Keep at least one machine running so users never pay a cold-start hit;
  # auto_stop disabled so Fly doesn't try to scale to zero on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # ALPN over Fly's edge TLS. Only `h2` and `http/1.1` are valid here —
  # the field controls TCP TLS handshake protocol negotiation, and HTTP/3
  # runs over QUIC/UDP (separate listener). Fly's edge advertises h3 via
  # the `Alt-Svc` response header when the org/app has HTTP/3 enabled at
  # the proxy level; that's the configuration knob for "HTTP/3 on iOS
  # Safari," not this `alpn` array.
  [http_service.tls_options]
    alpn = ['h2', 'http/1.1']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  # 1 GB on Temurin 25. With the larger heap (Xmx=384m, see Dockerfile)
  # and the pre-allocated Xms=Xmx layout (no GC-grow events under load)
  # the JVM's committed footprint hovers around 600-700 MB at steady
  # state; 1 GB gives the cgroup ~300 MB headroom for kernel + page
  # cache + native allocations during scrape bursts. Was 768 MB,
  # bumped to take pressure off G1 mixed-collection pauses that were
  # spiking page TTFB to ~1.3 s under steady load.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'
