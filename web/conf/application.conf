# ── Application ───────────────────────────────────────────────────────────────
play.http.secret.key = "changeme-use-a-long-random-string-in-production"
play.http.secret.key = ${?APPLICATION_SECRET}

# Static assets are versioned in their filename (e.g.
# `bootstrap-5.3.3.min.css`); a future version bump gets a new URL, so we
# can mark them immutable + cache them forever. Play's default
# `max-age=3600` was forcing iPhone Safari to re-validate Bootstrap on
# every cold-ish hit, which is exactly the cross-origin handshake we
# self-hosted Bootstrap to avoid.
play.assets.defaultCache = "public, max-age=31536000, immutable"

play.server.http.port = 9000
play.server.http.port = ${?PORT}

# Bind on every interface — Fly's edge proxy reaches the app on the container's
# private IP, so 127.0.0.1 alone would refuse the connection. Play 3.0 defaults
# to 0.0.0.0 but we set it explicitly so a future Play upgrade can't quietly
# flip it back to localhost.
play.server.http.address = "0.0.0.0"
play.server.http.address = ${?HTTP_ADDRESS}

# Trust Fly's edge proxy: TLS terminates at the Fly edge, the container
# receives plain HTTP plus `X-Forwarded-Proto: https` / `X-Forwarded-Host`.
# Without this, `request.secure` is always false inside the container and
# the OAuth callback URL we hand to Google becomes
# `http://kinowo.fly.dev/...` — a `redirect_uri_mismatch` against the
# `https://` URI registered in Cloud Console. Trust any source IP since
# our container isn't directly internet-reachable (Fly's edge is the only
# ingress).
play.http.forwarded.version        = "x-forwarded"
play.http.forwarded.trustedProxies = ["0.0.0.0/0", "::/0"]

play.filters.hosts {
  # Fly's health check hits the container at its rotating internal IPv4
  # (e.g. `172.19.26.106` on the original ams machine, `172.19.36.178` on
  // a newly-cloned fra machine, …). Listing each IP literally is brittle —
  # any new machine / region move fails the health check until the file is
  # updated and redeployed. Play's host filter doesn't support CIDR, but a
  # bare "." matches any host with at least one dot, which covers every
  # IPv4 + every dotted hostname (the only host without a dot we'd ever
  # legitimately see is "localhost"). The filter still rejects header-only
  # spoof attempts that don't contain a dot, and Fly's edge is the only
  # ingress for everything else anyway.
  allowed = [
    ".",
    "localhost"
  ]
}

play.filters.cors {
  allowedOrigins    = null   # null = allow all; list specific origins in production
  allowedHttpMethods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allowedHttpHeaders = null
}

# ── MongoDB ────────────────────────────────────────────────────────────────────
mongodb {
  uri      = "mongodb://localhost:27017"
  uri      = ${?MONGODB_URI}           # override with env var in production
  database = "scala_play_db"
  database = ${?MONGODB_DATABASE}
}

# ── Compile-time DI ───────────────────────────────────────────────────────────
# Replaces Guice. The single wiring class lives in app/modules/AppLoader.scala.
play.application.loader = "modules.AppLoader"

# ── Logging ────────────────────────────────────────────────────────────────────
play.logger.includeConfigProperties = true
