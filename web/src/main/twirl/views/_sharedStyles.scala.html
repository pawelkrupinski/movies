@(devMode: Boolean = false)
@_minified(devMode) {
<style>
  /* touch-action: manipulation suppresses iOS Safari's double-tap-to-zoom on
     every tap target on the page (rapid presses on time badges, date arrows,
     the Filtry reset, etc. register as separate clicks) while leaving
     pinch-zoom intact. */
  html { touch-action: manipulation; }
  body { background: #111; color: #eee; overflow-x: hidden; }

  /* ── Bootstrap 5.3.3 subset (the full stylesheet was dropped) ─────────────
     Bootstrap used to load as a render-blocking <link> in every page <head>
     purely for the reboot defaults + grid + the handful of utilities below.
     These are the verbatim 5.3.3 rules for every Bootstrap class the templates
     actually use (audited across all `*.scala.html` + `shared.js`), inlined so
     first paint no longer waits on a second CSS request. Copying the real
     values means the render is unchanged. If a new template needs another
     Bootstrap class, add its rule here — don't re-add the stylesheet. */
  /* Reboot — global defaults the whole app silently relied on. Without these
     it loses border-box sizing and falls back to the serif UA font. */
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    font-size: 1rem; font-weight: 400; line-height: 1.5;
    -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
  }
  h1, h2, h3, h4, h5, h6 { margin-top: 0; margin-bottom: .5rem; font-weight: 500; line-height: 1.2; }
  p { margin-top: 0; margin-bottom: 1rem; }
  ul, ol { margin-top: 0; margin-bottom: 1rem; }
  a { color: #0d6efd; text-decoration: underline; }
  img, svg { vertical-align: middle; }
  /* Form-control reboot — MUST cover input/select/textarea, not just button:
     older WebKit (the CI Safari engine) ignores a cascaded font-size on a
     `<select>` unless this `font: inherit` reboot opts it in, so `#date-filter`
     rendered at the UA 16px instead of the navbar's scaled size. Newer local
     WebKit honours it without the reboot, which is why this only failed on CI. */
  button, input, optgroup, select, textarea { margin: 0; font-family: inherit; font-size: inherit; line-height: inherit; }
  button, select { text-transform: none; }
  button, [type="button"], [type="reset"], [type="submit"] { -webkit-appearance: button; }
  button, [role="button"] { cursor: pointer; }
  textarea { resize: vertical; }
  /* Grid — the film listing (.row + .row-cols-* + gutters) and the /film
     two-column layout (.col-auto poster + .col details). */
  .container, .container-fluid { width: 100%; padding-right: calc(var(--bs-gutter-x, 1.5rem) * .5); padding-left: calc(var(--bs-gutter-x, 1.5rem) * .5); margin-right: auto; margin-left: auto; }
  @@media (min-width: 576px)  { .container { max-width: 540px; } }
  @@media (min-width: 768px)  { .container { max-width: 720px; } }
  @@media (min-width: 992px)  { .container { max-width: 960px; } }
  @@media (min-width: 1200px) { .container { max-width: 1140px; } }
  @@media (min-width: 1400px) { .container { max-width: 1320px; } }
  .row {
    --bs-gutter-x: 1.5rem; --bs-gutter-y: 0;
    display: flex; flex-wrap: wrap;
    margin-top: calc(-1 * var(--bs-gutter-y));
    margin-right: calc(-.5 * var(--bs-gutter-x));
    margin-left: calc(-.5 * var(--bs-gutter-x));
  }
  .row > * { flex-shrink: 0; width: 100%; max-width: 100%; padding-right: calc(var(--bs-gutter-x) * .5); padding-left: calc(var(--bs-gutter-x) * .5); margin-top: var(--bs-gutter-y); }
  .col { flex: 1 0 0%; }
  .col-auto { flex: 0 0 auto; width: auto; }
  .row-cols-2 > * { flex: 0 0 auto; width: 50%; }
  @@media (min-width: 576px)  { .row-cols-sm-3 > * { flex: 0 0 auto; width: 33.33333333%; } }
  @@media (min-width: 768px)  { .row-cols-md-4 > * { flex: 0 0 auto; width: 25%; } }
  @@media (min-width: 992px)  { .row-cols-lg-5 > * { flex: 0 0 auto; width: 20%; } }
  @@media (min-width: 1200px) { .row-cols-xl-6 > * { flex: 0 0 auto; width: 16.66666667%; } }
  .g-3 { --bs-gutter-x: 1rem; --bs-gutter-y: 1rem; }
  .g-4 { --bs-gutter-x: 1.5rem; --bs-gutter-y: 1.5rem; }
  /* Button base — the Filtry / date-arrow / Wyczyść buttons are
     `.btn .refresh-btn .btn-sm`: `.refresh-btn` paints bg/border/colour/height,
     the `.btn` pair supplies padding, radius, font-size and cursor. */
  .btn { display: inline-block; padding: .375rem .75rem; font-size: 1rem; font-weight: 400; line-height: 1.5; text-align: center; text-decoration: none; vertical-align: middle; cursor: pointer; user-select: none; border: 1px solid transparent; border-radius: .375rem; }
  .btn-sm { padding: .25rem .5rem; font-size: .875rem; border-radius: .25rem; }
  /* Utilities — Bootstrap generates these with !important; kept so override
     behaviour against the project's own rules is identical. */
  .d-flex { display: flex !important; }
  .align-items-center  { align-items: center !important; }
  .align-items-stretch { align-items: stretch !important; }
  .justify-content-between { justify-content: space-between !important; }
  .gap-1 { gap: .25rem !important; }
  .gap-3 { gap: 1rem !important; }
  .px-1 { padding-right: .25rem !important; padding-left: .25rem !important; }
  .px-4 { padding-right: 1.5rem !important; padding-left: 1.5rem !important; }
  .py-3 { padding-top: 1rem !important; padding-bottom: 1rem !important; }
  .py-4 { padding-top: 1.5rem !important; padding-bottom: 1.5rem !important; }
  .py-5 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
  .mb-3 { margin-bottom: 1rem !important; }
  .mb-4 { margin-bottom: 1.5rem !important; }
  .mb-5 { margin-bottom: 3rem !important; }
  .w-100 { width: 100% !important; }
  .text-center { text-align: center !important; }
  .text-secondary { color: #6c757d !important; }
  .fw-bold { font-weight: 700 !important; }
  .fs-5 { font-size: 1.25rem !important; }

  /* The `--mobile-scale` / `--mobile-scale-px` variables defined in `_pillStyles` linearly
     interpolate 0.85 → 1.0 between 320 px and 575 px viewport. */
  /* Sticky so the filter bar stays on-screen as the user scrolls
     through a long film grid (200+ cards on /). Was `position:
     relative` — scrolling past the first viewport hid the navbar
     and the only way back to the date / search controls was to
     scroll all the way up. `z-index: 10` keeps it above film cards
     and modal backdrops. */
  /* The navbar owns its own flex layout (rather than relying solely on the
     `.navbar .d-flex .align-items-center` classes on the element). Historically
     this guarded against Bootstrap loading late (cold load / slow link) leaving
     the avatar pill at its block height and off-centre — the "logged-in icon
     misaligned" report. Bootstrap's utilities are now inlined just above (same
     first-paint <style>), so the timing risk is gone, but keeping the navbar's
     flex on its own rule means the row is correct regardless of class ordering.
     `justify-content: space-between` preserves what Bootstrap's `.navbar` gave. */
  .navbar { background: #1a1a2e; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; gap: .4rem; }
  .navbar-logo { flex-shrink: 0; }
  .card {
    background: #1e1e2e;
    border: none;
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
    transition: transform .2s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); }
  .poster-wrap {
    position: relative;
    padding-top: 148%;
    background: #2a2a3e;
    overflow: hidden;
  }
  .poster-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .no-poster {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    color: #99a;
    font-style: italic;
    letter-spacing: .03em;
  }
  .card-body { padding: var(--card-body-pad, 1rem); }
  .card-title { min-height: 2.5rem; display: flex; flex-wrap: wrap; align-items: baseline; column-gap: .3rem; overflow-wrap: break-word; }
  .card-title a { font-size: .95rem; font-weight: 600; color: #fff; text-decoration: none; min-width: 0; }
  .card-title a:hover { color: #aad4ff; }
  .pill { background: #252540; border: 1px solid #3a3a6e; border-radius: 3px; padding: 0 5px; font-size: .72rem; color: #99b; white-space: nowrap; }
  .runtime { font-size: .75rem; color: #888; }
  .year { font-size: .75rem; color: #888; background: transparent; border: none; }
  /* Genre pill — identical to the runtime pill so the metadata row
     reads as a single cluster. Rendered as an <a> linking to the genre's
     /filmy browse page; strip the default link chrome so it still reads as
     a pill, and brighten on hover to signal it's tappable. */
  .pill.genre { font-size: .75rem; color: #888; text-decoration: none; }
  a.pill.genre:hover { color: #aad4ff; border-color: #4a4a8e; }
  .date-label { font-size: .7rem; color: #888; margin-bottom: var(--gap-date-cinema, .2rem); margin-top: var(--gap-ratings-date, .5rem); }
  #room-tooltip {
    position: fixed;
    background: #0e0e1e;
    color: #ccc;
    font-size: .68rem;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid #3a3a6e;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  /* Unified 35 px height across every navbar tappable: nav-tabs,
     refresh-btn (Filtry / hidden-films flyout), date-nav-btn arrows,
     filter-select, search-input, login pill, auth menu. Tall enough
     to tap reliably on touch (35 is a comfortable middle ground
     between Apple HIG's 44 and the visually-compact 29 the page used
     to ship), short enough to keep the navbar from feeling chunky
     on desktop. `inline-flex + align-items: center` is what vertically
     centres the content inside the box — particularly the dynamic
     "X ukrytych" label on the hidden-films flyout, which used to
     sit at the top of the button. */
  /* `.refresh-btn` (Filtry) + `.filter-select` (date dropdown) sit
     shoulder-to-shoulder on every page — the date select on row 2 of
     the mobile navbar, the Wyczyść/Filtry pair in the desktop cluster.
     A native `<select>` carries OS-painted chrome (the dropdown
     caret, a 1-2 px top/bottom inset on iOS Safari) that pushed it a
     hair taller than a sibling `<button class="refresh-btn">` with
     just `min-height: 35px`. Pin both to a concrete `height` +
     `box-sizing: border-box` so the row is uniform regardless of UA. */
  .refresh-btn { background: #3a3a6e; border: none; color: #aad4ff; white-space: nowrap; flex-shrink: 0; height: 35px; box-sizing: border-box; display: inline-flex; align-items: center; justify-content: center; }
  .refresh-btn:hover { background: #5a5a9e; color: #fff; }
  .date-nav-btn { padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; touch-action: manipulation; height: 35px; box-sizing: border-box; min-width: 35px; }
  .filter-select {
    background: #3a3a6e;
    color: #aad4ff;
    border: none;
    border-radius: 6px;
    padding: .25rem .5rem;
    font-size: .875rem;
    cursor: pointer;
    flex-shrink: 0;
    height: 35px;
    box-sizing: border-box;
  }
  .filter-select:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; }
  .search-input {
    background: #3a3a6e;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: .25rem .6rem;
    font-size: .875rem;
    width: 160px;
    min-height: 35px;
  }
  .search-input::placeholder { color: #778; }
  .search-input:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; width: 220px; }
  /* Tablet portrait (iPad Pro 11" = 834px, iPad Air/mini, iPad Pro 12.9"
     = 1024px) runs the DESKTOP navbar layout — one wrapping row of
     [tabs] [search] [date] [Filtry] [auth]. At these widths the right
     cluster already fills the row, so the 160→220px focus growth tips
     the navbar over its width budget and `flex-wrap` shoves the date
     stepper onto a second line the instant the search box is tapped.
     Pin the focused width to the rest width across the tablet-portrait
     band so focus never wraps the row; wide desktops (≥1025px) keep the
     expansion since they have the slack to absorb it. Locked by
     navbar-layout.spec.ts. */
  @@media (min-width: 576px) and (max-width: 1024px) { .search-input:focus { width: 160px; } }
  @@media (max-width: 575px) { .search-input, .search-input:focus { width: 90px; } }
  @@media (max-width: 379px) { .search-input, .search-input:focus { width: 55px; } }
  /* Row-1 items (logo+tabs 152 px + search 55 px + auth 79 px = 286 px)
     overflow below ~290 px. Hide search so the remaining items
     (152 + 79 = 231 px) fit comfortably. Below 235 px even those
     two overflow, so the logo clips via max-width. */
  @@media (max-width: 290px) {
    .navbar-search { display: none; }
    nav.navbar { padding: 0 !important; column-gap: 0 !important; row-gap: calc(.05 * var(--mobile-scale)) !important; }
    .navbar > div:first-child { max-width: 60% !important; overflow: hidden; }
    .navbar-auth { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40% !important; }
    .navbar-date { max-width: 60% !important; overflow: hidden; }
    .navbar-filtry { max-width: 40% !important; }
  }

  /* `#date-filter` is the day-picker `<select>`. Its natural width is
     driven by the widest option ("Następne 7 dni" / "Pią 29 maja" /
     etc.). On mobile it shares row 2 with Filtry; rather than a fixed
     `max-width` cap (which clipped the selected label on every phone
     ≤575px, even roomy ones), the select flex-shrinks — see the
     `.navbar-date` rule in the portrait block below. It shows its
     full label when the row has slack and only ellipsizes when the
     row genuinely overflows.

     Exception, the narrowest phones (≤379px): `flex-shrink` doesn't save
     row 2 there, because flexbox WRAPS to a new line before it shrinks an
     item — so a full-width select + a maxed-out Filtry label spill into a
     3rd row (navbar-overflow test). Cap the select at those widths so the
     two stay on one row. Roomier phones (390px+, where the day-selector
     no-clip test lives) keep the uncapped flex-shrink behaviour. */
  @@media (max-width: 379px) { #date-filter { max-width: 6.5rem; } }
  .hide-btn {
    position: absolute;
    top: 6px; right: 6px;
    z-index: 10;
    background: rgba(0,0,0,.55);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: .75rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .dropdown-panel {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-radius: 8px;
    padding: 8px;
    z-index: 1000;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    min-width: 220px;
    max-width: calc(100vw - 1rem);
    max-height: 70vh;
    overflow-y: auto;
  }
  .panel-item {
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: .8rem;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .panel-item:hover { background: #3a3a6e; }
  .panel-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: .8rem;
    color: #eee;
    border-radius: 4px;
  }
  .panel-label:hover { background: #3a3a6e; }
  .panel-divider { border-top: 1px solid #3a3a6e; margin: 6px 0; padding-top: 2px; }
  /* Scrollbars inside dark popups (the Filtry dropdown and the hidden-films
     modal list). Default OS scrollbars render light-grey-on-dark and stick
     out against the navy palette; this re-skins them to match the existing
     border / hover accents (`#3a3a6e` → `#5a5a9e`). Transparent track so
     the rule works regardless of the host's bg (`#1e1e2e` for the dropdown,
     `#1a1a2e` for the modal). `scrollbar-color` covers Firefox, the
     `::-webkit-scrollbar*` block covers Chromium + WebKit. */
  .dropdown-panel,
  .hidden-modal-list { scrollbar-width: thin; scrollbar-color: #3a3a6e transparent; }
  .dropdown-panel::-webkit-scrollbar,
  .hidden-modal-list::-webkit-scrollbar { width: 8px; height: 8px; }
  .dropdown-panel::-webkit-scrollbar-track,
  .hidden-modal-list::-webkit-scrollbar-track { background: transparent; }
  .dropdown-panel::-webkit-scrollbar-thumb,
  .hidden-modal-list::-webkit-scrollbar-thumb { background: #3a3a6e; border-radius: 4px; }
  .dropdown-panel::-webkit-scrollbar-thumb:hover,
  .hidden-modal-list::-webkit-scrollbar-thumb:hover { background: #5a5a9e; }
  .panel-section-label {
    font-size: .65rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 8px 2px;
  }
  .submenu-row { justify-content: space-between; }
  .submenu-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .submenu-row-count {
    background: #5a5a9e; color: #fff; font-size: .65rem; font-weight: 600;
    min-width: 18px; height: 18px; line-height: 18px; text-align: center;
    border-radius: 9px; padding: 0 5px;
  }
  .submenu-film-count { margin-left: auto; font-size: .7rem; color: #888; }
  .submenu-chevron {
    display: inline-block; font-size: 1rem; color: #888;
    transition: transform .15s ease;
  }
  .submenu-chevron.open { transform: rotate(90deg); }
  .submenu-list { max-height: 40vh; overflow-y: auto; }
  .nav-tab {
    color: #aad4ff;
    text-decoration: none;
    font-size: .875rem;
    padding: .25rem .6rem;
    border-radius: 6px;
    /* iOS Safari otherwise pops up the text-selection / link-context
       sheet on long-press, even on `<a>` tabs that should activate
       on tap-release. Disabling user-select + touch-callout makes
       the tap unambiguous. Doesn't affect keyboard focus / a11y.
       `-webkit-user-select` is for iOS ≤ 16. */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    /* 35 px tap target with the label vertically centred. */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 35px;
  }
  /* Gate `:hover` behind `hover: hover` so iOS/Android don't park a sticky
     post-tap hover on a tab the user just left. */
  @@media (hover: hover) and (pointer: fine) {
    .nav-tab:hover { background: #3a3a6e; color: #fff; }
    .nav-tab-login:hover { background: #5a5a9e; color: #fff; }
  }
  .nav-tab.active { background: #3a3a6e; color: #fff; }
  /* ── Auth pill / dropdown / login modal ──────────────────────────────── */
  .nav-tab-login {
    cursor: pointer;
    border: none;
    /* `font: inherit` resets the browser's button font (the OS
       caption font on most platforms) so the pill picks up the
       navbar's typeface. The explicit `font-size: .875rem` below
       then locks it to the same 14 px size as sibling `.nav-tab`
       links — without it the pill would render at the navbar's
       1 rem (16 px) default and the test in
       `navbar-uniformity.spec.ts` flags the size mismatch.
       `.nav-tab` already sets min-height: 35px + inline-flex
       centering; login pill picks both up via the shared class. */
    font: inherit;
    font-size: .875rem;
    background: #3a3a6e;
    color: #aad4ff;
    padding: .2rem .7rem;
  }

  /* The "logged in" pill — avatar + first name, click toggles a dropdown
     anchored below it. Position:relative so the absolute-positioned
     dropdown has the right anchor. */
  .auth-menu {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    background: #3a3a6e;
    color: #aad4ff;
    border-radius: 6px;
    padding: .15rem .55rem .15rem .25rem;
    font-size: .875rem;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    /* 28px is the MOBILE control height — make it the BASE so the pill aligns
       with the search box even if the max-width:575px media block that pins the
       other controls doesn't win (the avatar pill was the only control with a
       35px base, so when that block didn't apply it stuck out taller than
       search). Desktop bumps back to 35px in the min-width:576px block below. */
    min-height: 28px;
  }
  .auth-menu:hover { background: #5a5a9e; color: #fff; }
  /* `flex: 0 0 auto` + explicit `min-width/min-height` are load-bearing, not
     belt-and-braces: the avatar is a flex item of `.auth-menu`
     (display:inline-flex), and a flex item's default `min-width/min-height:auto`
     resolves to a REPLACED element's intrinsic size — so a real (large) avatar
     photo overrides `width/height:22px` and balloons the pill. Pinning the
     min-size to 22px is what holds it to a 22px circle on iOS Safari. The
     <img> avatar and the text-initial fallback are the same 22px circle, so
     they share the size pin + round clip; each then adds only its own paint. */
  .auth-avatar,
  .auth-avatar-fallback {
    width: 22px; height: 22px;
    min-width: 22px; min-height: 22px;
    max-width: 22px; max-height: 22px;
    flex: 0 0 auto;
    border-radius: 50%;
  }
  .auth-avatar { object-fit: cover; display: block; }
  .auth-avatar-fallback {
    background: #1a1a2e; color: #ffd24a;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 600;
  }
  /* Truncate long display names with an ellipsis so the auth pill
     can't grow without bound and force navbar wraps. On desktop a
     14 ch cap covers compound Polish names ("Aleksandra-Anna…"); on
     mobile (portrait + landscape) the row budget is too tight even
     at 14 ch, so the name disappears entirely there — the avatar +
     dropdown still surface "who am I logged in as", and the
     remaining row width goes to search / date / Filtry. */
  .auth-name {
    font-size: .875rem;
    max-width: 14ch;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @@media (max-width: 575px),
         (max-height: 500px) and (orientation: landscape) {
    .auth-name { display: none; }
  }
  .auth-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-radius: 8px;
    padding: 6px;
    min-width: 160px;
    display: none;
    z-index: 50;
  }
  .auth-menu.open .auth-dropdown { display: block; }
  .auth-logout-form { margin: 0; }
  .auth-logout-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: #eee;
    text-align: left;
    padding: .4rem .6rem;
    cursor: pointer;
    border-radius: 6px;
    font-size: .875rem;
    min-height: 35px;
    display: flex;
    align-items: center;
  }
  .auth-logout-btn:hover { background: #3a3a6e; color: #fff; }

  /* Login modal — full-viewport dimmed backdrop, centred card. The backdrop
     is the click-outside-to-close handler; the card has stopPropagation on
     its own click so the bubbling doesn't fire-close. */
  .login-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  .login-modal-backdrop.open { display: flex; }
  .login-modal {
    background: #1a1a2e;
    border: 1px solid #3a3a6e;
    border-radius: 12px;
    padding: 1.5rem 1.6rem 1.4rem;
    max-width: 360px;
    width: 92%;
    position: relative;
  }
  .login-modal-title { font-size: 1.2rem; font-weight: 600; margin-bottom: .5rem; }
  .login-modal-sub   { font-size: .85rem; color: #aab; margin-bottom: 1.1rem; }
  .login-modal-close {
    position: absolute;
    top: .4rem; right: .55rem;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
  }
  .login-modal-close:hover { color: #fff; }
  .login-modal-buttons { display: flex; flex-direction: column; gap: .55rem; }

  /* Hidden-films modal — same backdrop/card structure as login, but the
     body is a scrollable list of titles. Reuses `.login-modal-close`
     and `.login-modal-title`; the card-level styling needs its own
     class because the layout adds a list container + a footer button. */
  .hidden-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  .hidden-modal-backdrop.open { display: flex; }
  .hidden-modal {
    background: #1a1a2e;
    border: 1px solid #3a3a6e;
    border-radius: 12px;
    padding: 1.4rem 1.4rem 1.1rem;
    max-width: 420px;
    width: 92%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Search box pinned above the list (flex-column, only the list
     scrolls). Mirrors the navbar `.search-input` palette so the two
     search affordances feel like the same thing. */
  .hidden-modal-search {
    background: #3a3a6e;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: .25rem .6rem;
    font-size: .875rem;
    width: 100%;
    margin-top: .6rem;
    min-height: 35px;
    flex-shrink: 0;
  }
  .hidden-modal-search::placeholder { color: #778; }
  .hidden-modal-search:focus { outline: none; box-shadow: 0 0 0 2px #5a5a9e; }
  /* List body scrolls when there are more titles than fit; the bottom
     "Wyczyść" stays pinned because the card is a flex column. */
  .hidden-modal-list {
    overflow-y: auto;
    margin: .35rem -.4rem .9rem;
    padding: 0 .4rem;
  }
  .hidden-modal-list .panel-item {
    /* Inside the modal the item can use the full available width
       (vs. the original dropdown which capped at 280 px). */
    max-width: none;
  }
  .hidden-modal-actions { display: flex; gap: .55rem; }

  /* Small count badge on the "Ukryte filmy" row inside Filtry. */
  .hidden-row-count {
    font-size: .7rem;
    color: #aab;
    background: #3a3a6e;
    border-radius: 10px;
    padding: 1px 8px;
    min-width: 22px;
    text-align: center;
  }
  .login-btn {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .65rem .9rem;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: filter .12s;
  }
  .login-btn:hover { filter: brightness(1.1); }
  .login-btn-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 1rem;
  }
  .login-btn-google   { background: #fff; color: #222; }
  .login-btn-google .login-btn-icon   { background: #4285F4; color: #fff; }
  .login-btn-facebook { background: #1877F2; color: #fff; }
  .login-btn-facebook .login-btn-icon { background: #fff;     color: #1877F2; }

  /* Anonymous nag toast — shown at most once per 24h when an anonymous
     user adds their first favourite/hide of the day. Click body → opens
     the login modal. Self-dismisses after 8s. Pinned to the viewport's
     bottom-right so it doesn't compete with the navbar above. */
  .anon-nag-toast {
    position: fixed;
    bottom: 16px; right: 16px;
    max-width: 380px;
    background: #1e1e2e;
    border: 1px solid #3a3a6e;
    border-left: 3px solid #ffd24a;
    border-radius: 8px;
    padding: .65rem .9rem .65rem .8rem;
    color: #eee;
    font-size: .85rem;
    line-height: 1.35;
    display: none;
    z-index: 150;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    cursor: pointer;
  }
  .anon-nag-toast.open { display: block; }
  .anon-nag-toast strong { color: #ffd24a; }
  .anon-nag-toast .anon-nag-close {
    position: absolute;
    top: 2px; right: 6px;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 6px;
  }
  .anon-nag-toast .anon-nag-close:hover { color: #fff; }
  /* Desktop layout: tabs on the left; search-date / Filtry / auth as one
     right-aligned cluster. `margin-left: auto` on the leftmost member
     of the right cluster (search) absorbs the empty space between
     tabs and the cluster. Search + date stay visually adjacent on
     desktop (consecutive orders, date with no left margin).
     The hidden-films entry point used to be its own navbar pill —
     it now lives inside Filtry as a top row, so there's no
     `.navbar-hidden` slot anymore. */
  .navbar-search    { order: 1; margin-left: auto; }
  .navbar-date      { order: 2; }
  .navbar-filtry    { order: 3; }
  /* `display:flex; align-items:center` is load-bearing, not cosmetic: the
     child `.auth-menu` is `display:inline-flex`, so in a plain block wrapper
     it sits on the text baseline and the wrapper reserves line-height
     descender space BELOW it — making `.navbar-auth` ~3px taller than the
     28px pill, with the pill pinned to the wrapper's top. The navbar then
     centres that too-tall wrapper, leaving the pill ~1.5px ABOVE the search
     box's midline (invisible at 100%, obvious under pinch-zoom on Safari).
     Flex-centring collapses the wrapper to the pill's exact height so the
     pill shares the search box's midline. Locked by navbar-layout.spec.ts. */
  .navbar-auth      { order: 4; display: flex; align-items: center; }
  .navbar-row-break { display: none; }

  @@media (min-width: 576px) {
    .navbar { padding-top: .25rem; padding-bottom: .25rem; }
    .container-fluid { padding-top: .75rem !important; }
    /* Desktop control height — the avatar pill matches the 35px nav controls
       here (its base is the 28px mobile height; see `.auth-menu` above). */
    .auth-menu { min-height: 35px; }
  }

  /* The Debug tab is a dev-mode-only link. On mobile (both portrait
     and landscape) it pushes the navbar over its width budget on the
     narrow phones — and the page it links to is keyboard-shortcut
     heavy anyway, not useful on touch. Hide on both mobile arms. */
  @@media (max-width: 575px),
         (max-height: 500px) and (orientation: landscape) {
    .nav-tab-debug { display: none; }
    .container-fluid { padding-top: .375rem !important; }
  }

  @@media (max-width: 575px) {
    /* Every text-bearing navbar control rides `--mobile-scale` — fonts
       and horizontal paddings shrink with the viewport so the row
       never overflows on iPhone-mini-class widths, then climb back to
       the desktop ceiling at the breakpoint top. Single scale knob =
       uniform ratios between the navbar and the grid beneath it. */
    .navbar {
      padding: calc(.5 * var(--mobile-scale)) min(calc(.75 * var(--mobile-scale)), 2.5vw) !important;
      gap: calc(.2 * var(--mobile-scale));
      --navbar-fs: calc(.875 * var(--mobile-scale));
      --navbar-px: min(calc(.6 * var(--mobile-scale)), 2.5vw);
    }
    .navbar-logo { gap: min(1rem, 3vw) !important; }
    .navbar > div:first-child {
      height: 28px;
      max-height: 28px;
      overflow: visible;
    }
    .navbar .nav-tab,
    .navbar .nav-tab-login,
    .navbar .refresh-btn,
    .navbar .auth-name {
      font-size: var(--navbar-fs);
      padding-left:  var(--navbar-px);
      padding-right: var(--navbar-px);
    }
    .navbar .date-nav-btn { font-size: calc(1.1 * var(--mobile-scale)); min-width: min(35px, 8vw); flex-shrink: 1; }
    /* Navbar search + date-filter selects ride the SAME
       `--navbar-fs` as the surrounding tabs and Filtry button so
       every row of the navbar has uniform typography. The broad
       `input, select { font-size: 16px }` rule further down keeps
       non-navbar inputs at the iOS auto-zoom floor; this scoped
       override drops the navbar pair below that floor on purpose
       — `navbar-uniformity.spec.ts` locks the contract in. Visual
       uniformity won the trade-off vs the auto-zoom hop on
       Mobile Safari focus. */
    .navbar .search-input, .navbar .filter-select {
      font-size:     var(--navbar-fs);
      padding-left:  var(--navbar-px);
      padding-right: var(--navbar-px);
    }
    .navbar-title { display: none; }
    /* Mobile row-1: [logo+tabs] … [search] [auth] flush right.
       Mobile row-2: [date]            …    [filtry] flush right.
       The 100%-wide zero-height `.navbar-row-break` between auth
       (order 3) and date (order 5) forces a hard wrap regardless of
       how much horizontal slack row 1 ended up with — without it,
       date would slide back onto row 1 on any phone wide enough.
       Row-2 has date flush left (no margin) and filtry flush right
       (margin-left: auto), with the slack between them.
       The Filtry button text grows with active filters (e.g.
       "Filtry (kina 9/10, 2D, NAP, od 18:00)") — capped at a
       fraction of the row so a long label can't push past the
       row edge and force the whole button onto a third row. */
    .navbar-search    { order: 2; margin-left: auto; }
    .navbar-auth      { order: 3; }
    .navbar-row-break { display: block; order: 4; width: 100%; flex-shrink: 0; height: 0; margin: 0; padding: 0; }
    .navbar-date      { order: 5; margin-left: 0; min-width: 0; }
    /* Let the day `<select>` size to its widest option when row 2 has
       slack (Filtry's `margin-left:auto` absorbs the slack, so the
       select keeps its full label). Only when the row overflows — the
       narrowest phones with a long active-filter Filtry label — does
       the select give up width first: `min-width:0` + shrink let it
       ellipsize the selected label so Filtry never wraps to a third
       row. Replaces the old fixed `max-width` cap that clipped the
       label unconditionally. */
    .navbar-date .filter-select { min-width: 0; flex-shrink: 1; text-overflow: ellipsis; }
    /* Capped at 40% of the row so the date cluster (two arrows + a
       `<select>` whose widest option "Następne 7 dni" is ~14 chars)
       still fits alongside on the 500 px CI viewport, where Linux
       headless Chrome renders the select ~3 % wider than macOS and
       a 50 % cap tipped the row over and wrapped Filtry. */
    .navbar-filtry    { order: 6; margin-left: auto; max-width: 40%; min-width: 0; }
    #format-filter-btn {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      /* `display: block` overrides the `inline-flex` from `.refresh-btn`
         so the text-overflow-ellipsis kicks in (ellipsis needs a block-
         level container with overflow:hidden and a constrained width). */
      display: block;
    }

    /* iOS Safari auto-zooms the viewport when focus lands on an
       input / select with font-size < 16 px. The bump keeps
       non-navbar inputs (login modal, hidden-films modal search,
       Filtry's from-hour / from-minute selects inside the
       dropdown) at the iOS-safe floor. The NAVBAR search +
       date-filter intentionally opt out via the scoped
       `.navbar .search-input, .navbar .filter-select` rule above
       — visual font-uniformity across the navbar won the trade-
       off vs the auto-zoom hop on focus. */
    input, select { font-size: 16px; }

    /* Card text rides `--mobile-scale` too. The grid is 2 columns
       below 576 px (Bootstrap's `row-cols-2`), so each card is roughly
       viewport/2 wide — what felt right at the desktop defaults
       (.95rem title, .72rem pills, .68rem ratings) reads cramped on a
       ~150 px iPhone-SE card. Scaling card text by the same factor
       as the navbar keeps the two visual zones in proportion at every
       mobile width. */
    .container-fluid {
      padding-left:  min(calc(.75 * var(--mobile-scale)), 2.5vw) !important;
      padding-right: min(calc(.75 * var(--mobile-scale)), 2.5vw) !important;
    }
    #film-grid { --bs-gutter-x: min(var(--mobile-scale), 3.5vw); }
    .card-body         { padding: min(var(--mobile-scale), 4vw); }
    .card-title a      { font-size: calc(.95 * var(--mobile-scale)); }
    .pill              { font-size: calc(.72 * var(--mobile-scale)); padding: 0 calc(5 * var(--mobile-scale-px)); }
    .date-label        { font-size: calc(.7 * var(--mobile-scale)); }
    /* Showtime pills (`.badge-time` / `.badge-fmt`) + rating pills
       (`.rating-imdb` / `.rating-meta` / `.rating-fw` / `.rating-rt`)
       are scaled inside their own partials (`_pillStyles`,
       `_ratingStyles`) so the `/film` page — which loads those
       partials directly without `_sharedStyles` — gets the same
       shrinking as the listing pages. */

    /* Pop-over chrome — Filtry dropdown, login + hidden-films modals,
       auth menu, the anonymous-user nag toast, the showtime-pill room
       tooltip. None of these are visible at first paint, but they all
       open on tap and should read at the same visual scale as the
       navbar / grid that's already on screen. Same `--mobile-scale`
       factor → consistent typography across every layer of UI. */
    .login-modal-title  { font-size: calc(1.2 * var(--mobile-scale)); }
    .login-modal-sub    { font-size: calc(.85 * var(--mobile-scale)); }
    .login-btn          {
      font-size: calc(.95 * var(--mobile-scale));
      padding:   calc(.65 * var(--mobile-scale)) calc(.9 * var(--mobile-scale));
    }
    .panel-item         { font-size: calc(.8 * var(--mobile-scale)); }
    .panel-label        { font-size: calc(.8 * var(--mobile-scale)); }
    .panel-section-label{ font-size: calc(.65 * var(--mobile-scale)); }
    .auth-logout-btn    { font-size: calc(.875 * var(--mobile-scale)); }
    .anon-nag-toast     { font-size: calc(.85 * var(--mobile-scale)); }
    .no-poster          { font-size: calc(.85 * var(--mobile-scale)); }
    #room-tooltip       { font-size: calc(.68 * var(--mobile-scale)); }

    /* Compact 28 px control heights for portrait mobile — matches
       the landscape-only block further down so rotating the device
       doesn't shift the row height. Locked in by
       `navbar-orientation-uniformity.spec.ts`. */
    .navbar .nav-tab,
    .navbar .nav-tab-login,
    .navbar .refresh-btn,
    .navbar .date-nav-btn,
    .navbar .btn.date-nav-btn,
    .navbar .filter-select,
    .navbar .search-input,
    .navbar .auth-menu {
      height: 28px;
      min-height: 28px;
      max-height: 28px;
      box-sizing: border-box;
    }
  }

  @@media (max-height: 500px) and (orientation: landscape) {
    .navbar-title { display: none; }

    .navbar-row-break { display: none; }
    .navbar-search    { order: 1; margin-left: auto; }
    .navbar-date      { order: 2; }
    .navbar-filtry    { order: 3; margin-left: 0; }
    .navbar-auth      { order: 4; }

    .navbar {
      flex-wrap: nowrap;
      padding-left:  8px !important;
      padding-right: 8px !important;
      gap: 3px;
    }
    .navbar-logo { gap: 4px !important; flex-shrink: 0; min-width: 0; }
    .navbar-logo > .d-flex { gap: 2px; }
    .navbar-search { min-width: 0; flex-shrink: 10; overflow: hidden; }
    .navbar-search .search-input { min-width: 0; width: 100%; }
    .navbar-auth { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 0; }
    .navbar .nav-tab,
    .navbar .nav-tab-login,
    .navbar .refresh-btn,
    .navbar .auth-name,
    .navbar .filter-select,
    .navbar .search-input {
      font-size: calc(.8 * var(--mobile-scale));
      padding-left:  5px;
      padding-right: 5px;
    }
    .navbar .btn.date-nav-btn { font-size: calc(.95 * var(--mobile-scale)); min-width: 0; padding-left: 3px; padding-right: 3px; }
    .navbar .filter-select,
    .navbar .search-input { padding-top: 0; padding-bottom: 0; }
    .navbar-date { align-items: center; flex-shrink: 0; min-width: 0; }
    .navbar-date .filter-select { min-width: 0; }

    .navbar-filtry { min-width: 0; flex-shrink: 0; }
    #format-filter-btn {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .container-fluid {
      padding-left:  8px !important;
      padding-right: 8px !important;
    }
    .card-body         { padding: calc(.6 * var(--mobile-scale)); }
    .card-title a      { font-size: calc(.95 * var(--mobile-scale)); }
    .pill              { font-size: calc(.72 * var(--mobile-scale)); padding: 0 calc(5 * var(--mobile-scale-px)); }
    .date-label        { font-size: calc(.7 * var(--mobile-scale)); }
    .cinema-label      { font-size: calc(.65 * var(--mobile-scale)); }
    .no-poster         { font-size: calc(.85 * var(--mobile-scale)); }
    #room-tooltip      { font-size: calc(.68 * var(--mobile-scale)); }

    /* Tighter card gaps — default Bootstrap gutter (1.5 rem) wastes
       horizontal room that narrow landscape phones need for card
       content. */
    #film-grid { --bs-gutter-x: .5rem; }

    /* Default landscape density: 4 columns. Narrow landscape phones
       (Galaxy S10 → 760 px) can't fit 6 readable cards; 4 gives
       ~190 px per card — enough for a 2-line title. */
    #film-grid > .col {
      flex: 0 0 25%;
      max-width: 25%;
    }
  }

  /* Wide landscape (≥ 800 px): bump to 6 columns. iPhone 17 Pro Max
     and Pro have native landscape widths of 956 / 874 CSS px, but
     because the templates don't set `viewport-fit=cover`, iOS Safari
     renders the page WITHIN the Dynamic-Island safe-area —
     `window.innerWidth` (the value media queries match against)
     drops by ~60 px per side on Pro Max (956 → ~830) and ~40 px on
     other Pro models. Threshold 800 captures everything from the
     iPhone Pro / Plus class up; iPhone SE (667) and the
     narrow-landscape 760 px test viewport correctly stay at 4 cols.
     The Galaxy S10 narrow-landscape spec assumes this boundary. */
  @@media (max-height: 500px) and (orientation: landscape) and (min-width: 800px) {
    #film-grid > .col {
      flex: 0 0 calc(100% / 6);
      max-width: calc(100% / 6);
    }
  }

  /* Landscape compact padding + heights. The 28 px control heights
     also live in the `(max-width: 575px)` portrait block — both are
     needed because a landscape phone has width > 575 px (so the
     portrait query doesn't match) while a portrait phone has
     height > 500 px (so this query doesn't match). The tighter
     3 px top/bottom padding is landscape-only. */
  @@media (max-height: 500px) and (orientation: landscape) {
    .navbar {
      padding-top:    3px !important;
      padding-bottom: 3px !important;
    }
    .navbar .nav-tab,
    .navbar .nav-tab-login,
    .navbar .refresh-btn,
    .navbar .date-nav-btn,
    .navbar .btn.date-nav-btn,
    .navbar .filter-select,
    .navbar .search-input,
    .navbar .auth-menu {
      height: 28px;
      min-height: 28px;
      max-height: 28px;
      box-sizing: border-box;
    }
  }

  /* ── Day-swipe (shared.js) ─────────────────────────────────────────────────
     `#view-pager` holds the `<main id="view-root">` grid. A horizontal swipe
     translates the grid to step the selected day; shared.js drives the
     transform inline. `overflow-x: clip` hides the grid as it slides off-screen
     without creating a scroll container (so it can't add a phantom vertical
     scrollbar the way `overflow-x: hidden` would). */
  #view-pager { position: relative; overflow-x: clip; }
  #view-pager > main { will-change: transform; }
  /* Claim horizontal gestures over the grid for the swipe-to-switch handler:
     it lets the browser keep vertical scrolling but stops it treating a
     horizontal drag as a (non-existent) horizontal scroll and cancelling the
     pointer stream mid-swipe. `pinch-zoom` is kept in the value so two-finger
     pinch-to-zoom on the cards still works — only single-finger HORIZONTAL pan
     is reserved for the swipe (`pan-y pinch-zoom` = everything `manipulation`
     allows minus `pan-x`). */
  #view-pager .container-fluid { touch-action: pan-y pinch-zoom; }

  /* ── Filmy (/) view chrome ─────────────────────────────────────────────────
     Lives here (shared, every page) rather than in repertoire's <head> so the
     listing's cinema labels + card content-visibility are always styled. Inert
     on /plan (no `#film-grid > .col`). */
  /* Off-screen film cards skip layout + paint until scrolled into view
     (~460 px intrinsic-size keeps the scrollbar from jumping on measure). */
  #film-grid > .col { content-visibility: auto; contain-intrinsic-size: 0 460px; }
  .cinema-label { font-size: .65rem; color: #66aadd; margin-bottom: var(--gap-cinema-pills, .1rem); margin-top: var(--gap-cinema-top, .3rem); }
  .cinema-label-link { color: #66aadd; text-decoration: none; }
  .cinema-label-link:hover { color: #aad4ff; text-decoration: underline; }
  /* With the cinema filter narrowed to a single cinema (or a one-cinema city),
     every card repeats the same cinema name — `applyFilters` adds
     `.single-cinema` to the grid and we drop the now-redundant labels. */
  #film-grid.single-cinema .cinema-label { display: none; }
  /* The per-cinema label above each card's pill row rides the shared
     `--mobile-scale` so it tracks the card text on narrow phones. */
  @@media (max-width: 575px) {
    .cinema-label { font-size: calc(.65 * var(--mobile-scale)); }
  }

</style>
@_pillStyles()
@_ratingStyles()
