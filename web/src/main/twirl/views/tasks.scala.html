@(current: models.Country = models.Country.fromEnv)
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks — @current.brandName</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 13px/1.4 monospace; background: #0d0d0d; color: #ccc; padding: 24px; }
    /* The title and the country switcher share one row; the row carries the
       heading's old bottom margin so `.sub` below sits where it did. */
    .page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .sub { color: #666; font-size: 11px; margin-bottom: 20px; }
    .sub .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #2ecc40; margin-right: 5px; vertical-align: middle; }
    .sub.stale .dot { background: #c0392b; }

    .counts { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
    .pill {
      background: #161616; border: 1px solid #222; border-radius: 6px;
      padding: 10px 16px; min-width: 110px;
    }
    .pill .n { font-size: 22px; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
    .pill .l { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-top: 2px; }
    .pill.waiting .n   { color: #f0ad4e; }
    .pill.worked_on .n { color: #4aa3df; }
    .pill.deleted .n   { color: #6a9b78; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #666; font-weight: 600; padding: 6px 10px; border-bottom: 1px solid #1a1a1a;
      position: sticky; top: 0; background: #0d0d0d;
    }
    td { padding: 5px 10px; border-bottom: 1px solid #141414; vertical-align: top; }
    tr:hover td { background: #131313; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .mono { color: #ddd; }
    .muted { color: #666; }
    .badge {
      display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px;
      font-weight: 600;
    }
    .badge.waiting   { background: #3a2e12; color: #f0ad4e; }
    .badge.worked_on { background: #12283a; color: #4aa3df; }
    .ttype { color: #b89cd6; }
    .key { color: #9bb3c9; word-break: break-all; }
    .err { color: #e07a6a; font-size: 11px; word-break: break-word; }
    .retry { color: #f0ad4e; }
    .empty { color: #555; padding: 30px 10px; text-align: center; }
    .age-warn { color: #f0ad4e; }
    .age-bad  { color: #e07a6a; }

    .runbar { margin-bottom: 22px; }
    .runbar-label { color: #777; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; }
    .runjobs { display: flex; gap: 10px; flex-wrap: wrap; }
    .runjob { display: flex; flex-direction: column; gap: 5px; min-width: 156px; }
    .runbtn {
      font: 11px monospace; color: #cfe3d6; background: #14241a; border: 1px solid #245038;
      border-radius: 6px; padding: 6px 11px; cursor: pointer; text-align: left;
    }
    .runbtn:hover { background: #1c3326; border-color: #2e6649; color: #fff; }
    .runbtn:disabled { opacity: .5; cursor: default; }
    .runresult { font-size: 10px; color: #555; line-height: 1.35; padding: 0 2px; }
    .runresult .cnt  { color: #9bb3c9; }
    .runresult .when { color: #777; }
    .runresult.ok   .mark { color: #6a9b78; }
    .runresult.fail .mark { color: #e07a6a; }
    .runresult.fail { color: #b56a5e; }
    .runstatus { color: #888; font-size: 11px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="page-head">
    <h1>Task queue</h1>
    @_countrySwitch("/tasks", current)
  </div>
  <div class="sub" id="sub"><span class="dot"></span><span id="status">connecting…</span></div>

  <div class="runbar">
    <div class="runbar-label">Run corpus-wide refresh</div>
    <div class="runjobs">
      <div class="runjob">
        <button class="runbtn" data-tasktype="RefreshAllTmdb" data-url="@routes.TasksController.run("tmdb")">TMDB re-enrich (all)</button>
        <div class="runresult" data-tasktype="RefreshAllTmdb"></div>
      </div>
      <div class="runjob">
        <button class="runbtn" data-tasktype="RefreshAllImdb" data-url="@routes.TasksController.run("imdb")">IMDb refresh</button>
        <div class="runresult" data-tasktype="RefreshAllImdb"></div>
      </div>
      <div class="runjob">
        <button class="runbtn" data-tasktype="RefreshAllFilmweb" data-url="@routes.TasksController.run("filmweb")">Filmweb refresh</button>
        <div class="runresult" data-tasktype="RefreshAllFilmweb"></div>
      </div>
      <div class="runjob">
        <button class="runbtn" data-tasktype="RefreshAllMetacritic" data-url="@routes.TasksController.run("metacritic")">Metacritic refresh</button>
        <div class="runresult" data-tasktype="RefreshAllMetacritic"></div>
      </div>
      <div class="runjob">
        <button class="runbtn" data-tasktype="RefreshAllRt" data-url="@routes.TasksController.run("rt")">Rotten Tomatoes refresh</button>
        <div class="runresult" data-tasktype="RefreshAllRt"></div>
      </div>
      <div class="runjob">
        <button class="runbtn settle" data-tasktype="SettleNow" data-url="@routes.TasksController.run("settle")"
                title="Folds same-film editions into one record per shown title">Consolidate now (settle)</button>
        <div class="runresult" data-tasktype="SettleNow"></div>
      </div>
    </div>
    <div id="runstatus" class="runstatus"></div>
  </div>

  <div class="counts" id="counts"></div>

  <table>
    <thead>
      <tr>
        <th>State</th>
        <th>Type</th>
        <th>Dedup key</th>
        <th class="num">Age</th>
        <th class="num">Tries</th>
        <th>Worker</th>
        <th class="num">Lease</th>
        <th>Last error</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    "use strict";
    var POLL_MS = 5000;
    var STATE_ORDER = ["waiting", "worked_on", "deleted"];
    var timer = null;
    var lastSnap = null;     // last payload from the server
    var serverSkewMs = 0;    // (clientNow - serverNow) at last fetch, to tick ages locally

    function esc(s) {
      return String(s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    function fmtAge(ms) {
      if (ms < 0) ms = 0;
      var s = Math.floor(ms / 1000);
      if (s < 60) return s + "s";
      var m = Math.floor(s / 60);
      if (m < 60) return m + "m " + (s % 60) + "s";
      var h = Math.floor(m / 60);
      return h + "h " + (m % 60) + "m";
    }

    function ageClass(ms) {
      if (ms > 6 * 60 * 60 * 1000) return "age-bad";   // older than the 6h detail TTL — likely stuck
      if (ms > 15 * 60 * 1000) return "age-warn";       // past the 15min scrape window
      return "";
    }

    function render() {
      if (!lastSnap) return;
      var now = Date.now() - serverSkewMs; // server clock, ticking
      var counts = lastSnap.counts || {};

      var cEl = document.getElementById("counts");
      cEl.innerHTML = STATE_ORDER.map(function (st) {
        var n = counts[st] || 0;
        return '<div class="pill ' + st + '"><div class="n">' + n +
          '</div><div class="l">' + st.replace("_", " ") + '</div></div>';
      }).join("");

      var rows = lastSnap.active || [];
      var body = document.getElementById("rows");
      if (rows.length === 0) {
        body.innerHTML = '<tr><td colspan="8" class="empty">No active tasks — queue drained.</td></tr>';
      } else {
        body.innerHTML = rows.map(function (t) {
          var age = now - t.submittedAt;
          var lease = t.leaseExpiresAt != null ? (t.leaseExpiresAt - now) : null;
          var leaseTxt = lease == null ? '<span class="muted">—</span>'
            : (lease < 0 ? '<span class="age-bad">expired</span>' : fmtAge(lease));
          var tries = t.attempts > 1 ? '<span class="retry">' + t.attempts + '</span>' : t.attempts;
          return '<tr>' +
            '<td><span class="badge ' + esc(t.state) + '">' + esc(t.state.replace("_", " ")) + '</span></td>' +
            '<td class="ttype">' + esc(t.taskType) + '</td>' +
            '<td class="key">' + esc(t.dedupKey) + '</td>' +
            '<td class="num ' + ageClass(age) + '">' + fmtAge(age) + '</td>' +
            '<td class="num">' + tries + '</td>' +
            '<td class="muted">' + (t.workerId ? esc(t.workerId) : '—') + '</td>' +
            '<td class="num">' + leaseTxt + '</td>' +
            '<td class="err">' + (t.lastError ? esc(t.lastError) : '') + '</td>' +
          '</tr>';
        }).join("");
      }

      var shown = lastSnap.shown || 0, limit = lastSnap.limit || 0;
      var more = shown >= limit ? (" (showing first " + limit + ")") : "";
      document.getElementById("status").textContent =
        "live · " + (rows.length) + " active shown" + more + " · refreshed " +
        new Date().toLocaleTimeString();
      document.getElementById("sub").classList.remove("stale");

      renderLastResults(now);
    }

    // Each Run button's last outcome, from the shared `bulk_task_results` store —
    // it survives the task doc's instant deletion, so the operator sees what a
    // click actually did (counts + how long ago) instead of a vanished task.
    function renderLastResults(now) {
      var results = (lastSnap && lastSnap.lastResults) || {};
      document.querySelectorAll(".runresult").forEach(function (el) {
        var r = results[el.dataset.tasktype];
        if (!r) { el.className = "runresult"; el.textContent = "not run yet"; el.title = ""; return; }
        el.className = "runresult " + (r.succeeded ? "ok" : "fail");
        var counts = [];
        if (r.changed != null)    counts.push(r.changed + " changed");
        if (r.discovered)         counts.push(r.discovered + " found");
        if (r.failed)             counts.push(r.failed + " failed");
        var summary = counts.length ? counts.join(" · ")
          : (r.succeeded ? "ran" : "failed");
        el.innerHTML = '<span class="mark">' + (r.succeeded ? "✓" : "✗") + '</span> ' +
          '<span class="cnt">' + esc(summary) + '</span> · ' +
          '<span class="when">' + fmtAge(now - r.ranAt) + ' ago</span>';
        el.title = r.message || "";
      });
    }

    function poll() {
      fetch("@routes.TasksController.data()", { headers: { "Accept": "application/json" } })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (snap) {
          lastSnap = snap;
          serverSkewMs = Date.now() - snap.now;
          render();
        })
        .catch(function (e) {
          document.getElementById("status").textContent = "disconnected (" + e.message + ") — retrying…";
          document.getElementById("sub").classList.add("stale");
        });
    }

    function start() { if (!timer) { poll(); timer = setInterval(poll, POLL_MS); } }
    function stop()  { if (timer) { clearInterval(timer); timer = null; } }

    // Pause polling when the tab is hidden so a backgrounded page costs the web nothing.
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) stop(); else start();
    });
    // Tick ages locally between polls so the page feels live without extra requests.
    setInterval(function () { if (!document.hidden) render(); }, 1000);

    // Run buttons: POST a corpus-wide refresh, report enqueued / already-running,
    // then poll once so the new task shows up in the table immediately.
    document.querySelectorAll(".runbtn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var label = btn.textContent;
        var st = document.getElementById("runstatus");
        btn.disabled = true;
        st.textContent = "enqueuing " + label + "…";
        fetch(btn.dataset.url, { method: "POST", headers: { "Accept": "application/json" } })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) st.textContent = label + " — error: " + (res.j.error || "HTTP error");
            else if (res.j.duplicate) st.textContent = label + " — already running";
            else st.textContent = label + " — enqueued ✓";
            poll();
          })
          .catch(function (e) { st.textContent = label + " — error: " + e.message; })
          .finally(function () { btn.disabled = false; });
      });
    });

    start();
  </script>
</body>
</html>
