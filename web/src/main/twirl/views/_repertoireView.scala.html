@import controllers.FilmSchedule
@(films: Seq[FilmSchedule], devMode: Boolean)(implicit city: models.City)
@* The Filmy view-root. Rendered inside `#view-pager` (the day carousel
   viewport) on the full repertoire page. *@
<main id="view-root" data-view="films">
<div class="container-fluid py-4 px-4">
  <div id="no-films" class="text-center py-5 text-secondary" style="display:none">Brak repertuaru.</div>
  <div class="row g-3 row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 row-cols-xl-6" id="film-grid">
    @_filmCards(films)
  </div>
</div>

@_minified(devMode) {
<script>
  // Wrapped in an IIFE to keep the per-view locals (`INDEX`,
  // `_prevVisibleOrder`) off the global scope; the `window.*` entry points
  // below are what shared.js `bootView` drives.
  (function () {
  // ── DOM index ─────────────────────────────────────────────────────────────

  let INDEX = null;

  function buildIndex() {
    const grid = document.getElementById('film-grid');
    INDEX = [...grid.querySelectorAll('.col[data-title]')].map(col => ({
      el:       col,
      title:    col.dataset.title.toLowerCase(),
      rawTitle: col.dataset.title,
      // Sort key, parsed once: the server-computed weighted rating average
      // (0 when the film has no ratings).
      rating:    parseFloat(col.dataset.rating) || 0,
      countries: new Set((col.dataset.countries || '').split('|').filter(Boolean)),
      genres:    new Set((col.dataset.genres    || '').split('|').filter(Boolean)),
      directors: new Set((col.dataset.director || '').split(',').map(s => s.trim()).filter(Boolean)),
      cast:      new Set((col.dataset.cast     || '').split(',').map(s => s.trim()).filter(Boolean)),
      visible:  true,  // remembered so we only write style.display on changes
      groups:   [...col.querySelectorAll('.date-group[data-date]')].map(group => ({
        el:           group,
        date:         group.dataset.date,
        visible:      true,
        cinemaGroups: [...group.querySelectorAll('.cinema-group[data-cinema]')].map(cg => ({
          el:      cg,
          cinema:  cg.dataset.cinema,
          visible: true,
          // Pre-parse each badge's format tokens into a Set + a numeric
          // minutes-since-midnight for the time filter. Re-reading
          // dataset.format / parsing "HH:MM" on every filter pass adds up —
          // these never change.
          badges:  [...cg.querySelectorAll('.badge-time')].map(b => {
            const t = (b.dataset.time || '').trim();
            const colon = t.indexOf(':');
            const timeMin = colon > 0
              ? parseInt(t.slice(0, colon), 10) * 60 + parseInt(t.slice(colon + 1), 10)
              : -1;
            const room = b.dataset.room || '';
            return {
              el:          b,
              time:        t,
              timeMin:     timeMin,
              formats:     new Set((b.dataset.format || '').split(' ').filter(Boolean)),
              // Pre-compose the room-filter key so the applyFilters inner
              // loop doesn't pay a string-concat per badge per pass. Empty
              // when the badge carries no `data-room` — those badges fall
              // out of view as soon as the user picks any room (the filter
              // is an include-list and can't include "no room").
              roomKey:     room ? (cg.dataset.cinema + '|' + room) : '',
              visible:     true
            };
          })
        }))
      }))
    }));
  }

  // ── Master filter ─────────────────────────────────────────────────────────

  // Helper: only write style.display when the visibility actually changed —
  // avoids triggering layout when nothing moved.
  function setVisible(node, want) {
    if (node.visible !== want) {
      node.el.style.display = want ? '' : 'none';
      node.visible = want;
    }
  }

  // Last-applied DOM order of VISIBLE cards (by their INDEX position).
  // Hidden cards never appear here — they're display:none and their DOM
  // position is irrelevant to layout. The subsequence check below uses this
  // to decide when the rebuild is a no-op.
  let _prevVisibleOrder = [];

  function applyFilters() {
    if (!INDEX) return;
    // Only the day select rides the URL in real time — every other filter
    // stays local until the user opts in via the Filtry panel's "Skopiuj
    // link do schowka" button. `syncDateToURL` covers the date dropdown,
    // the `stepDate` arrows, and the URL-driven day-step keyboard shortcut.
    syncDateToURL();
    undoTruncation();
    const filter    = document.getElementById('date-filter')?.value || 'anytime';
    const query     = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
    const hidden    = new Set(getHidden());
    const disabled  = new Set(getDisabledCinemas());
    // When the cinema filter is narrowed to a single cinema (or the city only
    // has one), every card's cinema sub-header repeats the same name — pure
    // noise. Toggle a grid-level class that hides `.cinema-label` via CSS, and
    // feed the same flag into truncation so its line accounting matches.
    const singleCinema  = ALL_CINEMAS.filter(c => !disabled.has(c)).length <= 1;
    const gridEl        = document.getElementById('film-grid');
    if (gridEl) gridEl.classList.toggle('single-cinema', singleCinema);
    const fmtTokens     = getFormatFilter();
    const hasFmt        = fmtTokens.length > 0;
    const fromMin       = getFromMinutes();
    const hasFrom       = fromMin !== null;
    const countryFilter  = getCountryFilter();
    const hasCountry     = countryFilter !== null;
    const genreFilter    = getSubmenuFilter('genre');
    const hasGenre       = genreFilter !== null;
    const directorFilter = getDirectorFilter();
    const hasDirector    = directorFilter !== null;
    const castFilter     = getCastFilter();
    const hasCast        = castFilter !== null;
    const roomList       = getSubmenuFilter('room');
    const hasRoom        = roomList !== null;
    const roomSet        = hasRoom ? new Set(roomList) : null;
    const { today, tomorrow, in7Days } = dateBounds();

    const isSpecific = /^\d{4}-\d{2}-\d{2}$/.test(filter);
    const dateOk = filter === 'today'    ? d => d === today :
                   filter === 'tomorrow' ? d => d === tomorrow :
                   filter === 'week'     ? d => d >= today && d <= in7Days :
                   isSpecific            ? d => d === filter :
                                           _  => true;

    let visibleCount = 0;
    const earlyMap = new Array(INDEX.length);

    for (let i = 0; i < INDEX.length; i++) {
      const col = INDEX[i];
      if (hidden.has(col.rawTitle) || (query && !col.title.includes(query))
          || (hasCountry  && !countryFilter.some(c  => col.countries.has(c)))
          || (hasGenre    && !genreFilter.some(g    => col.genres.has(g)))
          || (hasDirector && !directorFilter.some(d => col.directors.has(d)))
          || (hasCast     && !castFilter.some(a     => col.cast.has(a)))) {
        setVisible(col, false);
        earlyMap[i] = null;
        continue;
      }
      let colVisible = false, colEarliest = null;

      for (const group of col.groups) {
        if (!dateOk(group.date)) { setVisible(group, false); continue; }

        let groupVisible = false;
        for (const cg of group.cinemaGroups) {
          if (disabled.has(cg.cinema)) { setVisible(cg, false); continue; }

          let cgVisibleCount = 0, cgFirstTime = null;
          const needsBadgeLoop = hasFmt || hasFrom || hasRoom;
          if (needsBadgeLoop) {
            for (const badge of cg.badges) {
              const fmtOk  = !hasFmt  || badgeFormatMatch(badge.formats, fmtTokens);
              const timeOk = !hasFrom || badge.timeMin < 0 || badge.timeMin >= fromMin;
              // Empty roomKey (badge with no `data-room`) can't match any
              // include-list entry; treat as a miss when the room filter is on.
              const roomOk = !hasRoom || (badge.roomKey && roomSet.has(badge.roomKey));
              const ok = fmtOk && timeOk && roomOk;
              setVisible(badge, ok);
              if (ok) {
                cgVisibleCount++;
                if (!cgFirstTime) cgFirstTime = group.date + 'T' + badge.time;
              }
            }
          } else {
            // Fast-path: no filter constraints, every badge in this cinema-group is on.
            for (const badge of cg.badges) setVisible(badge, true);
            cgVisibleCount = cg.badges.length;
            if (cg.badges.length > 0) cgFirstTime = group.date + 'T' + cg.badges[0].time;
          }

          if (cgVisibleCount > 0) {
            setVisible(cg, true);
            groupVisible = true;
            if (cgFirstTime && (!colEarliest || cgFirstTime < colEarliest))
              colEarliest = cgFirstTime;
          } else {
            setVisible(cg, false);
          }
        }

        setVisible(group, groupVisible);
        if (groupVisible) colVisible = true;
      }

      if (colVisible) {
        setVisible(col, true);
        visibleCount++;
        earlyMap[i] = colEarliest;
      } else {
        setVisible(col, false);
        earlyMap[i] = null;
      }
    }

    sortByEarliestVisible(earlyMap);
    truncateAllShowings(!singleCinema);
    updateEmptyState(visibleCount);
  }

  function sortByEarliestVisible(earlyMap) {
    // Only the VISIBLE cards' DOM order matters — hidden ones are display:none
    // and don't participate in layout. Sort just those by earliest showtime.
    const visible = [];
    for (let i = 0; i < earlyMap.length; i++) if (earlyMap[i] !== null) visible.push(i);
    const sortBy = getSortBy();
    visible.sort((a, b) => compareCards(sortBy,
      { earliest: earlyMap[a], rating: INDEX[a].rating, idx: a },
      { earliest: earlyMap[b], rating: INDEX[b].rating, idx: b }));

    // Skip the rebuild when the new order is a subsequence of the last applied
    // one — i.e. cards only became hidden, the remaining ones are in the same
    // relative position in the DOM. This is what keeps `hideFilm` jump-free:
    // appendChild detaches+reattaches every visible card and breaks the
    // browser's scroll anchor; we'd rather not touch the DOM at all.
    if (isSubsequence(visible, _prevVisibleOrder)) return;
    _prevVisibleOrder = visible;

    const grid = document.getElementById('film-grid');
    const frag = document.createDocumentFragment();
    for (const i of visible) frag.appendChild(INDEX[i].el);
    grid.appendChild(frag);
  }

  // ── Per-day filter for carousel neighbour columns ──────────────────────────
  //
  // The day carousel (shared.js) reveals the prev/next day's grid by cloning
  // `#film-grid` and filtering the clone to a SINGLE fixed day, honouring every
  // OTHER active filter (search / cinema / format / from-hour / submenus) the
  // same way the live `applyFilters` does. Clones carry no INDEX, so this walks
  // the DOM directly. `dayValue` is a `#date-filter` option value
  // (today/tomorrow/week/anytime/YYYY-MM-DD); the predicate matches `applyFilters`'
  // `dateOk`. The visible cards are re-ordered to the SAME earliest-showtime
  // (or rating) order the commit lands on — otherwise the preview shows the
  // current day's order and the cards visibly jump on release. No
  // truncation/URL sync — a neighbour column is a static preview that only
  // needs the right cards, in the right order, at the right scroll offset.
  function applyFiltersForDay(gridEl, dayValue) {
    if (!gridEl) return;
    const query     = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
    const hidden    = new Set(getHidden());
    const disabled  = new Set(getDisabledCinemas());
    const singleCinema  = ALL_CINEMAS.filter(c => !disabled.has(c)).length <= 1;
    gridEl.classList.toggle('single-cinema', singleCinema);
    const fmtTokens     = getFormatFilter();
    const hasFmt        = fmtTokens.length > 0;
    const fromMin       = getFromMinutes();
    const hasFrom       = fromMin !== null;
    const countryFilter  = getCountryFilter();
    const genreFilter    = getSubmenuFilter('genre');
    const directorFilter = getDirectorFilter();
    const castFilter     = getCastFilter();
    const roomList       = getSubmenuFilter('room');
    const roomSet        = roomList !== null ? new Set(roomList) : null;
    const { today, tomorrow, in7Days } = dateBounds();
    const isSpecific = /^\d{4}-\d{2}-\d{2}$/.test(dayValue);
    const dateOk = dayValue === 'today'    ? d => d === today :
                   dayValue === 'tomorrow' ? d => d === tomorrow :
                   dayValue === 'week'     ? d => d >= today && d <= in7Days :
                   isSpecific              ? d => d === dayValue :
                                             _  => true;

    const has = (filter, get) => filter !== null && !filter.some(get);
    // The active sort axis, read the same way shared.js's getSortBy does — the
    // neighbour preview must commit-match, including under 'rating'.
    const sortBy = (document.getElementById('sort-by')?.value === 'rating') ? 'rating' : 'earliest';
    // Visible cards with their commit sort key: earliest visible showtime
    // ("<date>T<HH:MM>", matching applyFilters) + rating + original DOM index.
    const visible = [];
    const cols = [...gridEl.querySelectorAll('.col[data-title]')];
    cols.forEach((col, idx) => {
      const countries = new Set((col.dataset.countries || '').split('|').filter(Boolean));
      const genres    = new Set((col.dataset.genres    || '').split('|').filter(Boolean));
      const directors = new Set((col.dataset.director || '').split(',').map(s => s.trim()).filter(Boolean));
      const cast      = new Set((col.dataset.cast     || '').split(',').map(s => s.trim()).filter(Boolean));
      const titleLc   = (col.dataset.title || '').toLowerCase();
      let colVisible = false;
      let colEarliest = null;   // earliest visible "<date>T<HH:MM>" for the sort
      if (!(hidden.has(col.dataset.title) || (query && !titleLc.includes(query))
            || has(countryFilter,  c => countries.has(c))
            || has(genreFilter,    g => genres.has(g))
            || has(directorFilter, d => directors.has(d))
            || has(castFilter,     a => cast.has(a)))) {
        col.querySelectorAll('.date-group[data-date]').forEach(group => {
          let groupVisible = false;
          if (dateOk(group.dataset.date)) {
            group.querySelectorAll('.cinema-group[data-cinema]').forEach(cg => {
              if (disabled.has(cg.dataset.cinema)) { cg.style.display = 'none'; return; }
              let cgVisible = 0;
              cg.querySelectorAll('.badge-time').forEach(b => {
                const formats = new Set((b.dataset.format || '').split(' ').filter(Boolean));
                const t = (b.dataset.time || '').trim();
                const colon = t.indexOf(':');
                const timeMin = colon > 0 ? parseInt(t.slice(0, colon), 10) * 60 + parseInt(t.slice(colon + 1), 10) : -1;
                const room = b.dataset.room || '';
                const roomKey = room ? (cg.dataset.cinema + '|' + room) : '';
                const ok = (!hasFmt || badgeFormatMatch(formats, fmtTokens))
                        && (!hasFrom || timeMin < 0 || timeMin >= fromMin)
                        && (roomSet === null || (roomKey && roomSet.has(roomKey)));
                b.style.display = ok ? '' : 'none';
                if (ok) {
                  cgVisible++;
                  const key = group.dataset.date + 'T' + t;
                  if (colEarliest === null || key < colEarliest) colEarliest = key;
                }
              });
              cg.style.display = cgVisible > 0 ? '' : 'none';
              if (cgVisible > 0) groupVisible = true;
            });
          }
          group.style.display = groupVisible ? '' : 'none';
          if (groupVisible) colVisible = true;
        });
      }
      col.style.display = colVisible ? '' : 'none';
      if (colVisible) {
        visible.push({ el: col, earliest: colEarliest || '', rating: parseFloat(col.dataset.rating) || 0, idx });
      }
    });

    // Re-order the visible cards into the committed order. Mirrors
    // applyFilters' compareCards: rating biggest-first (earliest tiebreak),
    // else earliest-showtime ascending, with the original DOM index as the
    // stable final tiebreak. Without this the preview keeps the CURRENT day's
    // order and the cards jump on release.
    visible.sort((a, b) => {
      if (sortBy === 'rating' && a.rating !== b.rating) return b.rating - a.rating;
      if (a.earliest !== b.earliest) return a.earliest < b.earliest ? -1 : 1;
      return a.idx - b.idx;
    });
    const frag = document.createDocumentFragment();
    for (const v of visible) frag.appendChild(v.el);
    gridEl.appendChild(frag);
  }

  // Entry points shared.js drives at boot (`bootView`).
  window.buildIndex         = buildIndex;
  window.applyFilters       = applyFilters;
  window.applyFiltersForDay = applyFiltersForDay;
  })();
</script>
}
</main>
