@(allCinemas: Seq[String], cinemaPills: Map[String, String], currentUser: Option[models.User], oauthProviders: Set[String])(implicit city: models.City, messages: play.api.i18n.Messages)
@*
   Inline-`<script>` block that emits the page-bound JS constants
   the externalized `shared.js` reads at top level: IS_LOGGED_IN,
   HAS_OAUTH_PROVIDERS, ALL_CINEMAS, CINEMA_PILLS. Everything else
   in the shared JS moved to `public/js/shared.js` so iOS Safari
   (and every other engine with a URL-keyed script cache) can parse
   it ONCE per session and reuse the parsed bytecode across
   navigations to /, /plan, /film.

   Top-level `const` in classic `<script>` tags lives in the page's
   shared "script global lexical environment", so the constants
   declared here are visible to the subsequent
   `<script src="…/shared.js">` block.
*@
<script>
  const IS_LOGGED_IN        = @currentUser.isDefined;
  const HAS_OAUTH_PROVIDERS = @oauthProviders.nonEmpty;
  const ALL_CINEMAS         = @Html(play.api.libs.json.Json.toJson(allCinemas).toString);
  const CINEMA_PILLS        = @Html(play.api.libs.json.Json.toJson(cinemaPills).toString);
  @* Cinema areas for a split city (e.g. London → Central/North/…); empty for a
     flat city, in which case the picker renders one plain list. `window.`-scoped
     (not a lexical const) so buildCinemaPanel reads it and tests can override. *@
  window.CINEMA_AREAS       = @Html(play.api.libs.json.Json.toJson(city.areas.map(g => play.api.libs.json.Json.obj("name" -> g.area.label, "slug" -> g.area.slug, "cinemas" -> g.cinemaDisplayNames))).toString);
  const CURRENT_CITY        = "@city.slug";
  const ALL_CITIES          = @Html(city.country.allJson);
  @* Per-deployment locale for shared.js: weekday/month arrays, empty-state /
     swipe-hint / clear strings, and the showtime plural rule + forms. Replaces
     the Polish literals shared.js used to hardcode (DAY2/MONTHS/_showtimeNoun). *@
  const KINOWO_LOCALE       = @Html(controllers.JsLocale.json(messages));
  @* Page-test ONLY (never emitted in prod): FixtureTestWiring sets this system
     property to the fixture's capture date, pinning shared.js "today" so the
     `#date-filter` day assertions don't age out as the real clock advances past
     the recorded corpus. Absent in prod → shared.js falls back to `new Date()`. *@
  @Html(sys.props.get("kinowo.pinnedToday").map(d => s"""window.KINOWO_PINNED_TODAY = "$d";""").getOrElse(""))
</script>
