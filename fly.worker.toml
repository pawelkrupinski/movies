# Scrape/enrich worker — the write half of the read/write split. Runs the
# continuous cinema scrape + the enrichment cascade, writing through MovieCache
# to the shared Mongo; the `kinowo` serving app picks those writes up via the
# Mongo change stream. Deployed from the SAME Dockerfile as `kinowo` with
# `--build-arg BIN=worker` (see .github/workflows/deploy.yml).
app = 'kinowo-worker'
# Same region as `kinowo` + the self-hosted Mongo (`fly/mongo`) so writes run
# on Fly's private network at ~1 ms RTT instead of a cross-region hop.
primary_region = 'arn'
# Runs as ONE machine (scale set out-of-band: `fly scale count N -a kinowo-worker`;
# `flyctl deploy` preserves the count and rolls all). The competing-consumer design
# DOES support N machines — each drains the shared Mongo task queue via an atomic
# `findOneAndUpdate` claim (Waiting→WorkedOn + workerId + 5-min lease, expired leases
# reaped) so no task runs twice, the *Reapers gate each occurrence through
# MongoScheduledRunStore's atomic dup-key claim (one machine per occurrence), and
# enqueue dedups on the unique `dedupKey` index — but scaling out does NOT help, for
# a structural reason (see below). Keep it at 1.
#
# WHY MORE MACHINES DON'T HELP (measured twice: 2026-06-13 and again 2026-07-01 with
# a live profiler): the worker's CPU sink is NOT the task handlers — scrape/enrich are
# I/O-bound (network to cinemas, ~0.5 CPU-s/s total) and split fine across machines.
# It's the worker's own Mongo-CLIENT I/O: the `movies` change stream + read-model
# projection. Each machine independently runs `MovieCache.start()` AND
# `ReadModelProjector.start()`, each opening a change-stream cursor that receives and
# BSON-decodes EVERY write to `movies` and re-projects it. That work is fixed PER
# MACHINE — it does not split — so a 2nd machine just runs a 2nd full copy of it. On
# 2026-07-01 both machines sat pinned at cpu_balance≈2 (the floor), identical to the
# single machine before them: the 2nd box added a 2nd starved machine, zero throughput.
# The real lever is making that projection/change-stream path cheaper (a server-side
# `$match` so the projector isn't woken for every non-`readyToProject` intermediate
# enrichment write), not adding machines. See KINOWO_SCRAPE_FRESHNESS_MINUTES for the
# write-rate lever; the read-model sweep splits into KINOWO_READMODEL_PRUNE_SECONDS
# (cheap id-only orphan prune, frequent) and KINOWO_READMODEL_RECONCILE_SECONDS (the
# expensive full re-projection, now rare — watch kinowo_worker_readmodel_reconcile_sweeps
# to see if it still catches anything).

[build]
  dockerfile = 'Dockerfile'

# Fly's managed Prometheus scrapes this over the private network and ships the
# series to api.fly.io/prometheus/personal — the same datasource the self-hosted
# Grafana (fly/grafana) reads. WorkerMain serves it on the worker's internal
# health port (9000): task-pipeline throughput (enqueued / started / finished by
# type + outcome), handler-duration histogram, and live queue depth — all
# invisible to Fly's host-only metrics.
[[metrics]]
  port = 9000
  path = '/metrics'

[env]
  # WorkerMain's JDK health server binds this port; the [checks] block below
  # probes it. No public router fronts it (no [http_service]).
  PORT = '9000'
  # Retry the boot cache hydrate while Mongo comes up alongside the worker. An
  # empty findAll at boot is "Mongo not ready", not "empty corpus"; without
  # retry the cache starts empty and quiescent rows never load (only re-scraped
  # ones arrive via the change stream), leaving same-film duplicates stranded
  # and invisible to the in-memory collapse. 20 × 1s covers Mongo's cold start.
  KINOWO_BOOT_HYDRATE_MAX_ATTEMPTS = '20'
  # Caps in-flight scrape/enrich tasks (matches the code default). The worker's
  # write rate onto the shared-cpu-1x Mongo — not its CPU — is the constraint, so
  # watch Mongo CPU-credit/throttle after raising this. Pairs with the 30min scrape
  # freshness TTL below, which bounds the per-pass write volume.
  KINOWO_WORKER_POOL_SIZE = '4'
  # Cinema-scrape freshness window (uniform across ALL venues — Multikino's
  # separate 60min path was removed once it moved onto the flat-fee residential
  # proxy). It's the dominant lever on the worker's CPU + Mongo write rate (each
  # cinema is 10-20 page fetches, so cost is inherent volume, not speed). RAISED to
  # 60min on 2026-07-03: at 30min the steady daytime scrape+enrich load held CPU
  # above the shared-cpu-4x baseline entitlement, so credit sat pinned at the floor
  # through active hours and only rebuilt in overnight lulls (a fresh ~17k post-
  # deploy grant drained back to the floor in ~30 min). 60min halves the steady
  # scrape rate so credit recovers during the day, paired with the smaller throttled
  # enqueue cap in ScrapeCadence. Lower it again only if the box gains dedicated CPU
  # (performance-*, no credit bucket).
  KINOWO_SCRAPE_FRESHNESS_MINUTES = '60'
  # No KINOWO_SCRAPE_CITIES: the worker now scrapes EVERY modelled city by
  # default (ScrapeCities.allCities). The var still exists as a load-shedding
  # escape hatch — `fly secrets set KINOWO_SCRAPE_CITIES=poznan,wroclaw` NARROWS
  # the set — but the steady state is all ~19 cities on 4 shared vCPUs / 1 GB.
  # Watch this worker's RSS/CPU: if it throttles or OOMs, narrow via the secret
  # or bump the [[vm]] (see below).
  # Per-app JVM sizing (moved out of the shared Dockerfile), tuned for memory on
  # the 1 GB cgroup. The old G1 config's committed ceiling (384 heap + 160 meta +
  # 96 code + 96 direct + G1's own native bookkeeping + ~90 threads) crept past
  # ~890 MB and the box OOM-restarted every 1-5h — and each reboot's hydrate +
  # re-scrape boot storm spiked the shared-CPU throttle. Two memory levers, both
  # also cutting CPU-credit burn (this worker has NO latency SLA, so trade pauses
  # for footprint):
  #   - SerialGC instead of G1: G1 keeps remembered-set / card-table native
  #     structures and runs concurrent refinement threads (steady CPU + RSS);
  #     a single-threaded STW collector on a 384m heap is leaner on both and
  #     returns freed pages more readily. (StringDeduplication was a G1-only,
  #     web-page-render optimisation that never applied to the worker — dropped.)
  #   - MALLOC_ARENA_MAX / MALLOC_TRIM_THRESHOLD_ (in [env] below): cap glibc's
  #     per-thread malloc arenas (default 8×nCPU → fragmentation that shows as
  #     RSS far above the JVM's own committed pools) and make glibc hand freed
  #     memory back to the OS sooner.
  #   - Xms=Xmx=320m (was 384): NMT + a forced full GC on the live worker (JDK
  #     base, 2026-06-17) measured the actual live working set — the whole
  #     in-memory movie/showtime corpus — at only ~108 MB tenured, so a 384m
  #     heap committed ~280 MB it never used (Xms=Xmx pre-commits and SerialGC
  #     doesn't uncommit). 320m leaves ~2× headroom over the live set while
  #     handing ~64 MB of committed RSS back. NMT breakdown of the rest:
  #     metaspace ~67 MB (≈13.8k Scala/Play/Pekko classes), code cache ~45 MB,
  #     symbols/threads/shared-class ~30 MB, + ~80 MB glibc/RSS overhead.
  #   - Caps tightened to ~2× the measured-actual to bound a worst-case spike on
  #     the 1 GB box (back down from 2 GB, 2026-06-21): MaxMetaspaceSize 160→128m
  #     (actual ~67 MB; classes load at startup, no runtime class-gen here) and
  #     ReservedCodeCacheSize 96→64m (actual ~45 MB; JIT plateaus, not JIT-heavy).
  #     MaxDirectMemorySize stays 96m — under-sizing it fails concurrent fetches
  #     functionally (Direct buffer memory), not just trims RSS. These are CEILINGS
  #     (grown into as used, not pre-committed), so they don't change steady RSS —
  #     they cap how far a runaway can push toward the 1 GB cgroup limit.
  # Measured envelope on the 1 GB box (`free -m` over SSH, 2026-06-21, steady after
  # the resize boot storm): ~704 MB used / ~257 MB available of the 961 MB cgroup-
  # visible total — `free`'s "used" includes glibc/native overhead the 108 MB NMT
  # live-set excludes, so don't expect RSS down near the live set. That 257 MB is
  # ~3.6× the headroom the OLD G1 config had when it OOM-looped here (~890 MB used /
  # ~71 MB free), and SerialGC has none of G1's concurrent-GC RSS excursions — which
  # is why it fits where G1 didn't. If it ever OOM-restarts anyway, the next lever is
  # RAISING
  # [[vm]] memory back toward 2 GB (extra RAM is ~$5.19/GB-mo and 1.25 GB / 1280 MB
  # is a valid 256 MB-increment step) — the 4 vCPUs already include 1 GB at the
  # shared-cpu-4x base price, so RAM is the only thing this trades.
  #
  # LOAD-BEARING trailing flag `-Djdk.http.auth.tunneling.disabledSchemes=` (empty):
  # re-enables Basic auth on HTTPS CONNECT tunnels, which the JDK disables by
  # default. WITHOUT it every fetch through the residential proxy (Decodo ISP, for
  # the Cloudflare-blocked cinemas) 407s and silently falls back to Zyte — the proxy
  # never serves. MUST be a JVM startup flag, not a runtime System.setProperty: the
  # property is cached at the first HttpClient build, before app code can set it.
  # See reference_decodo_isp_proxy.
  #
  # OOM SURVIVABILITY (added after the 2026-06-23 heap OOM, where the 320m heap
  # filled after ~5.5h and the JVM threw OutOfMemoryError on its worker threads but
  # the PROCESS kept running — wedged, answering /health 200 — for ~2h until a
  # manual restart):
  #   - `-XX:+ExitOnOutOfMemoryError`: a hard OOM now EXITS (code 3) instead of
  #     limping on with dead threads, so Fly reschedules the machine (~30s) rather
  #     than leaving a zombie. The codebase already relies on Fly-restarts-on-exit
  #     (see WorkerMain boot-fail path + ThrottleStuckWatchdog). The in-process
  #     LivenessWatchdog is the complement for a wedge that does NOT throw OOM.
  #   - `-XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/heapdumps`: dump the
  #     heap on that hard OOM to the Fly volume mounted at /data (so it survives the
  #     restart) — the diagnostic that was missing, to tell a real leak from a
  #     working set that simply outgrew 320m. The LivenessWatchdog writes the same
  #     dump when it pre-empts the OOM during a death-spiral. Pull dumps off the
  #     volume after an event; clear them so it doesn't fill.
  JAVA_OPTS = '-Xms320m -Xmx320m -XX:+UseSerialGC -XX:ReservedCodeCacheSize=64m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=96m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/heapdumps -Djdk.http.auth.tunneling.disabledSchemes='
  # glibc allocator caps (read at process start, inherited by the JVM): bound the
  # arena count and trim freed heap back to the OS. See the JAVA_OPTS note above.
  MALLOC_ARENA_MAX = '2'
  MALLOC_TRIM_THRESHOLD_ = '131072'
  # Persist logs to the /data volume so they SURVIVE a restart — `flyctl logs`
  # keeps only a short rolling window, which loses the pre-restart logs needed to
  # diagnose a crash/throttle spiral. The logback RollingFileAppender writes here
  # (capped 80MB; see worker logback.xml). Read after an event:
  #   flyctl ssh console --app kinowo-worker -C 'tail -n 500 /data/logs/worker.log'
  KINOWO_LOG_DIR = '/data/logs'

# NO [http_service]: the worker serves no user traffic, so it gets no public
# IP / edge routing. Its only inbound HTTP is the Fly machine health check
# below, which runs over the private network against the internal port.
[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'

# A small persistent volume purely to hold heap dumps across a restart — the
# worker's only durable state (everything else lives in the shared Mongo). The
# JVM's HeapDumpOnOutOfMemoryError (hard-OOM path) and the LivenessWatchdog
# (death-spiral path) both write `*.hprof` into /data/heapdumps; ephemeral
# rootfs would lose them the instant the process exits + Fly reschedules. One
# volume per machine in the worker's region (Fly binds a named mount 1:1 to a machine).
# `fly machine clone` provisions the clone's volume automatically; to add a machine
# manually, create its volume out-of-band first:
#   flyctl volume create worker_heapdumps --size 1 --region arn --app kinowo-worker
[[mounts]]
  source = 'worker_heapdumps'
  destination = '/data'

[[vm]]
  # 4 shared vCPUs / 1 GB. A 2x downgrade was TRIED and REVERTED on 2026-07-05 — do not
  # retry without re-measuring on a genuinely-2x machine. What went wrong: on 2x the
  # baseline (~13 cc) is below what the JVM needs to WARM UP. Profiled the floored 2x
  # machine — process CPU ~17 cc of which JIT compilation was ~14 cc (~80%, sustained
  # for hours, never tapering): the throttle (steal ~150 cc) starves the compiler so
  # tiered JIT never completes, so the JVM stays hot on compilation, so credit stays
  # floored (balance stuck at 1), so the health check/watchdog restarts it, so the cold
  # JVM re-JITs from scratch — a death spiral (uptime never exceeded ~90 min). The
  # earlier "2x viable, credit climbs +10/s" reading was CONTAMINATED: a co-agent deploy
  # had reverted the machine to 4x mid-observation, so that climb was on 4x, not 2x.
  # On 4x the compiler has headroom to finish warmup (JIT → ~0) and warm steady-state
  # real work is only ~10 cc, so credit climbs and the machine stays up. The boot-path
  # fixes (gated boot reproject @7c01226f, keyset-paged read-model/freshness seeds) DID
  # remove the big bursts — they're why 4x now hoards ~150k credit — but they don't
  # shrink the JVM's warmup CPU, which is the real 4x-vs-2x deciding cost.
  #
  # Self-heal stays wired: `ScrapeThrottleMonitor` (in-process scrape-duration backstop)
  # + the EXTERNAL Grafana credit gate (fly_instance_cpu_balance < 6000 → /throttle
  # webhook, recover > 12000) tell ALL reapers to trickle so the pool idles and credit
  # rebuilds. On 4x this gate is a dormant deep-safety-net. If 4x ever genuinely pins,
  # go performance-2x (dedicated, no credit throttle) rather than shared-2x.
  #
  # RAM is INDEPENDENT of the CPU choice: 1 GB fits the SerialGC + tightened-cap JVM
  # config (JVM ~210-346 MB used live, ~290 MB worst-case headroom, NMT-measured — see
  # the JAVA_OPTS note); the 4x price includes 1 GB, so this is the cheapest 4x.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 4
