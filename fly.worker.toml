# Scrape/enrich worker — the write half of the read/write split. Runs the
# continuous cinema scrape + the enrichment cascade, writing through MovieCache
# to the shared Mongo; the `kinowo` serving app picks those writes up via the
# Mongo change stream. Deployed from the SAME Dockerfile as `kinowo` with
# `--build-arg BIN=worker` (see .github/workflows/deploy.yml).
app = 'kinowo-worker'
# Same region as `kinowo` + the self-hosted Mongo (`fly/mongo`) so writes run
# on Fly's private network at ~1 ms RTT instead of a cross-region hop.
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  # WorkerMain's JDK health server binds this port; the [checks] block below
  # probes it. No public router fronts it (no [http_service]).
  PORT = '9000'
  # No KINOWO_SCRAPE_CITIES: the worker now scrapes EVERY modelled city by
  # default (ScrapeCities.allCities). The var still exists as a load-shedding
  # escape hatch — `fly secrets set KINOWO_SCRAPE_CITIES=poznan,wroclaw` NARROWS
  # the set — but the steady state is all ~19 cities on 2 shared vCPUs / 1 GB.
  # Watch this worker's RSS/CPU: if it throttles or OOMs, narrow via the secret
  # or bump the [[vm]] (see below).
  # Per-app JVM sizing (moved out of the shared Dockerfile). Keeps the proven
  # monolith sizing — 384m heap + non-heap caps fit the 1 GB cgroup with
  # ~100 MB headroom. If the 3-city load OOM-kills or GC-thrashes, the fix is a
  # bigger [[vm]] (2 GB) + larger heap, not just bumping heap inside 1 GB.
  JAVA_OPTS = '-Xms384m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:+UseStringDeduplication -XX:ReservedCodeCacheSize=96m -XX:MaxMetaspaceSize=160m -XX:MaxDirectMemorySize=96m'

# NO [http_service]: the worker serves no user traffic, so it gets no public
# IP / edge routing. Its only inbound HTTP is the Fly machine health check
# below, which runs over the private network against the internal port.
[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'

[[vm]]
  # 2 shared vCPUs / 1 GB. The 3-city continuous scrape pegged a single shared
  # vCPU (load avg ~2.7), risking Fly's shared-CPU balance throttling. A second
  # vCPU halves per-core load to ~1.35 and doubles the throttle balance — and
  # it's ~free here (the second shared vCPU is ~$0.77/mo, covered by the web
  # scale-down's ~$2.50/mo saving). Memory plateaus ~600 MB, so 1 GB stays.
  # (Scrape concurrency stays at its default 2 — the extra core is headroom,
  # not a reason to fan out wider.) Bump to performance-1x if it still throttles.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
