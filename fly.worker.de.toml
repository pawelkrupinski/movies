# Germany scrape/enrich worker — the DE (kinowo_de / Filmstarts) half, SPLIT off
# `kinowo-worker` onto its own shared-cpu-2x machine (2026-07-17). Same rationale
# as fly.worker.uk.toml: a per-COUNTRY split gives each country its own 2x credit
# bucket + its own db's change-stream/projection load, so machines never contend.
# Germany's cinema roster is large (the full filmstarts roster is ~1,533 cinemas
# across 158 regions — see data/germany/), so it needs its own machine rather than
# riding on `kinowo-worker` alongside Poland.
#
# Same Dockerfile + `--build-arg BIN=worker`; identical JVM / throttle / GC tuning
# — see fly.worker.toml for the rationale behind each flag. Differs only in `app`,
# `KINOWO_COUNTRIES=de`, and its own volume.
app = 'kinowo-worker-de'
# Mongo colocation (fly/mongo lives in arn) — the worker serves no user traffic.
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[[metrics]]
  port = 9000
  path = '/metrics'

[env]
  PORT = '9000'
  # DE only → one WorkerWiring against the kinowo_de db (Country.dbNameFor).
  KINOWO_COUNTRIES = 'de'
  KINOWO_BOOT_HYDRATE_MAX_ATTEMPTS = '20'
  KINOWO_WORKER_POOL_SIZE = '4'
  KINOWO_CREDIT_THROTTLE_ENTER_BELOW = '8000'
  KINOWO_CREDIT_THROTTLE_EXIT_ABOVE  = '14000'
  # 180, not the fleet default of 60. DE's roster is ~1,533 cinemas across 158
  # Filmstarts regions (~5x PL), all swept by this one worker, and Filmstarts 429s
  # us above ~1 req/s. So the RealHttpFetch pace holds filmstarts.de to 1000ms
  # (~1 req/s) to reach 0 throttled — which makes a full sweep ~179min. This
  # cadence is the budget that sweep must fit inside: it's coupled to the pace,
  # not an independent freshness choice, and WorkerScrapeCadenceConfigSpec asserts
  # sweep ≤ cadence so a change to either alone fails the build. German showtimes
  # don't churn fast enough for 3h staleness to matter.
  KINOWO_SCRAPE_FRESHNESS_MINUTES = '180'
  # JVM sizing: Xms=Xmx=640m on a 1280 MB box. This is the bump the previous note
  # here said to make only once measured, and 2026-07-18 supplied the measurement:
  # with the full 158-region / 1,533-cinema Filmstarts roster live, 448m did NOT
  # hold. The worker crash-looped every ~15-30 min (12:58, 13:28, 13:55, 14:18,
  # 14:32, 14:48, 15:04, 15:33 UTC) with `exit_code=3, oom_killed=false` — i.e.
  # -XX:+ExitOnOutOfMemoryError firing on a real Java heap OOM, not the cgroup
  # kill (137) or the native/non-heap OOM this fleet used to hit. The proof is the
  # heap dump: java_pid662.hprof was 367.7 MB, ~82% of the 448m ceiling, where the
  # old non-heap OOMs left near-empty ~11 MB dumps. So the "grows sub-linearly, 448m
  # may well hold it" reasoning was simply wrong for DE's corpus.
  # 640m + the unchanged non-heap caps (64+128+96 = 288m) + JVM/thread overhead
  # leaves ~170 MB slack in 1280mb. Method unchanged for next time: measure, then
  # step 256 MB. All other flags match kinowo-worker — see that file's JAVA_OPTS note.
  # NOTE: a full dump is now ~640 MB against a 974 MB /data — one fits, two do not.
  # Clear /data/heapdumps after diagnosing an OOM or the volume fills.
  JAVA_OPTS = '-Xms640m -Xmx640m -XX:+UseSerialGC -XX:ReservedCodeCacheSize=64m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=96m -XX:CICompilerCount=2 -XX:-UseTypeSpeculation -XX:PerMethodRecompilationCutoff=20 -XX:PerBytecodeRecompilationCutoff=20 -XX:+AutoCreateSharedArchive -XX:SharedArchiveFile=/data/app.jsa -XX:NativeMemoryTracking=summary -XX:+UnlockDiagnosticVMOptions -XX:+PrintNMTStatistics -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/heapdumps -XX:ErrorFile=/data/logs/hs_err_%p.log -Djdk.http.auth.tunneling.disabledSchemes='
  MALLOC_ARENA_MAX = '2'
  MALLOC_TRIM_THRESHOLD_ = '131072'
  KINOWO_LOG_DIR = '/data/logs'

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'

# First-deploy bootstrap for a NEW per-country worker app (do BOTH before the
# first `flyctl deploy`, or the machine crash-loops on boot — the fresh app boots
# with no MONGODB_URI, the required-Mongo probe hits a stale 127.0.0.1 URI, and
# MongoConnection.init throws "refusing to start" until the secret lands):
#   1. Copy the worker secrets from the sibling app FIRST — at minimum MONGODB_URI
#      (the shared prod cluster; use kinowo-worker's exact value, NOT the local
#      .env.local 127.0.0.1 one), plus TMDB_API_KEY / ZYTE_API_KEY / SENTRY_DSN /
#      TELEGRAM_* / KINOWO_PROXY_* etc. Secrets persist across deploys — one-time.
#   2. Create the persistent volume (heap dumps + logs + AppCDS archive):
#        flyctl volume create worker_heapdumps --size 1 --region arn --app kinowo-worker-de
[[mounts]]
  source = 'worker_heapdumps'
  destination = '/data'

[[vm]]
  # 2 shared vCPUs / 1280 MB — one 256 MB step up from the kinowo-worker/-uk 1 GB
  # baseline, taken 2026-07-18 because the 1,533-cinema German roster DID OOM the
  # 448m heap (see the JAVA_OPTS note for the exit-code-3 / 367.7 MB-dump evidence).
  # This funds Xmx=640m; DE is deliberately the only worker above the 1 GB baseline.
  memory = '1280mb'
  cpu_kind = 'shared'
  cpus = 2
