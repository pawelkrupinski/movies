# UK scrape/enrich worker — the UK (kinowo_uk / Flicks) half of the worker,
# SPLIT off `kinowo-worker` on 2026-07-17 onto its own shared-cpu-2x machine.
# Rationale: the full-UK roster (07-12 doubling) pushed the combined pl+uk+de
# worker's scrape + change-stream/projection load past the shared-cpu-2x credit
# baseline. A per-COUNTRY split halves the per-machine cost (each machine watches
# only its own db's `movies` change stream — unlike same-db replicas, which don't
# split that fixed cost; see fly.worker.toml's "WHY MORE MACHINES DON'T HELP").
# Each country is fully isolated (own db + task queue + freshness + staging +
# projection), so this machine and `kinowo-worker` (pl,de) never contend.
#
# Same Dockerfile + `--build-arg BIN=worker` as `kinowo-worker`; identical JVM /
# throttle / GC tuning — see fly.worker.toml for the full rationale behind each
# flag. This file only differs in `app`, `KINOWO_COUNTRIES=uk`, and its own volume.
app = 'kinowo-worker-uk'
# Same region as the shared Mongo cluster (fly/mongo) for ~1 ms write RTT. The UK
# WEB app (showtimes-uk) runs in London for user latency, but the worker has no
# user traffic — it wants Mongo colocation, like kinowo-worker.
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[[metrics]]
  port = 9000
  path = '/metrics'

[env]
  PORT = '9000'
  # UK only → one WorkerWiring against the kinowo_uk db (Country.dbNameFor).
  KINOWO_COUNTRIES = 'uk'
  KINOWO_BOOT_HYDRATE_MAX_ATTEMPTS = '20'
  KINOWO_WORKER_POOL_SIZE = '4'
  # Credit-throttle thresholds (ms of fly_instance_cpu_balance), same as kinowo-worker.
  KINOWO_CREDIT_THROTTLE_ENTER_BELOW = '8000'
  KINOWO_CREDIT_THROTTLE_EXIT_ABOVE  = '14000'
  # Cinema-scrape freshness window. UK is the SLOWEST in the fleet (7h), not the
  # fleet's 60min: the 843 Flicks venues each fan out one ScrapeChunk per advertised
  # day of their full booking horizon (up to MaxHorizonDays=210, ~90-150 populated)
  # — ~100k requests per cycle onto ONE origin. Flicks is now PACED at 200ms
  # (HostPolicies) to stop the 429s an unpaced fan-out drew, which serialises the
  # sweep to ~333min — so like DE the pace and cadence are coupled: the pace sets
  # the sweep length, this budget must exceed it, and WorkerScrapeCadenceConfigSpec
  # locks the pair. 420min clears the ~333min paced sweep with headroom. (It was
  # 300min while unpaced, drain-bound by the 4-worker pool; pacing is the new,
  # slower bound.) Retune via KINOWO_FLICKS_PACE_MS + this value together.
  KINOWO_SCRAPE_FRESHNESS_MINUTES = '420'
  # JVM sizing: Xms=Xmx=448m on the 1 GB box — the UK corpus is ~half the former
  # combined set that needed 480m, and 448 + ~290 MB non-heap ≈ 738 MB RSS leaves
  # ~220 MB free. All other flags (SerialGC, tightened caps, -UseTypeSpeculation +
  # recompilation cutoffs, AppCDS, ExitOnOOM + HeapDump to /data, NMT diag, the
  # LOAD-BEARING empty -Djdk.http.auth.tunneling.disabledSchemes= for the residential
  # proxy) are identical to kinowo-worker — see that file's JAVA_OPTS note.
  JAVA_OPTS = '-Xms448m -Xmx448m -XX:+UseSerialGC -XX:ReservedCodeCacheSize=64m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=96m -XX:CICompilerCount=2 -XX:-UseTypeSpeculation -XX:PerMethodRecompilationCutoff=20 -XX:PerBytecodeRecompilationCutoff=20 -XX:+AutoCreateSharedArchive -XX:SharedArchiveFile=/data/app.jsa -XX:NativeMemoryTracking=summary -XX:+UnlockDiagnosticVMOptions -XX:+PrintNMTStatistics -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/heapdumps -XX:ErrorFile=/data/logs/hs_err_%p.log -Djdk.http.auth.tunneling.disabledSchemes='
  MALLOC_ARENA_MAX = '2'
  MALLOC_TRIM_THRESHOLD_ = '131072'
  KINOWO_LOG_DIR = '/data/logs'

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    port = 9000
    timeout = '10s'
    type = 'http'

# First-deploy bootstrap for a NEW per-country worker app (do BOTH before the
# first `flyctl deploy`, or the machine crash-loops on boot — Sentry KINOWO
# 135004692, 2026-07-17: the fresh kinowo-worker-uk booted before MONGODB_URI
# was set, the required-Mongo boot probe hit a stale 127.0.0.1 URI, and
# MongoConnection.init threw "refusing to start" 9× until the secret landed):
#   1. Copy the secrets the worker needs from the sibling app FIRST — at minimum
#      MONGODB_URI (the shared prod cluster; same digest as kinowo-worker), plus
#      TMDB_API_KEY / ZYTE_API_KEY / SENTRY_DSN / TELEGRAM_* / KINOWO_PROXY_* etc.
#      Secrets persist across deploys, so this is a one-time-per-new-app step.
#   2. Create the persistent volume (heap dumps + logs + the AppCDS archive):
#        flyctl volume create worker_heapdumps --size 1 --region arn --app kinowo-worker-uk
[[mounts]]
  source = 'worker_heapdumps'
  destination = '/data'

[[vm]]
  # 2 shared vCPUs / 1 GB — same class as kinowo-worker. The split gives UK its own
  # 2x credit bucket for its own scrape + change-stream/projection load. If UK's
  # steady CPU ever climbs over the ~13 cc 2x breakeven, escalate per fly.worker.toml
  # (TieredStopAtLevel=1, then performance-2x).
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
